<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Sound - TikControl</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-size: 13px;
            color: #d4d4d4;
            background: transparent;
            padding: 16px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        label {
            font-size: 12px;
            font-weight: 500;
            color: #9d9d9d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input, select {
            background: #3a3a3a;
            border: 1px solid #4a4a4a;
            border-radius: 4px;
            color: #d4d4d4;
            padding: 8px 10px;
            font-size: 13px;
            font-family: inherit;
            width: 100%;
            transition: all 0.2s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #0e99e5;
            background: #424242;
        }
        
        input::placeholder {
            color: #666;
        }
        
        .help-text {
            font-size: 11px;
            color: #7a7a7a;
            line-height: 1.4;
            margin-top: 4px;
        }
        
        .refresh-btn {
            background: #0e99e5;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover {
            background: #0c7ab8;
        }
        
        .refresh-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="field">
            <label for="soundName">Sound Name</label>
            <select id="soundName">
                <option value="">Select a sound...</option>
            </select>
            <div class="help-text">Choose a sound configured in TikControl</div>
        </div>
        
        <button class="refresh-btn" onclick="refreshSounds()">
            🔄 Refresh Sounds
        </button>
    </div>
    
    <script>
        let websocket = null;
        let uuid = null;
        let actionInfo = null;
        let settings = {};
        
        function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
            uuid = inUUID;
            actionInfo = JSON.parse(inActionInfo);
            settings = actionInfo.payload.settings || {};
            
            console.log('[PI] Settings cargados:', settings);
            
            // Update UI with saved settings (usar soundId)
            const soundSelect = document.getElementById('soundName');
            if(settings.soundId) {
                soundSelect.value = settings.soundId;
                console.log('[PI] Restaurando selección:', settings.soundId);
            }
            
            // Connect to Stream Deck
            websocket = new WebSocket('ws://localhost:' + inPort);
            
            websocket.onopen = function() {
                const json = {
                    event: inRegisterEvent,
                    uuid: inUUID
                };
                websocket.send(JSON.stringify(json));
                
                // Request sounds list
                refreshSounds();
            };
        }
        
        let tikcontrolWs = null;
        
        function refreshSounds() {
            // Connect to TikControl to get sounds list
            if(tikcontrolWs && tikcontrolWs.readyState === WebSocket.OPEN) {
                tikcontrolWs.close();
            }
            
            tikcontrolWs = new WebSocket('ws://localhost:9091');
            
            tikcontrolWs.onopen = function() {
                console.log('[PI] Connected to TikControl');
                tikcontrolWs.send(JSON.stringify({
                    type: 'get_sounds_list'
                }));
            };
            
            tikcontrolWs.onmessage = function(evt) {
                try {
                    const data = JSON.parse(evt.data);
                    if(data.type === 'sounds_list') {
                        updateSoundsList(data.data || []);
                    }
                } catch(e) {
                    console.error('[PI] Error parsing message:', e);
                }
            };
            
            tikcontrolWs.onerror = function() {
                console.error('[PI] Error connecting to TikControl');
                const select = document.getElementById('soundName');
                select.innerHTML = '<option value="">Error: TikControl not running</option>';
            };
        }
        
        function updateSoundsList(sounds) {
            const soundSelect = document.getElementById('soundName');
            const currentId = settings.soundId || '';
            
            soundSelect.innerHTML = '<option value="">Select a sound...</option>';
            
            if(sounds.length === 0) {
                soundSelect.innerHTML = '<option value="">No sounds configured</option>';
                return;
            }
            
            sounds.forEach(sound => {
                const option = document.createElement('option');
                // Soportar tanto strings (legacy) como objetos
                if(typeof sound === 'string') {
                    option.value = sound;
                    option.textContent = sound;
                } else {
                    option.value = sound.id;
                    let displayName = sound.name || sound.id;
                    
                    // Agregar info sobre random
                    if(sound.random && sound.variants && sound.variants.length > 0) {
                        const totalSounds = 1 + sound.variants.length;
                        displayName += ` 🎲 (Random: ${totalSounds} sounds)`;
                    }
                    
                    option.textContent = displayName;
                }
                
                // Restaurar selección por ID
                if(sound.id === currentId) {
                    option.selected = true;
                }
                soundSelect.appendChild(option);
            });
        }
        
        // Handle sound selection
        document.getElementById('soundName').addEventListener('change', function(e) {
            const selectedValue = e.target.value;
            if(selectedValue && selectedValue !== '' && selectedValue !== 'undefined' && selectedValue !== 'null') {
                settings.soundId = selectedValue;
            } else {
                delete settings.soundId;
            }
            saveSettings();
        });
        
        function saveSettings() {
            if(websocket && websocket.readyState === WebSocket.OPEN) {
                const json = {
                    event: 'setSettings',
                    context: uuid,
                    payload: settings
                };
                websocket.send(JSON.stringify(json));
            }
        }
        
        // Expose function for Stream Deck to call
        window.connectElgatoStreamDeckSocket = connectElgatoStreamDeckSocket;
    </script>
</body>
</html>
