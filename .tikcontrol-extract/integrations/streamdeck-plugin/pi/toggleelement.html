<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle Overlay Element - TikControl</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-size: 13px;
            color: #d4d4d4;
            background: transparent;
            padding: 16px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        label {
            font-size: 12px;
            font-weight: 500;
            color: #9d9d9d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        select {
            background: #3a3a3a;
            border: 1px solid #4a4a4a;
            border-radius: 4px;
            color: #d4d4d4;
            padding: 8px 10px;
            font-size: 13px;
            font-family: inherit;
            width: 100%;
            transition: all 0.2s;
            color-scheme: dark;
        }
        
        select:focus {
            outline: none;
            border-color: #0e99e5;
            background: #424242;
        }
        
        .help-text {
            font-size: 11px;
            color: #7a7a7a;
            line-height: 1.4;
            margin-top: 4px;
        }
        
        .refresh-btn {
            background: #0e99e5;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover {
            background: #0c7ab8;
        }
        
        .refresh-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="field">
            <label for="elementId">Overlay Element</label>
            <select id="elementId">
                <option value="">Loading elements...</option>
            </select>
            <div class="help-text">Select an element from your current overlay (Vertical & Horizontal)</div>
        </div>
        
        <button class="refresh-btn" onclick="refreshElements()">
            🔄 Refresh Elements
        </button>
    </div>
    
    <script>
        let websocket = null;
        let tikcontrolWs = null;
        let uuid = null;
        let actionInfo = null;
        let settings = {};
        
        function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
            uuid = inUUID;
            actionInfo = JSON.parse(inActionInfo);
            settings = actionInfo.payload.settings || {};
            
            // Connect to Stream Deck
            websocket = new WebSocket('ws://localhost:' + inPort);
            
            websocket.onopen = function() {
                const json = {
                    event: inRegisterEvent,
                    uuid: inUUID
                };
                websocket.send(JSON.stringify(json));
                
                // Request elements list
                refreshElements();
            };
        }
        
        function refreshElements() {
            // Connect to TikControl WebSocket to get elements
            if(tikcontrolWs && tikcontrolWs.readyState === WebSocket.OPEN) {
                tikcontrolWs.close();
            }
            
            tikcontrolWs = new WebSocket('ws://localhost:9091');
            
            tikcontrolWs.onopen = function() {
                console.log('[PI] Connected to TikControl');
                tikcontrolWs.send(JSON.stringify({
                    type: 'get_overlay_elements'
                }));
            };
            
            tikcontrolWs.onmessage = function(evt) {
                try {
                    const data = JSON.parse(evt.data);
                    if(data.type === 'overlay_elements') {
                        updateElementsList(data.data || []);
                    }
                } catch(e) {
                    console.error('[PI] Error parsing message:', e);
                }
            };
            
            tikcontrolWs.onerror = function() {
                console.error('[PI] Error connecting to TikControl');
                const select = document.getElementById('elementId');
                select.innerHTML = '<option value="">Error: TikControl not running</option>';
            };
        }
        
        function updateElementsList(elements) {
            const select = document.getElementById('elementId');
            const currentValue = settings.elementId || '';
            
            select.innerHTML = '<option value="">Select an element...</option>';
            
            if(elements.length === 0) {
                select.innerHTML = '<option value="">No elements in overlay</option>';
                return;
            }
            
            elements.forEach(el => {
                const option = document.createElement('option');
                option.value = el.id;
                option.textContent = `[${el.layer}] ${el.name} (${el.type})`;
                if(el.id === currentValue) {
                    option.selected = true;
                }
                select.appendChild(option);
            });
            
            // Restore selection if it exists
            if(currentValue) {
                select.value = currentValue;
            }
        }
        
        // Handle element selection
        document.getElementById('elementId').addEventListener('change', function(e) {
            settings.elementId = e.target.value;
            saveSettings();
        });
        
        function saveSettings() {
            if(websocket && websocket.readyState === WebSocket.OPEN) {
                const json = {
                    event: 'setSettings',
                    context: uuid,
                    payload: settings
                };
                websocket.send(JSON.stringify(json));
            }
        }
        
        // Expose function for Stream Deck to call
        window.connectElgatoStreamDeckSocket = connectElgatoStreamDeckSocket;
    </script>
</body>
</html>
