<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle GTA V Command - TikControl</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-size: 13px;
            color: #d4d4d4;
            background: transparent;
            padding: 16px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        label {
            font-size: 12px;
            font-weight: 500;
            color: #9d9d9d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        select {
            background: #3a3a3a;
            border: 1px solid #4a4a4a;
            border-radius: 4px;
            color: #d4d4d4;
            padding: 8px 10px;
            font-size: 13px;
            font-family: inherit;
            width: 100%;
            transition: all 0.2s;
            color-scheme: dark;
        }
        
        select:focus {
            outline: none;
            border-color: #0e99e5;
            background: #424242;
        }
        
        .help-text {
            font-size: 11px;
            color: #7a7a7a;
            line-height: 1.4;
            margin-top: 4px;
        }
        
        .refresh-btn {
            background: #0e99e5;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover {
            background: #0c7ab8;
        }
        
        .refresh-btn:active {
            transform: scale(0.98);
        }
        
        .info-box {
            background: #1e3a8a;
            border-radius: 6px;
            padding: 12px;
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info-box">
            ℹ️ <strong>Toggle Command:</strong> Este botón activará/desactivará el comando seleccionado. Cuando está desactivado, el comando no se ejecutará desde eventos de TikTok.
        </div>
        
        <div class="field">
            <label for="mode">Game Mode</label>
            <select id="mode">
                <option value="koth">KOTH (King of the Hill)</option>
                <option value="kaos">KAOS (Chaos Mod)</option>
            </select>
            <div class="help-text">Select the GTA V game mode</div>
        </div>
        
        <div class="field" id="commandField">
            <label for="commandId">Command to Toggle</label>
            <select id="commandId">
                <option value="">Loading commands...</option>
            </select>
            <div class="help-text">Select a command to toggle on/off</div>
        </div>
        
        <button class="refresh-btn" onclick="refreshCommands()">
            🔄 Refresh Commands
        </button>
    </div>
    
    <script>
        let websocket = null;
        let tikcontrolWs = null;
        let uuid = null;
        let actionInfo = null;
        let settings = {};
        
        function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
            uuid = inUUID;
            actionInfo = JSON.parse(inActionInfo);
            settings = actionInfo.payload.settings || {};
            
            // Update UI with saved settings
            const modeSelect = document.getElementById('mode');
            const commandSelect = document.getElementById('commandId');
            
            if(settings.mode) {
                modeSelect.value = settings.mode;
            }
            
            if(settings.commandId) {
                commandSelect.value = settings.commandId;
            }
            
            // Connect to Stream Deck
            websocket = new WebSocket('ws://localhost:' + inPort);
            
            websocket.onopen = function() {
                const json = {
                    event: inRegisterEvent,
                    uuid: inUUID
                };
                websocket.send(JSON.stringify(json));
                
                // Request commands list
                refreshCommands();
            };
        }
        
        function refreshCommands() {
            const mode = document.getElementById('mode').value;
            
            // Connect to TikControl to get GTA V commands
            if(tikcontrolWs && tikcontrolWs.readyState === WebSocket.OPEN) {
                tikcontrolWs.close();
            }
            
            tikcontrolWs = new WebSocket('ws://localhost:9091');
            
            tikcontrolWs.onopen = function() {
                console.log('[PI] Connected to TikControl');
                tikcontrolWs.send(JSON.stringify({
                    type: 'get_gtav_commands',
                    mode: mode
                }));
            };
            
            tikcontrolWs.onmessage = function(evt) {
                try {
                    const data = JSON.parse(evt.data);
                    if(data.type === 'gtav_commands') {
                        updateCommandsList(data.data || []);
                    }
                } catch(e) {
                    console.error('[PI] Error parsing message:', e);
                }
            };
            
            tikcontrolWs.onerror = function() {
                console.error('[PI] Error connecting to TikControl');
                const select = document.getElementById('commandId');
                select.innerHTML = '<option value="">Error: TikControl not running</option>';
            };
        }
        
        function updateCommandsList(commands) {
            const commandSelect = document.getElementById('commandId');
            // ✅ Usar el valor actual del select O el valor guardado en settings
            const currentValue = commandSelect.value || settings.commandId || '';
            
            console.log('[PI] Actualizando lista de comandos. Valor actual:', currentValue);
            
            commandSelect.innerHTML = '<option value="">Select a command...</option>';
            
            if(commands.length === 0) {
                commandSelect.innerHTML = '<option value="">No commands available</option>';
                return;
            }
            
            let foundCurrentValue = false;
            commands.forEach(cmd => {
                const option = document.createElement('option');
                option.value = cmd.id || cmd.commandId;
                option.textContent = cmd.name || cmd.id;
                if((cmd.id || cmd.commandId) === currentValue) {
                    option.selected = true;
                    foundCurrentValue = true;
                }
                commandSelect.appendChild(option);
            });
            
            // ✅ Forzar la restauración del valor
            if(currentValue && foundCurrentValue) {
                commandSelect.value = currentValue;
                console.log('[PI] ✅ Selección restaurada:', currentValue);
            } else if(currentValue) {
                console.warn('[PI] ⚠️ Comando no encontrado en la lista:', currentValue);
            }
        }
        
        // Handle mode change
        document.getElementById('mode').addEventListener('change', function(e) {
            settings.mode = e.target.value;
            settings.commandId = ''; // Reset command when mode changes
            saveSettings();
            refreshCommands();
        });
        
        // Handle command selection
        document.getElementById('commandId').addEventListener('change', function(e) {
            settings.commandId = e.target.value;
            saveSettings();
        });
        
        function saveSettings() {
            if(websocket && websocket.readyState === WebSocket.OPEN) {
                const json = {
                    event: 'setSettings',
                    context: uuid,
                    payload: settings
                };
                websocket.send(JSON.stringify(json));
            }
        }
        
        // Expose function for Stream Deck to call
        window.connectElgatoStreamDeckSocket = connectElgatoStreamDeckSocket;
    </script>
</body>
</html>
