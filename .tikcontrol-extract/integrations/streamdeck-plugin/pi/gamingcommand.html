<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Command - TikControl</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-size: 13px;
            color: #d4d4d4;
            background: transparent;
            padding: 16px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        label {
            font-size: 12px;
            font-weight: 500;
            color: #9d9d9d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        select {
            background: #3a3a3a;
            border: 1px solid #4a4a4a;
            border-radius: 4px;
            color: #d4d4d4;
            padding: 8px 10px;
            font-size: 13px;
            font-family: inherit;
            width: 100%;
            transition: all 0.2s;
            color-scheme: dark;
        }
        
        select:focus {
            outline: none;
            border-color: #0e99e5;
            background: #424242;
        }
        
        .help-text {
            font-size: 11px;
            color: #7a7a7a;
            line-height: 1.4;
            margin-top: 4px;
        }
        
        .info-box {
            background: rgba(14, 153, 229, 0.1);
            border: 1px solid rgba(14, 153, 229, 0.3);
            border-radius: 6px;
            padding: 12px;
            font-size: 12px;
            line-height: 1.5;
        }
        
        .info-box strong {
            color: #0e99e5;
            display: block;
            margin-bottom: 8px;
        }
        
        .refresh-btn {
            background: #0e99e5;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover {
            background: #0c7ab8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info-box">
            <strong>🎮 Gaming Command</strong>
            Ejecuta comandos de juegos configurados en TikControl (Gaming). Cada perfil tiene sus propios comandos configurados.
        </div>
        
        <div class="field">
            <label for="gameSelect">Juego</label>
            <select id="gameSelect">
                <option value="">Cargando juegos...</option>
            </select>
            <div class="help-text">Selecciona el juego de TikControl</div>
        </div>
        
        <div class="field">
            <label for="commandSelect">Comando</label>
            <select id="commandSelect">
                <option value="">-- Selecciona un juego primero --</option>
            </select>
            <div class="help-text">Comando a ejecutar al pulsar el botón</div>
        </div>
        
        <button class="refresh-btn" onclick="refreshCatalog()">
            🔄 Actualizar catálogo
        </button>
    </div>
    
    <script>
        let websocket = null;
        let tikcontrolWs = null;
        let uuid = null;
        let actionInfo = null;
        let settings = {};
        let catalog = [];
        
        function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
            uuid = inUUID;
            actionInfo = JSON.parse(inActionInfo);
            settings = actionInfo.payload.settings || {};
            
            const gameSelect = document.getElementById('gameSelect');
            const commandSelect = document.getElementById('commandSelect');
            
            if (settings.gameId) {
                gameSelect.value = settings.gameId;
            }
            if (settings.commandId) {
                commandSelect.value = settings.commandId;
            }
            
            websocket = new WebSocket('ws://localhost:' + inPort);
            
            websocket.onopen = function() {
                websocket.send(JSON.stringify({
                    event: inRegisterEvent,
                    uuid: inUUID
                }));
                refreshCatalog();
            };
            
            websocket.onerror = function(e) {
                console.error('[PI gaming] Error WebSocket:', e);
            };
        }
        
        function refreshCatalog() {
            if (tikcontrolWs && tikcontrolWs.readyState === WebSocket.OPEN) {
                tikcontrolWs.close();
            }
            
            const gameSelect = document.getElementById('gameSelect');
            const commandSelect = document.getElementById('commandSelect');
            
            gameSelect.innerHTML = '<option value="">Cargando...</option>';
            commandSelect.innerHTML = '<option value="">-- Selecciona un juego primero --</option>';
            
            tikcontrolWs = new WebSocket('ws://localhost:9091');
            
            tikcontrolWs.onopen = function() {
                tikcontrolWs.send(JSON.stringify({ type: 'get_gaming_commands' }));
            };
            
            tikcontrolWs.onmessage = function(evt) {
                try {
                    const data = JSON.parse(evt.data);
                    if (data.type === 'gaming_commands') {
                        catalog = data.data || [];
                        updateGamesList();
                    }
                } catch (e) {
                    console.error('[PI gaming] Error parsing:', e);
                }
            };
            
            tikcontrolWs.onerror = function() {
                gameSelect.innerHTML = '<option value="">Error: TikControl no está corriendo</option>';
            };
        }
        
        function updateGamesList() {
            const gameSelect = document.getElementById('gameSelect');
            const commandSelect = document.getElementById('commandSelect');
            const currentGameId = settings.gameId || '';
            const currentCommandId = settings.commandId || '';
            
            gameSelect.innerHTML = '<option value="">-- Sin seleccionar --</option>';
            
            if (catalog.length === 0) {
                const opt = document.createElement('option');
                opt.value = '';
                opt.textContent = '⚠️ No hay juegos con comandos configurados';
                opt.disabled = true;
                gameSelect.appendChild(opt);
                return;
            }
            
            catalog.forEach(game => {
                const option = document.createElement('option');
                option.value = game.gameId;
                option.textContent = game.gameName || game.gameId;
                option.dataset.commands = JSON.stringify(game.commands || []);
                if (game.gameId === currentGameId) {
                    option.selected = true;
                }
                gameSelect.appendChild(option);
            });
            
            if (currentGameId) {
                gameSelect.value = currentGameId;
                updateCommandsList(currentGameId);
                if (currentCommandId) {
                    commandSelect.value = currentCommandId;
                }
            }
        }
        
        function updateCommandsList(gameId) {
            const commandSelect = document.getElementById('commandSelect');
            const gameSelect = document.getElementById('gameSelect');
            const selectedOption = gameSelect.options[gameSelect.selectedIndex];
            
            commandSelect.innerHTML = '<option value="">-- Sin seleccionar --</option>';
            
            if (!selectedOption || !selectedOption.dataset.commands) {
                return;
            }
            
            const commands = JSON.parse(selectedOption.dataset.commands) || [];
            
            commands.forEach(cmd => {
                const option = document.createElement('option');
                option.value = cmd.id;
                option.textContent = cmd.name || cmd.id;
                if (cmd.id === settings.commandId) {
                    option.selected = true;
                }
                commandSelect.appendChild(option);
            });
            
            if (settings.commandId) {
                commandSelect.value = settings.commandId;
            }
        }
        
        document.getElementById('gameSelect').addEventListener('change', function(e) {
            const gameId = e.target.value;
            settings.gameId = gameId || '';
            settings.commandId = '';
            updateCommandsList(gameId);
            saveSettings();
        });
        
        document.getElementById('commandSelect').addEventListener('change', function(e) {
            settings.commandId = e.target.value || '';
            saveSettings();
        });
        
        function saveSettings() {
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                websocket.send(JSON.stringify({
                    event: 'setSettings',
                    context: uuid,
                    payload: settings
                }));
            }
        }
        
        window.connectElgatoStreamDeckSocket = connectElgatoStreamDeckSocket;
        window.refreshCatalog = refreshCatalog;
    </script>
</body>
</html>
