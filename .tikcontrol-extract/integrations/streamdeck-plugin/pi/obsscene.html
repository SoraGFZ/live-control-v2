<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Scene - TikControl</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-size: 13px;
            color: #d4d4d4;
            background: transparent;
            padding: 16px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        label {
            font-size: 12px;
            font-weight: 500;
            color: #9d9d9d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input, select {
            background: #3a3a3a;
            border: 1px solid #4a4a4a;
            border-radius: 4px;
            color: #d4d4d4;
            padding: 8px 10px;
            font-size: 13px;
            font-family: inherit;
            width: 100%;
            transition: all 0.2s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #0e99e5;
            background: #424242;
        }
        
        input::placeholder {
            color: #666;
        }
        
        .help-text {
            font-size: 11px;
            color: #7a7a7a;
            line-height: 1.4;
            margin-top: 4px;
        }
        
        .refresh-btn {
            background: #0e99e5;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover {
            background: #0c7ab8;
        }
        
        .refresh-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="field">
            <label for="sceneName">OBS Scene</label>
            <select id="sceneName">
                <option value="">Select a scene...</option>
            </select>
            <div class="help-text">Choose an OBS scene to switch to</div>
        </div>
        
        <button class="refresh-btn" onclick="refreshScenes()">
            🔄 Refresh Scenes
        </button>
    </div>
    
    <script>
        let websocket = null;
        let uuid = null;
        let actionInfo = null;
        let settings = {};
        
        function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
            uuid = inUUID;
            actionInfo = JSON.parse(inActionInfo);
            settings = actionInfo.payload.settings || {};
            
            // Update UI with saved settings
            const sceneSelect = document.getElementById('sceneName');
            if(settings.sceneName) {
                sceneSelect.value = settings.sceneName;
            }
            
            // Connect to Stream Deck
            websocket = new WebSocket('ws://localhost:' + inPort);
            
            websocket.onopen = function() {
                const json = {
                    event: inRegisterEvent,
                    uuid: inUUID
                };
                websocket.send(JSON.stringify(json));
                
                // Request scenes list
                refreshScenes();
            };
        }
        
        function refreshScenes() {
            // In a real implementation, this would request the scenes list from TikControl
            // For now, we'll just use a placeholder
            const sceneSelect = document.getElementById('sceneName');
            const currentValue = sceneSelect.value;
            
            // Clear options
            sceneSelect.innerHTML = '<option value="">Select a scene...</option>';
            
            // Add some example scenes (these would come from TikControl/OBS)
            const exampleScenes = ['Gaming', 'Starting Soon', 'BRB', 'Ending', 'Chat'];
            exampleScenes.forEach(scene => {
                const option = document.createElement('option');
                option.value = scene;
                option.textContent = scene;
                sceneSelect.appendChild(option);
            });
            
            // Restore selection if it exists
            if(currentValue && Array.from(sceneSelect.options).some(opt => opt.value === currentValue)) {
                sceneSelect.value = currentValue;
            }
        }
        
        // Handle scene selection
        document.getElementById('sceneName').addEventListener('change', function(e) {
            settings.sceneName = e.target.value;
            saveSettings();
        });
        
        function saveSettings() {
            if(websocket && websocket.readyState === WebSocket.OPEN) {
                const json = {
                    event: 'setSettings',
                    context: uuid,
                    payload: settings
                };
                websocket.send(JSON.stringify(json));
            }
        }
        
        // Expose function for Stream Deck to call
        window.connectElgatoStreamDeckSocket = connectElgatoStreamDeckSocket;
    </script>
</body>
</html>
