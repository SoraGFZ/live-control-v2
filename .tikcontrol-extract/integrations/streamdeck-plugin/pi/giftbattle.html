<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥊 Gift Battle Reset - TikControl</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-size: 13px;
            color: #d4d4d4;
            background: transparent;
            padding: 16px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .info {
            padding: 12px;
            background: rgba(58, 58, 58, 0.5);
            border-radius: 6px;
            border-left: 3px solid #ff6b6b;
        }
        
        .info-title {
            font-size: 12px;
            font-weight: 600;
            color: #ff6b6b;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .info-text {
            font-size: 12px;
            color: #b4b4b4;
            line-height: 1.5;
        }
        
        .help-text {
            font-size: 11px;
            color: #7a7a7a;
            line-height: 1.4;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">
            <div class="info-title">🥊 Gift Battle Reset</div>
            <div class="info-text">
                Este botón resetea los puntajes de ambos equipos a 0.
            </div>
        </div>
        
        <div class="help-text">
            ⚠️ No hay opciones configurables. Al presionar el botón, los scores de ambos equipos se resetean inmediatamente.
        </div>
    </div>
    
    <script>
        let websocket = null;
        let uuid = null;
        let actionInfo = null;
        let settings = {};
        
        function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
            uuid = inUUID;
            actionInfo = JSON.parse(inActionInfo);
            settings = actionInfo.payload.settings || {};
            
            // Connect to Stream Deck
            websocket = new WebSocket('ws://localhost:' + inPort);
            
            websocket.onopen = function() {
                const json = {
                    event: inRegisterEvent,
                    uuid: inUUID
                };
                websocket.send(JSON.stringify(json));
            };
        }
        
        function saveSettings() {
            if(websocket && websocket.readyState === WebSocket.OPEN) {
                const json = {
                    event: 'setSettings',
                    context: uuid,
                    payload: settings
                };
                websocket.send(JSON.stringify(json));
            }
        }
        
        // Expose function for Stream Deck to call
        window.connectElgatoStreamDeckSocket = connectElgatoStreamDeckSocket;
    </script>
</body>
</html>
