<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ Win/Life - TikControl</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-size: 13px;
            color: #d4d4d4;
            background: transparent;
            padding: 16px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        label {
            font-size: 12px;
            font-weight: 500;
            color: #9d9d9d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        select, input[type="number"] {
            background: #3a3a3a;
            border: 1px solid #4a4a4a;
            border-radius: 4px;
            color: #d4d4d4;
            padding: 8px 10px;
            font-size: 13px;
            font-family: inherit;
            width: 100%;
            transition: all 0.2s;
        }
        
        select {
            color-scheme: dark;
        }
        
        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #0e99e5;
            background: #424242;
        }
        
        .help-text {
            font-size: 11px;
            color: #7a7a7a;
            line-height: 1.4;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="field">
            <label for="action">Action</label>
            <select id="action">
                <option value="add_win">➕ Add Win</option>
                <option value="subtract_win">➖ Subtract Win</option>
                <option value="random_win">🎲 Random Win</option>
                <option value="add_life">➕ Add Life</option>
                <option value="subtract_life">➖ Subtract Life</option>
                <option value="random_life">🎲 Random Life</option>
            </select>
            <div class="help-text">Choose the Win/Life action to perform</div>
        </div>
        
        <div class="field" id="amountField">
            <label for="amount">Amount</label>
            <input type="number" id="amount" min="1" max="100" value="1" />
            <div class="help-text" id="amountHelp">Amount to add or subtract (1-100)</div>
        </div>
    </div>
    
    <script>
        let websocket = null;
        let uuid = null;
        let actionInfo = null;
        let settings = {};
        
        function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
            uuid = inUUID;
            actionInfo = JSON.parse(inActionInfo);
            settings = actionInfo.payload.settings || {};
            
            // Update UI with saved settings
            const actionSelect = document.getElementById('action');
            const amountInput = document.getElementById('amount');
            
            if(settings.action) {
                actionSelect.value = settings.action;
            }
            
            if(settings.amount) {
                amountInput.value = settings.amount;
            }
            
            // Update visibility
            updateAmountVisibility();
            
            // Connect to Stream Deck
            websocket = new WebSocket('ws://localhost:' + inPort);
            
            websocket.onopen = function() {
                const json = {
                    event: inRegisterEvent,
                    uuid: inUUID
                };
                websocket.send(JSON.stringify(json));
            };
        }
        
        function updateAmountVisibility() {
            const action = document.getElementById('action').value;
            const amountField = document.getElementById('amountField');
            const amountHelp = document.getElementById('amountHelp');
            const amountInput = document.getElementById('amount');
            
            // Siempre mostrar el campo de cantidad
            amountField.style.display = 'flex';
            
            // Cambiar el texto de ayuda según la acción
            if(action === 'random_win' || action === 'random_life') {
                amountHelp.textContent = 'Random range: ±1 to ±amount (e.g., 5 = random between -5 and +5)';
                amountInput.placeholder = '5';
            } else {
                amountHelp.textContent = 'Amount to add or subtract (1-100)';
                amountInput.placeholder = '1';
            }
        }
        
        // Handle action selection
        document.getElementById('action').addEventListener('change', function(e) {
            settings.action = e.target.value;
            updateAmountVisibility();
            saveSettings();
        });
        
        // Handle amount change
        document.getElementById('amount').addEventListener('input', function(e) {
            settings.amount = parseInt(e.target.value) || 1;
            saveSettings();
        });
        
        function saveSettings() {
            if(websocket && websocket.readyState === WebSocket.OPEN) {
                const json = {
                    event: 'setSettings',
                    context: uuid,
                    payload: settings
                };
                websocket.send(JSON.stringify(json));
            }
        }
        
        // Expose function for Stream Deck to call
        window.connectElgatoStreamDeckSocket = connectElgatoStreamDeckSocket;
    </script>
</body>
</html>
