<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Execute Action - TikControl</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-size: 13px;
            color: #d4d4d4;
            background: transparent;
            padding: 16px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        label {
            font-size: 12px;
            font-weight: 500;
            color: #9d9d9d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        select {
            background: #3a3a3a;
            border: 1px solid #4a4a4a;
            border-radius: 4px;
            color: #d4d4d4;
            padding: 8px 10px;
            font-size: 13px;
            font-family: inherit;
            width: 100%;
            transition: all 0.2s;
            color-scheme: dark;
        }
        
        select:focus {
            outline: none;
            border-color: #0e99e5;
            background: #424242;
        }
        
        .help-text {
            font-size: 11px;
            color: #7a7a7a;
            line-height: 1.4;
            margin-top: 4px;
        }
        
        .info-box {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 6px;
            padding: 12px;
            font-size: 12px;
            line-height: 1.5;
        }
        
        .info-box strong {
            color: #10b981;
            display: block;
            margin-bottom: 8px;
        }
        
        .refresh-btn {
            background: #0e99e5;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover {
            background: #0c7ab8;
        }
        
        .refresh-btn:active {
            transform: scale(0.98);
        }
        
        .action-preview {
            margin-top: 8px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            font-size: 11px;
            color: #a8dadc;
        }
        
        .action-preview div {
            padding: 2px 0;
        }
        
        .action-preview strong {
            color: #0e99e5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info-box">
            <strong>🎯 Execute Action</strong>
            Ejecuta cualquier acción configurada en TikControl con todos sus efectos (sonidos, imágenes, comandos, etc.).
        </div>
        
        <div class="field">
            <label for="actionSelect">Acción</label>
            <select id="actionSelect">
                <option value="">Loading actions...</option>
            </select>
            <div class="help-text">Selecciona una acción de Acciones y Eventos</div>
        </div>
        
        <button class="refresh-btn" onclick="refreshActions()">
            🔄 Refresh Actions
        </button>
        
        <div id="actionPreview" class="action-preview" style="display:none;">
            <strong>Vista previa:</strong>
            <div id="previewContent"></div>
        </div>
    </div>
    
    <script>
        let websocket = null;
        let tikcontrolWs = null;
        let uuid = null;
        let actionInfo = null;
        let settings = {};
        let allActions = [];
        
        function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
            uuid = inUUID;
            actionInfo = JSON.parse(inActionInfo);
            settings = actionInfo.payload.settings || {};
            
            console.log('[PI executeaction] 🔧 Settings cargados:', settings);
            console.log('[PI executeaction] 📝 actionId:', settings.actionId);
            
            // Connect to Stream Deck
            websocket = new WebSocket('ws://localhost:' + inPort);
            
            websocket.onopen = function() {
                const json = {
                    event: inRegisterEvent,
                    uuid: inUUID
                };
                websocket.send(JSON.stringify(json));
                
                console.log('[PI executeaction] ✅ Conectado a Stream Deck');
                
                // Request actions list (this will restore selection)
                refreshActions();
            };
            
            websocket.onerror = function(e) {
                console.error('[PI executeaction] ❌ Error WebSocket:', e);
            };
        }
        
        function refreshActions() {
            // Connect to TikControl to get actions
            if(tikcontrolWs && tikcontrolWs.readyState === WebSocket.OPEN) {
                tikcontrolWs.close();
            }
            
            tikcontrolWs = new WebSocket('ws://localhost:9091');
            
            tikcontrolWs.onopen = function() {
                console.log('[PI] Connected to TikControl');
                tikcontrolWs.send(JSON.stringify({
                    type: 'get_actions_list'
                }));
            };
            
            tikcontrolWs.onmessage = function(evt) {
                try {
                    const data = JSON.parse(evt.data);
                    if(data.type === 'actions_list') {
                        updateActionsList(data.data || []);
                    }
                } catch(e) {
                    console.error('[PI] Error parsing message:', e);
                }
            };
            
            tikcontrolWs.onerror = function() {
                console.error('[PI] Error connecting to TikControl');
                const select = document.getElementById('actionSelect');
                select.innerHTML = '<option value="">Error: TikControl not running</option>';
            };
        }
        
        function updateActionsList(actions) {
            allActions = actions;
            const actionSelect = document.getElementById('actionSelect');
            const currentValue = settings.actionId || '';
            
            console.log('[PI executeaction] 📦 Actualizando lista de acciones');
            console.log('[PI executeaction] 🔍 currentValue (settings.actionId):', currentValue);
            console.log('[PI executeaction] 📊 Acciones recibidas:', actions.length);
            
            actionSelect.innerHTML = '<option value="">Select an action...</option>';
            
            if(actions.length === 0) {
                actionSelect.innerHTML = '<option value="">No actions configured</option>';
                console.log('[PI executeaction] ⚠️ No hay acciones configuradas');
                return;
            }
            
            actions.forEach(action => {
                const option = document.createElement('option');
                option.value = action.id;
                option.textContent = action.name || action.id;
                
                console.log('[PI executeaction] 🔍 Comparando:', {
                    actionId: action.id,
                    currentValue: currentValue,
                    matches: action.id === currentValue
                });
                
                if(action.id === currentValue) {
                    option.selected = true;
                    console.log('[PI executeaction] ✅ Marcando como seleccionado:', action.name);
                }
                actionSelect.appendChild(option);
            });
            
            // Restore selection if it exists
            if(currentValue) {
                console.log('[PI executeaction] 🔄 Restaurando selección:', currentValue);
                actionSelect.value = currentValue;
                console.log('[PI executeaction] 📝 Valor final del select:', actionSelect.value);
                updatePreview(currentValue);
            }
        }
        
        function updatePreview(actionId) {
            const preview = document.getElementById('actionPreview');
            const content = document.getElementById('previewContent');
            
            if(!actionId) {
                preview.style.display = 'none';
                return;
            }
            
            const action = allActions.find(a => a.id === actionId);
            if(!action) {
                preview.style.display = 'none';
                return;
            }
            
            let html = `<div><strong>Name:</strong> ${action.name || action.id}</div>`;
            
            if(action.type) {
                html += `<div><strong>Type:</strong> ${action.type}</div>`;
            }
            
            if(action.enabled !== undefined) {
                html += `<div><strong>Enabled:</strong> ${action.enabled ? 'Yes' : 'No'}</div>`;
            }
            
            content.innerHTML = html;
            preview.style.display = 'block';
        }
        
        // Handle action selection
        document.getElementById('actionSelect').addEventListener('change', function(e) {
            const selectedValue = e.target.value;
            const selectedText = e.target.options[e.target.selectedIndex].text;
            
            // Solo guardar si hay un valor válido (no vacío, no "undefined", no "null")
            if(selectedValue && selectedValue !== '' && selectedValue !== 'undefined' && selectedValue !== 'null') {
                settings.actionId = selectedValue;
                settings.actionName = selectedText;
                console.log('[PI] ✅ Acción seleccionada:', selectedText, '(ID:', selectedValue + ')');
            } else {
                // Si no hay selección válida, limpiar settings
                delete settings.actionId;
                delete settings.actionName;
                console.log('[PI] ⚠️ No hay acción seleccionada');
            }
            
            updatePreview(selectedValue);
            saveSettings();
        });
        
        function saveSettings() {
            if(websocket && websocket.readyState === WebSocket.OPEN) {
                const json = {
                    event: 'setSettings',
                    context: uuid,
                    payload: settings
                };
                websocket.send(JSON.stringify(json));
            }
        }
        
        // Expose function for Stream Deck to call
        window.connectElgatoStreamDeckSocket = connectElgatoStreamDeckSocket;
        window.refreshActions = refreshActions;
    </script>
</body>
</html>
