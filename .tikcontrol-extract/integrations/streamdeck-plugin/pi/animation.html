<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Animation - TikControl</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-size: 13px;
            color: #d4d4d4;
            background: transparent;
            padding: 16px;
        }
        .container { display: flex; flex-direction: column; gap: 12px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label {
            font-size: 12px; font-weight: 500; color: #9d9d9d;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        select {
            background: #3a3a3a; border: 1px solid #4a4a4a; border-radius: 4px;
            color: #d4d4d4; padding: 8px 10px; font-size: 13px;
            font-family: inherit; width: 100%; transition: all 0.2s; color-scheme: dark;
        }
        select:focus { outline: none; border-color: #0e99e5; background: #424242; }
        .help-text { font-size: 11px; color: #7a7a7a; line-height: 1.4; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="field">
            <label for="animationType">Animation Type</label>
            <select id="animationType">
                <option value="x2">X2</option>
                <option value="x3">X3</option>
                <option value="guantes">Guantes</option>
                <option value="cofre">Cofre</option>
                <option value="snipe">Snipe</option>
                <option value="taptap">Tap Tap</option>
                <option value="quiereme">Quiereme</option>
                <option value="enigma">Enigma</option>
            </select>
            <div class="help-text">Select which animation to play when the button is pressed</div>
        </div>
    </div>

    <script>
        let websocket = null;
        let uuid = null;
        let actionInfo = null;
        let settings = {};

        function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
            uuid = inUUID;
            actionInfo = JSON.parse(inActionInfo);
            settings = actionInfo.payload.settings || {};

            const sel = document.getElementById('animationType');
            if (settings.animationType) sel.value = settings.animationType;

            websocket = new WebSocket('ws://localhost:' + inPort);
            websocket.onopen = function() {
                websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
            };
        }

        document.getElementById('animationType').addEventListener('change', function(e) {
            settings.animationType = e.target.value;
            saveSettings();
        });

        function saveSettings() {
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                websocket.send(JSON.stringify({ event: 'setSettings', context: uuid, payload: settings }));
            }
        }

        window.connectElgatoStreamDeckSocket = connectElgatoStreamDeckSocket;
    </script>
</body>
</html>
