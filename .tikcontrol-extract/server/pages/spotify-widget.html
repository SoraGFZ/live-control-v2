<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Widget - TikControl</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: transparent;
      overflow: hidden;
      color: #fff;
    }

    #spotify-widget {
      position: absolute;
      display: none;
      max-width: 100vw;
      animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #spotify-widget.visible {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    @keyframes slideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* Contenedor de la carátula */
    .album-container {
      position: relative;
      flex-shrink: 0;
    }

    .album-art {
      width: var(--album-size, 180px);
      height: var(--album-size, 180px);
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      border: 3px solid rgba(255, 255, 255, 0.1);
    }

    /* Borde animado cuando está reproduciendo */
    .album-art.playing {
      animation: albumPulse 2s ease-in-out infinite;
    }

    @keyframes albumPulse {
      0%, 100% {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 0 0 rgba(29, 185, 84, 0.7);
      }
      50% {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 0 8px rgba(29, 185, 84, 0);
      }
    }

    /* Contenedor de información */
    .info-container {
      flex: 1 1 0;
      min-width: 0;
      max-width: 420px;
    }

    /* Nickname del usuario */
    .added-by {
      font-size: var(--nickname-size, 18px);
      font-weight: 700;
      color: var(--nickname-color, #1DB954);
      margin-bottom: 12px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--custom-font, 'Segoe UI'), sans-serif;
    }

    /* Nombre de la canción */
    .track-name {
      font-size: var(--track-size, 32px);
      font-weight: 900;
      color: var(--track-color, #FFFFFF);
      margin-bottom: 8px;
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.9);
      line-height: 1.2;
      font-family: var(--custom-font, 'Segoe UI'), sans-serif;
      overflow: hidden;
      overflow-wrap: anywhere;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* Nombre del artista */
    .track-artist {
      font-size: var(--artist-size, 24px);
      font-weight: 600;
      color: var(--artist-color, #B3B3B3);
      margin-bottom: 16px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      font-family: var(--custom-font, 'Segoe UI'), sans-serif;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Barra de progreso */
    .progress-container {
      margin-top: 12px;
      min-width: 0;
      width: 100%;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 8px;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--progress-color, #1DB954), var(--progress-color-end, #1ed760));
      border-radius: 999px;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px rgba(29, 185, 84, 0.5);
    }

    .progress-time {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      font-family: var(--custom-font, 'Segoe UI'), sans-serif;
    }

    /* Icono de música */
    .music-icon {
      display: inline-block;
      font-size: 1.2em;
      animation: musicBounce 1s ease-in-out infinite;
    }

    @keyframes musicBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    /* Layout horizontal (por defecto) */
    #spotify-widget.layout-horizontal {
      flex-direction: row;
      top: var(--widget-top, 20px);
      left: var(--widget-left, 20px);
      right: auto;
      bottom: auto;
      width: max-content;
      max-width: calc(100vw - var(--widget-left, 20px) - 16px);
    }

    /* Layout vertical */
    #spotify-widget.layout-vertical {
      flex-direction: column;
      text-align: center;
      top: var(--widget-top, 20px);
      left: var(--widget-left, 20px);
      right: auto;
      bottom: auto;
    }

    #spotify-widget.layout-vertical .info-container {
      min-width: auto;
    }

    #spotify-widget.layout-vertical .added-by {
      justify-content: center;
    }

    #spotify-widget.layout-vertical .progress-time {
      justify-content: space-between;
      width: 100%;
    }

    /* Fondo opcional */
    #spotify-widget.with-background {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.85), rgba(20, 20, 20, 0.85));
      padding: 24px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <div id="spotify-widget" class="layout-horizontal">
    <div class="album-container">
      <img id="album-art" 
           alt="Album Art" 
           class="album-art"
           onerror="this.style.display='none'">
    </div>
    
    <div class="info-container">
      <div id="added-by" class="added-by"></div>
      <div id="track-name" class="track-name"></div>
      <div id="track-artist" class="track-artist"></div>
      
      <div class="progress-container" id="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-time">
          <span id="current-time">0:00</span>
          <span id="total-time">0:00</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const widget = document.getElementById('spotify-widget');
    const albumArt = document.getElementById('album-art');
    const trackName = document.getElementById('track-name');
    const trackArtist = document.getElementById('track-artist');
    const addedBy = document.getElementById('added-by');
    const progressFill = document.getElementById('progress-fill');
    const currentTimeEl = document.getElementById('current-time');
    const totalTimeEl = document.getElementById('total-time');
    const progressContainer = document.getElementById('progress-container');
    
    let currentTrack = null;
    let isPlaying = false;
    let position = 0;
    let duration = 0;
    let progressInterval = null;
    let stateRefreshInterval = null;
    let config = {};
    let lastConfigString = '';

    // Cargar configuración desde localStorage (mismo patrón que top-gift)
    async function loadConfig() {
      try {
        // 1. Intentar cargar desde widget:spotify-queue:config (mismo patrón que top-gift)
        const widgetConfig = localStorage.getItem(getConfigStorageKey());
        if (widgetConfig) {
          config = JSON.parse(widgetConfig);
          // Log de config eliminado
        } else {
          // 2. Fallback: cargar desde perfil (para compatibilidad)
          const profileId = localStorage.getItem('currentProfile') || getProfileFromUrl();
          if (profileId) {
            const profileKey = `profile_${profileId}`;
            const profile = JSON.parse(localStorage.getItem(profileKey) || '{}');
            config = profile.widgets?.spotifyWidget || {};
            // Log de config fallback eliminado
          }
        }

        const serverProfileId = getProfileFromUrl();
        const query = serverProfileId ? `?profileId=${encodeURIComponent(serverProfileId)}` : '';
        const response = await fetch(`/api/spotify/widget-config${query}`, {
          headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
          const data = await response.json();
          if (data?.success && data.config && Object.keys(data.config).length > 0) {
            config = { ...config, ...data.config };
            localStorage.setItem(getConfigStorageKey(), JSON.stringify(config));
          }
        }
      } catch (e) {
        console.error('[Spotify Widget] ❌ Error loading config:', e);
        config = {};
      }
      
      applyConfig();
      
      // Inicializar el string de comparación para polling
      lastConfigString = JSON.stringify(config);
    }

    function getProfileFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('profileId');
    }

    function getConfigStorageKey() {
      const profileId = getProfileFromUrl();
      return profileId ? `widget:spotify-queue:config:${profileId}` : 'widget:spotify-queue:config';
    }

    function applyConfig() {
      const root = document.documentElement;
      
      // Tamaños
      root.style.setProperty('--album-size', `${config.albumSize || 180}px`);
      root.style.setProperty('--track-size', `${config.trackSize || 32}px`);
      root.style.setProperty('--artist-size', `${config.artistSize || 24}px`);
      root.style.setProperty('--nickname-size', `${config.nicknameSize || 18}px`);
      
      // Colores
      root.style.setProperty('--track-color', config.trackColor || '#FFFFFF');
      root.style.setProperty('--artist-color', config.artistColor || '#B3B3B3');
      root.style.setProperty('--nickname-color', config.nicknameColor || '#1DB954');
      root.style.setProperty('--progress-color', config.progressColor || '#1DB954');
      root.style.setProperty('--progress-color-end', config.progressColorEnd || '#1ed760');
      
      // Posición
      if (config.position) {
        root.style.setProperty('--widget-top', config.position.top || '20px');
        root.style.setProperty('--widget-left', config.position.left || '20px');
        root.style.setProperty('--widget-right', config.position.right || '20px');
      }
      
      // Layout
      if (config.layout === 'vertical') {
        widget.classList.remove('layout-horizontal');
        widget.classList.add('layout-vertical');
      } else {
        widget.classList.remove('layout-vertical');
        widget.classList.add('layout-horizontal');
      }
      
      // Fondo
      if (config.showBackground) {
        widget.classList.add('with-background');
      } else {
        widget.classList.remove('with-background');
      }
      
      // Mostrar/ocultar progreso
      if (config.hideProgress) {
        progressContainer.style.display = 'none';
      } else {
        progressContainer.style.display = 'block';
      }
      
      // Fuente personalizada (mismo sistema que top-gift)
      if (config.fontFamily) {
        if (config.fontUrl) {
          // Fuente personalizada con URL
          loadCustomFont(config.fontFamily, config.fontUrl);
        } else {
          // Fuente predeterminada (sin URL, aplicar directamente con CSS)
          const oldStyle = document.getElementById('spotify-custom-font');
          if (oldStyle) oldStyle.remove();
          document.documentElement.style.setProperty('--custom-font', `'${config.fontFamily}'`);
          // Log de font eliminado
        }
      } else {
        // Limpiar fuente si no hay ninguna seleccionada
        const oldStyle = document.getElementById('spotify-custom-font');
        if (oldStyle) oldStyle.remove();
        document.documentElement.style.setProperty('--custom-font', `'Segoe UI'`);
      }
      
      // Re-renderizar nickname si está visible para aplicar nuevos estilos
      if (currentTrack) {
        const addedByEl = document.getElementById('added-by');
        const showNickname = config.hideNickname !== true;
        if (addedByEl) {
          if (showNickname) {
            const nicknameText = currentTrack.addedBy?.nickname || 'Spotify';
            addedByEl.innerHTML = `<span class="music-icon">🎵</span>${nicknameText}`;
            addedByEl.style.display = 'flex';
          } else {
            addedByEl.style.display = 'none';
          }
        }
      }
      
      // Log de config applied eliminado
    }

    function loadCustomFont(fontName, fontUrl) {
      if (!fontName || !fontUrl) {
        // Si no hay fuente, usar sistema por defecto
        const oldStyle = document.getElementById('spotify-custom-font');
        if (oldStyle) oldStyle.remove();
        document.documentElement.style.setProperty('--custom-font', `'Segoe UI'`);
        return;
      }
      
      const style = document.createElement('style');
      style.id = 'spotify-custom-font';
      
      // Detectar formato del archivo
      const url = fontUrl;
      let format = '';
      if (url.includes('.woff2')) format = 'woff2';
      else if (url.includes('.woff')) format = 'woff';
      else if (url.includes('.ttf')) format = 'truetype';
      else if (url.includes('.otf')) format = 'opentype';
      
      const formatFragment = format ? ` format('${format}')` : '';
      style.textContent = `
        @font-face {
          font-family: '${fontName}';
          src: url('${url}')${formatFragment};
          font-display: swap;
        }
      `;
      
      // Remover fuente anterior si existe
      const oldStyle = document.getElementById('spotify-custom-font');
      if (oldStyle) oldStyle.remove();
      
      document.head.appendChild(style);
      document.documentElement.style.setProperty('--custom-font', `'${fontName}'`);
      // Log de font loaded eliminado
    }

    // Conectar a Socket.IO - directo por WebSocket (sin polling) para evitar "Invalid frame header"
    const socket = io('http://127.0.0.1:43123', {
      transports: ['websocket'],
      upgrade: false
    });

    socket.on('connect', () => {
      // Log de conexión eliminado
      loadConfig();
      loadInitialState();
    });

    socket.on('spotify:track-update', (data) => {
      // Log de track eliminado
      if (data.current) {
        currentTrack = data.current;
        isPlaying = data.isPlaying;
        position = data.position || 0;
        duration = data.current.duration || 0;
        renderTrack();
        
        if (isPlaying) {
          startProgressUpdate();
        } else {
          stopProgressUpdate();
        }
      }
    });

    socket.on('spotify:now-playing', (track) => {
      // Log de now playing eliminado
      currentTrack = track;
      isPlaying = true;
      position = 0;
      duration = track.duration || 0;
      renderTrack();
      startProgressUpdate();
    });

    socket.on('spotify:playback-state', (data) => {
      // Log de playback eliminado
      isPlaying = data.isPlaying;
      
      if (isPlaying) {
        startProgressUpdate();
        albumArt.classList.add('playing');
      } else {
        stopProgressUpdate();
        albumArt.classList.remove('playing');
      }
    });
    
    // Listener para cambios de configuración en tiempo real
    socket.on('spotify:widget-config-updated', (payload) => {
      // Log de config updated eliminado
      const currentProfileId = getProfileFromUrl();
      if (currentProfileId && payload?.profileId && payload.profileId !== currentProfileId) return;
      const newConfig = payload?.config || payload || {};
      config = newConfig;
      lastConfigString = JSON.stringify(newConfig);
      
      // Guardar en localStorage para que persista
      try {
        localStorage.setItem(getConfigStorageKey(), JSON.stringify(newConfig));
      } catch (e) {
        console.error('[Spotify Widget] ❌ Error saving config to localStorage:', e);
      }
      
      applyConfig();
      
      // Re-renderizar si hay track actual
      if (currentTrack) {
        renderTrack();
      }
    });
    
    // Polling para detectar cambios en localStorage (para cuando el widget está en OBS)
    setInterval(() => {
      try {
        // Cargar configuración desde widget:spotify-queue:config
        const widgetConfigStr = localStorage.getItem(getConfigStorageKey());
        
        // Solo aplicar si realmente cambió y no es vacío
        if (widgetConfigStr && widgetConfigStr !== lastConfigString && widgetConfigStr !== '{}') {
          // Log de config changed eliminado
          config = JSON.parse(widgetConfigStr);
          lastConfigString = widgetConfigStr;
          applyConfig();
          
          // Re-renderizar si hay track actual
          if (currentTrack) {
            renderTrack();
          }
        }
      } catch (e) {
        console.error('[Spotify Widget] ❌ Error in polling:', e);
      }
    }, 1000); // Cada 1 segundo

    async function loadInitialState() {
      try {
        const response = await fetch('/api/spotify/status', {
          headers: { 'Accept': 'application/json' }
        });
        const contentType = response.headers.get('content-type') || '';
        if (!response.ok || !contentType.includes('application/json')) {
          console.warn('[Spotify Widget] Initial state unavailable:', response.status, response.statusText);
          return;
        }
        const data = await response.json();
        
        if (data.success && data.track) {
          // Log de initial state eliminado
          currentTrack = data.track;
          isPlaying = data.isPlaying;
          position = data.position || 0;
          duration = data.track.duration || 0;
          renderTrack();
          
          if (isPlaying) {
            startProgressUpdate();
          }
        }
      } catch (error) {
        console.error('[Spotify Widget] ❌ Error loading initial state:', error);
      }
    }

    function renderTrack() {
      if (!currentTrack) {
        widget.classList.remove('visible');
        return;
      }

      // Carátula
      if (currentTrack.albumArt) {
        albumArt.src = currentTrack.albumArt;
        albumArt.style.display = 'block';
      } else {
        albumArt.removeAttribute('src');
        albumArt.style.display = 'none';
      }

      // Nickname
      const nicknameText = currentTrack.addedBy?.nickname 
        ? `${currentTrack.addedBy.nickname}` 
        : 'Spotify';
      
      const showNickname = config.hideNickname !== true;
      if (showNickname) {
        addedBy.innerHTML = `<span class="music-icon">🎵</span>${nicknameText}`;
        addedBy.style.display = 'flex';
      } else {
        addedBy.style.display = 'none';
      }

      // Nombre de la canción
      trackName.textContent = currentTrack.name || '';

      // Artista
      trackArtist.textContent = currentTrack.artist || '';

      // Tiempo total
      totalTimeEl.textContent = formatTime(duration);

      widget.classList.add('visible');
      
      if (isPlaying) {
        albumArt.classList.add('playing');
      } else {
        albumArt.classList.remove('playing');
      }
      
      updateProgress();
    }

    function startProgressUpdate() {
      stopProgressUpdate();
      progressInterval = setInterval(() => {
        if (isPlaying) {
          position += 1000;
          updateProgress();
        }
      }, 1000);
    }

    function stopProgressUpdate() {
      if (progressInterval) {
        clearInterval(progressInterval);
        progressInterval = null;
      }
    }

    function updateProgress() {
      if (duration > 0) {
        const safePosition = Math.min(Math.max(position, 0), duration);
        const percentage = Math.min(100, (safePosition / duration) * 100);
        progressFill.style.width = `${percentage}%`;
        currentTimeEl.textContent = formatTime(safePosition);
      }
    }

    function formatTime(ms) {
      const safeMs = Number.isFinite(ms) && ms > 0 ? ms : 0;
      const seconds = Math.floor(safeMs / 1000);
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // Limpiar al cerrar
    window.addEventListener('beforeunload', () => {
      stopProgressUpdate();
      if (stateRefreshInterval) clearInterval(stateRefreshInterval);
      socket.disconnect();
    });

    // Cargar configuración inicial
    loadConfig();
    stateRefreshInterval = setInterval(loadInitialState, 5000);
  </script>
</body>
</html>
