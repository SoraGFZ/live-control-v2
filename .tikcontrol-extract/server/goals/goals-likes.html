<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Likes Goal - TikControl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: transparent;
        }

        .goals-widget-container {
            width: 100%;
            height: 100%;
            min-height: 100px; /* ✅ Altura mínima garantizada */
            position: relative;
            padding: 5%;
            box-sizing: border-box;
        }

        .goals-bar-container {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 80px; /* ✅ Altura mínima para que siempre sea visible */
            aspect-ratio: 8 / 1; /* ✅ Mantener proporción 8:1 (ancho:alto) */
            overflow: hidden;
        }

        .goals-bar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; /* Cubrir todo el contenedor */
            z-index: 2;
            pointer-events: none;
            display: none;
        }

        .goals-bar-progress-wrapper {
            position: absolute;
            top: 28%;
            left: 7%;
            right: 7%;
            bottom: 28%;
            width: unset;
            height: unset;
            z-index: 1;
            overflow: hidden;
            border-radius: 4px;
        }


        .goals-bar-container.style-metas {
            width: min(100%, 1040px);
            height: auto;
            margin: 0 auto;
            aspect-ratio: 1472 / 150;
            min-height: 0;
            max-height: none;
        }

        .goals-bar-container.style-metas .goals-bar-progress-wrapper {
            top: 11%;
            left: 2.55%;
            right: 2.65%;
            bottom: 46%;
            border-radius: 999px;
        }

        .goals-bar-container.style-metas .goals-bar-overlay {
            height: 64%;
            z-index: 4;
        }

        .goals-bar-container.style-metas .goals-bar-text {
            top: 31.5%;
            z-index: 5;
        }
                .goals-bar-container.style-fantasy-frame {
            width: min(100%, 1040px);
            height: auto;
            margin: 0 auto;
            aspect-ratio: var(--goal-frame-aspect, 1472 / 91);
            min-height: 0;
            max-height: none;
        }

        .goals-bar-container.style-fantasy-frame .goals-bar-progress-wrapper {
            top: var(--goal-frame-bar-top, 30%);
            left: var(--goal-frame-bar-left, 7%);
            right: var(--goal-frame-bar-right, 7%);
            bottom: var(--goal-frame-bar-bottom, 20%);
            border-radius: 999px;
        }

        .goals-bar-container.style-fantasy-frame .goals-bar-overlay {
            height: 100%;
            z-index: 4;
        }

        .goals-bar-container.style-fantasy-frame .goals-bar-text {
            top: var(--goal-frame-text-top, 50%);
            z-index: 5;
        }

.goals-bar-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #2cb2d4;
        }

        .goals-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: #ff0099; /* Color sólido sin degradado */
            transition: none; /* Sin transición CSS - la animación JS es más rápida */
            width: 0%;
        }

        .goals-bar-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: clamp(12px, 3vh, 48px); /* ✅ Tamaño adaptable con límites */
            font-weight: 700;
            z-index: 3;
            white-space: nowrap;
            /* ✅ NO definir text-shadow aquí - se aplica dinámicamente con JS */
        }

        /* Patrón de fondo */
        .goals-bar-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.5;
            pointer-events: none;
        }

        /* Efecto Rainbow */
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .rainbow {
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
            background-size: 200% 100%;
            animation: rainbow 3s linear infinite;
        }

        /* Animaciones al alcanzar objetivo */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes flash {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0; }
        }

        @keyframes tada {
            0% { transform: scale(1) rotate(0deg); }
            10%, 20% { transform: scale(0.9) rotate(-3deg); }
            30%, 50%, 70%, 90% { transform: scale(1.1) rotate(3deg); }
            40%, 60%, 80% { transform: scale(1.1) rotate(-3deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        @keyframes jello {
            0%, 100% { transform: skewX(0deg) skewY(0deg); }
            30% { transform: skewX(25deg) skewY(25deg); }
            40% { transform: skewX(-15deg) skewY(-15deg); }
            50% { transform: skewX(15deg) skewY(15deg); }
            65% { transform: skewX(-5deg) skewY(-5deg); }
            75% { transform: skewX(5deg) skewY(5deg); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        .shake { animation: shake 0.5s ease-in-out 3; }
        .bounce { animation: bounce 0.6s ease-in-out 3; }
        .pulse { animation: pulse 0.5s ease-in-out 3; }
        .flash { animation: flash 0.8s ease-in-out 2; }
        .tada { animation: tada 1s ease-in-out 1; }
        .jello { animation: jello 0.9s ease-in-out 1; }
        .heartbeat { animation: heartbeat 1.3s ease-in-out 1; }

        /* Animaciones al cambiar objetivo */
        @keyframes flip {
            0% { transform: perspective(400px) rotateY(0); }
            50% { transform: perspective(400px) rotateY(180deg); }
            100% { transform: perspective(400px) rotateY(0); }
        }

        @keyframes fadeInOut {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes slideUp {
            0% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-30px); opacity: 0; }
            51% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes zoomOut {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0); opacity: 0; }
            51% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes rotateOut {
            0% { transform: rotate(0deg); opacity: 1; }
            50% { transform: rotate(360deg); opacity: 0; }
            51% { transform: rotate(-360deg); opacity: 0; }
            100% { transform: rotate(0deg); opacity: 1; }
        }

        .flip { animation: flip 0.8s ease-in-out; }
        .fadeInOut { animation: fadeInOut 0.8s ease-in-out; }
        .slideUp { animation: slideUp 0.8s ease-in-out; }
        .zoomOut { animation: zoomOut 0.8s ease-in-out; }
        .rotateOut { animation: rotateOut 0.8s ease-in-out; }

        /* ─── Modo radial / compacto ───────────────────────────────────
           Activado cuando settings.widgetType === 'compact'. El JS pone
           data-mode="compact" en el body y el CSS oculta la barra y
           muestra el card radial. La URL del widget NO cambia — el
           creador siempre pega goals-likes.html y el modo se decide
           desde la config persistida. */
        body[data-mode="compact"] .goals-widget-container,
        body[data-mode="compact"] .goals-bar-container { display: none; }
        body:not([data-mode="compact"]) .goals-compact-container { display: none; }

        .goals-compact-container {
            width: 100%; height: 100%;
            min-height: 80px;
            padding: 4%;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .goals-compact-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(15, 18, 25, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 12px 18px 12px 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            max-width: 100%;
        }
        .goals-compact-ring {
            --size: 84px;
            --thickness: 9px;
            width: var(--size);
            height: var(--size);
            position: relative;
            flex-shrink: 0;
        }
        .goals-compact-ring > svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .goals-compact-ring circle { fill: none; stroke-width: var(--thickness); stroke-linecap: round; }
        .ring-track { stroke: var(--track-color, rgba(255, 255, 255, 0.08)); }
        .ring-fill {
            stroke: var(--fill-color, #ff0099);
            stroke-dasharray: 263.89;
            stroke-dashoffset: 263.89;
            transition: stroke-dashoffset 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 6px var(--fill-color, #ff0099));
        }
        .ring-icon {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            user-select: none; pointer-events: none;
        }
        /* Wrapper del flip — usamos un crossfade 2D (scaleX + opacity) en
           vez de rotateY 3D porque preserve-3d + backface-visibility hace
           que Chromium rasterice el SVG a baja resolución durante el
           transform. El efecto visual es idéntico — "se aplasta y reaparece". */
        .ring-icon-flipper {
            position: relative;
            width: 60%; height: 60%;
        }
        .ring-face {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease;
        }
        .ring-face-front { opacity: 1; transform: scaleX(1); }
        .ring-face-back  { opacity: 0; transform: scaleX(0); }
        .ring-icon-flipper.flipped .ring-face-front { opacity: 0; transform: scaleX(0); }
        .ring-icon-flipper.flipped .ring-face-back  { opacity: 1; transform: scaleX(1); }
        .ring-icon svg {
            width: 100%; height: 100%;
            stroke: var(--fill-color, #ff0099);
            fill: none; stroke-width: 2;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .ring-avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--fill-color, #ff0099);
            box-shadow: 0 0 8px var(--fill-color, #ff0099);
            background: rgba(0, 0, 0, 0.4);
        }
        .goals-compact-info {
            display: flex; flex-direction: column; gap: 2px;
            min-width: 110px; padding: 4px 8px; overflow: visible;
        }
        .goals-compact-label {
            font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.5);
            white-space: nowrap; overflow: visible;
        }
        .goals-compact-value {
            font-size: 24px; font-weight: 800; line-height: 1.05;
            color: var(--text-color, #ffffff);
            /* text-shadow se aplica dinámicamente desde JS */ white-space: nowrap;
        }
        .goals-compact-target {
            font-size: 12px; font-weight: 500;
            color: rgba(255, 255, 255, 0.45);
            white-space: nowrap;
        }
        .goals-compact-target .pct {
            color: var(--fill-color, #ff0099);
            font-weight: 700; margin-left: 4px;
        }
        @keyframes ring-rainbow {
            0%   { stroke: #ff0000; filter: drop-shadow(0 0 6px #ff0000); }
            14%  { stroke: #ff7f00; filter: drop-shadow(0 0 6px #ff7f00); }
            28%  { stroke: #ffff00; filter: drop-shadow(0 0 6px #ffff00); }
            42%  { stroke: #00ff00; filter: drop-shadow(0 0 6px #00ff00); }
            57%  { stroke: #00bfff; filter: drop-shadow(0 0 6px #00bfff); }
            71%  { stroke: #4b0082; filter: drop-shadow(0 0 6px #4b0082); }
            85%  { stroke: #9400d3; filter: drop-shadow(0 0 6px #9400d3); }
            100% { stroke: #ff0000; filter: drop-shadow(0 0 6px #ff0000); }
        }
        .ring-fill.rainbow { animation: ring-rainbow 4s linear infinite; }
        .goals-compact-card.reached {
            border-color: var(--fill-color, #ff0099);
            box-shadow: 0 0 20px var(--fill-color, #ff0099),
                        0 8px 24px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <!-- Modo barra (default). Oculto cuando body[data-mode="compact"]. -->
    <div class="goals-widget-container">
        <div class="goals-bar-container" id="bar-container">
            <img class="goals-bar-overlay" alt="" id="style-overlay">
            <div class="goals-bar-progress-wrapper">
                <div class="goals-bar-pattern" id="bar-pattern" style="display: none;"></div>
                <div class="goals-bar-background" id="bar-background"></div>
                <div class="goals-bar-fill" id="bar-fill"></div>
            </div>
            <div class="goals-bar-text" id="bar-text">LIKES - 0 / 5000 LIKES</div>
        </div>
    </div>

    <!-- Modo radial / compacto. Visible cuando body[data-mode="compact"]. -->
    <div class="goals-compact-container">
        <div class="goals-compact-card" id="compact-card">
            <div class="goals-compact-ring">
                <svg viewBox="0 0 100 100">
                    <circle class="ring-track" cx="50" cy="50" r="42"></circle>
                    <circle class="ring-fill" id="ring-fill" cx="50" cy="50" r="42"></circle>
                </svg>
                <div class="ring-icon" id="ring-icon">
                    <div class="ring-icon-flipper" id="ring-icon-flipper">
                        <div class="ring-face ring-face-front"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
                        <div class="ring-face ring-face-back"><img class="ring-avatar" id="ring-avatar" alt=""></div>
                    </div>
                </div>
            </div>
            <div class="goals-compact-info">
                <div class="goals-compact-label" id="compact-label">LIKES</div>
                <div class="goals-compact-value" id="compact-value">0</div>
                <div class="goals-compact-target">
                    de <span id="compact-target">5000</span> · <span class="pct" id="compact-pct">0%</span>
                </div>
            </div>
        </div>
    </div>
    <script src="/widgets/core/font-loader.js"></script>

    <script src="/goals/goals-likes.js?v=20260522-goals-frame-path"></script>
</body>
</html>
