<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
  <title>TikControl Overlay - Vertical</title>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { margin: 0; padding: 0; overflow: hidden; background: transparent; width: 100%; height: 100%; }
#overlay-container { 
  position: fixed;
  top: 0;
  left: 0;
  width: 1080px; 
  height: 1920px; 
  background: transparent; 
  overflow: hidden;
  transform-origin: top left;
}
#root { position: absolute; inset: 0; width: 100%; height: 100%; }
.element { position: absolute; pointer-events: auto; overflow: visible; }
.element img, .element iframe, .element video { width: 100%; height: 100%; object-fit: contain; }
.element iframe { border: none; transform: scale(1); transform-origin: top left; }
.element.panel { pointer-events: none; }

.ov-item{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);opacity:1;transition:opacity .6s ease;}
.ov-hide{opacity:0;}
.ov-alert{max-width:88%;color:#fff;text-align:center;padding:14px 18px;border-radius:12px;background:transparent;border:0 solid transparent;box-sizing:border-box;top:20%;transform:translateX(-50%);}
.ov-img{max-width:90%;max-height:90%;}
.ov-video{max-width:90%;max-height:90%}

@keyframes ovFadeIn{from{opacity:0}to{opacity:1}}
@keyframes ovSlideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes ovPop{0%{transform:scale(0.8);opacity:.1}60%{transform:scale(1.05);opacity:1}100%{transform:scale(1)}}
@keyframes ovBounceIn{0%{transform:translateY(-12px);opacity:.1}60%{transform:translateY(4px);opacity:1}100%{transform:translateY(0)}}
@keyframes ovZoomIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes ovWave{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes ovPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes ovFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes ovShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes ovRotate360{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.ov-anim-fade{animation:ovFadeIn .35s ease both}
.ov-anim-slide{animation:ovSlideUp .45s ease both}
.ov-anim-pop{animation:ovPop .45s ease both}
.ov-anim-bounce{animation:ovBounceIn .6s cubic-bezier(.2,.7,.3,1.2) both}
.ov-anim-zoom{animation:ovZoomIn .4s ease-out both}
.ov-anim-wave{animation:ovWave 1.5s ease-in-out infinite}
.ov-anim-pulse{animation:ovPulse 1.8s ease-in-out infinite}
.ov-anim-float{animation:ovFloat 2.5s ease-in-out infinite}
.ov-anim-shake{animation:ovShake 0.8s ease-in-out infinite}
.ov-anim-rotate360{animation:ovRotate360 3s linear infinite}

#error{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a2e;padding:30px;border-radius:16px;color:#fff;text-align:center;display:none}
#error h2{color:#f87171;margin-bottom:10px}
#error p{color:#94a3b8}
  </style>
</head>
<body>
  <div id="overlay-container">
    <div id="error">
      <h2>âš ï¸ UID no vÃ¡lido</h2>
      <p>Copia la URL desde TikControl â†’ Widgets â†’ Pantallas</p>
    </div>
    <div id="root"></div>
  </div>
  
  <script>
  window.__OV_SCREEN = 'vertical';
  
  // Auto-scale para adaptarse al viewport (TikTok Live Studio, OBS, etc.)
  (function() {
    var DESIGN_WIDTH = 1080;
    var DESIGN_HEIGHT = 1920;
    var container = document.getElementById('overlay-container');
    
    function scaleToFit() {
      var vw = window.innerWidth;
      var vh = window.innerHeight;
      
      // Calcular escala para llenar completamente el viewport desde top-left
      var scaleX = vw / DESIGN_WIDTH;
      var scaleY = vh / DESIGN_HEIGHT;
      // Usar min para que quepa todo, o max para llenar todo (puede recortar)
      var scale = Math.min(scaleX, scaleY);
      
      // Si el viewport es mÃ¡s grande que el diseÃ±o, usar scale 1
      if (vw >= DESIGN_WIDTH && vh >= DESIGN_HEIGHT) {
        scale = 1;
      }
      
      container.style.left = Math.max(0, (vw - DESIGN_WIDTH * scale) / 2) + 'px';
      container.style.top = Math.max(0, (vh - DESIGN_HEIGHT * scale) / 2) + 'px';
      container.style.transform = 'scale(' + scale + ')';
    }
    
    scaleToFit();
    window.addEventListener('resize', scaleToFit);
  })();
  </script>
  <script src="/widgets/core/env.js?v=20260507-ws-storage"></script>
  <script src="/widgets/core/font-loader.js?v=20260526-storage-token-fix"></script>
  <script src="overlay-client-aws.js?v=20260526-storage-token-fix"></script>
</body>
</html>
