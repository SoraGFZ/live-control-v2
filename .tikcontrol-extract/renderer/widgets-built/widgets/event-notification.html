<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Event Notification</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent}
body{font-family:system-ui,"Segoe UI",Arial,sans-serif}
#root{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.tc-event-notice{
  position:absolute;
  left:58%;
  top:78%;
  width:min(var(--notice-width,360px),calc(100vw - 24px));
  min-height:72px;
  display:grid;
  grid-template-columns:auto minmax(0,1fr);
  align-items:center;
  gap:18px;
  padding:13px 20px 13px 12px;
  background:var(--notice-bg,#fff);
  border:var(--notice-border-width,4px) solid var(--notice-border,#050505);
  border-radius:var(--notice-radius,0px);
  color:var(--notice-text,#111);
  opacity:0;
  transform:var(--enter-transform,translate(var(--hidden-x,-120vw),-50%));
  transform-origin:var(--transform-origin,center center);
  will-change:transform,opacity;
  --notice-shadow:drop-shadow(0 12px 24px rgba(0,0,0,.18));
  filter:var(--notice-shadow) var(--enter-filter,);
  animation:
    tc-event-enter var(--travel-ms,.55s) var(--enter-easing,cubic-bezier(.18,.9,.24,1)) forwards,
    tc-event-exit var(--travel-ms,.55s) var(--exit-easing,cubic-bezier(.68,0,.32,1)) forwards;
  animation-delay:0s,calc(var(--travel-ms,.55s) + var(--hold-ms,3s));
}
.tc-event-notice.tc-event-has-skin{
  min-height:calc(var(--notice-width,360px) * .232);
  padding:calc(var(--notice-width,360px) * .044) calc(var(--notice-width,360px) * .09) calc(var(--notice-width,360px) * .044) var(--skin-left-pad,104px);
  background:transparent;
  border:0;
  border-radius:0;
  --notice-shadow:drop-shadow(0 14px 28px rgba(0,0,0,.36));
}
.tc-event-skin{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  pointer-events:none;
  z-index:0;
}
.tc-event-gift-badge{
  position:absolute;
  left:calc(var(--notice-width,360px) * .225);
  top:50%;
  width:calc(var(--notice-width,360px) * .118);
  height:calc(var(--notice-width,360px) * .118);
  transform:translate(-50%,-50%);
  z-index:2;
  display:grid;
  place-items:center;
  border-radius:999px;
  overflow:hidden;
  background:radial-gradient(circle at 50% 42%,rgba(24,18,6,.98),rgba(3,3,3,.9));
  border:1px solid rgba(255,207,76,.86);
  box-shadow:inset 0 0 calc(var(--notice-width,360px) * .025) rgba(255,193,55,.28),0 0 calc(var(--notice-width,360px) * .028) rgba(255,176,0,.45);
  pointer-events:none;
}
.tc-event-gift-badge img{
  width:88%;
  height:88%;
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.78));
}
.tc-event-notice.tc-event-has-skin .tc-event-copy{
  position:relative;
  z-index:3;
  justify-content:center;
  align-items:center;
  min-height:calc(var(--notice-width,360px) * .13);
  gap:2px;
  text-align:center;
  transform:translate(-5%,8%);
  text-shadow:0 2px 5px rgba(0,0,0,.85),0 0 16px rgba(255,176,0,.28);
}
.tc-event-notice.tc-event-has-skin .tc-event-title{
  font-size:calc(var(--title-size,14px) * .8);
  color:var(--skin-title,#f8f2d4);
}
.tc-event-notice.tc-event-has-skin .tc-event-name{
  width:100%;
  font-size:calc(var(--name-size,16px) * .94);
  line-height:1;
  color:var(--skin-accent,#ffca4f);
}
.tc-event-notice.tc-event-has-skin .tc-event-meta{
  width:100%;
  color:var(--skin-muted,#d2b46a);
  font-size:calc(var(--title-size,14px) * .74);
}
.tc-event-notice.tc-event-no-media{
  grid-template-columns:minmax(0,1fr);
  padding-left:20px;
}
.tc-event-notice.tc-event-has-skin.tc-event-no-media{
  padding:calc(var(--notice-width,360px) * .044) calc(var(--notice-width,360px) * .09) calc(var(--notice-width,360px) * .044) var(--skin-left-pad,104px);
}
.tc-event-media{
  width:var(--avatar-size,44px);
  height:var(--avatar-size,44px);
  border:var(--media-border-width,4px) solid var(--notice-border,#050505);
  border-radius:999px;
  display:grid;
  place-items:center;
  overflow:hidden;
  background:transparent;
  color:var(--notice-text,#111);
  font-size:calc(var(--avatar-size,44px) * .4);
  font-weight:900;
  line-height:1;
  flex:none;
}
.tc-event-media img{width:100%;height:100%;object-fit:cover;display:block}
.tc-event-copy{min-width:0;display:flex;flex-direction:column;justify-content:center;gap:4px}
.tc-event-title{
  color:var(--notice-text,#111);
  font-size:var(--title-size,14px);
  font-weight:950;
  line-height:1;
  text-transform:uppercase;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.tc-event-name{
  color:var(--notice-accent,#ffb000);
  font-size:var(--name-size,16px);
  font-weight:950;
  line-height:1.1;
  text-transform:uppercase;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.tc-event-meta{
  color:var(--notice-muted,#5b5b5b);
  font-size:calc(var(--title-size,14px) * .86);
  font-weight:800;
  line-height:1;
  text-transform:uppercase;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.tc-event-meta:empty{display:none}
@keyframes tc-event-enter{
  from{opacity:0;transform:var(--enter-transform,translate(var(--hidden-x,-120vw),-50%));filter:var(--notice-shadow) var(--enter-filter,)}
  18%{opacity:1}
  to{opacity:1;transform:var(--center-transform,translate(-50%,-50%));filter:var(--notice-shadow) var(--center-filter,)}
}
@keyframes tc-event-exit{
  from{opacity:1;transform:var(--center-transform,translate(-50%,-50%));filter:var(--notice-shadow) var(--center-filter,)}
  82%{opacity:1}
  to{opacity:0;transform:var(--exit-transform,var(--enter-transform,translate(var(--hidden-x,-120vw),-50%)));filter:var(--notice-shadow) var(--exit-filter,)}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="/widgets/core/env.js?v=20260525-event-notification"></script>
<script src="/widgets/core/font-loader.js?v=20260526-storage-token-fix"></script>
<script src="/widgets/core/tikcontrol-widget-base.js?v=20260526-storage-token-fix"></script>
<script src="/widgets/event-notification.js?v=20260602-event-notification-skins-force"></script>
</body>
</html>
