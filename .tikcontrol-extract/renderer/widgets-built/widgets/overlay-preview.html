<!doctype html>
<meta charset="utf-8" />
<title>Overlay Preview</title>
<style>
  html,body{margin:0;height:100%;background:transparent}
  #root{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  .canvas{position:relative;width:100%;height:100%;overflow:hidden}
  .panel{position:absolute;background-size:cover;background-position:center}
  .item{position:absolute;overflow:hidden;will-change:transform,left,top,width,height,z-index}
  .item img{width:100%;height:100%;object-fit:cover}
  .likes-badge{position:absolute;top:-10px;right:-10px;background:rgba(0,0,0,.6);padding:4px 6px;border-radius:12px;color:#fff}
  /* Gift loop animations */
  @keyframes g-bounce { 0%{ transform: translateY(0) } 100%{ transform: translateY(-12px) } }
  @keyframes g-float { 0%{ transform: translateY(0) } 100%{ transform: translateY(-8px) } }
  @keyframes g-spin { 0%{ transform: rotate(0) } 100%{ transform: rotate(360deg) } }
  @keyframes g-wiggle { 0%{ transform: rotate(-6deg) } 100%{ transform: rotate(6deg) } }
  @keyframes g-pulse { 0%{ transform: scale(1) } 100%{ transform: scale(1.08) } }
  @keyframes g-shake { 0%{ transform: translateX(-4px) } 100%{ transform: translateX(4px) } }
  @keyframes g-sway { 0%{ transform: rotate(-4deg) } 100%{ transform: rotate(4deg) } }
  @keyframes g-pop { 0%{ transform: scale(.7); opacity:.1 } 60%{ transform: scale(1.05); opacity:1 } 100%{ transform: scale(1) } }
  @keyframes g-float2 { 0%{ transform: translateY(0) } 100%{ transform: translateY(-18px) } }
  @keyframes g-rotate { 0%{ transform: rotate(0) } 100%{ transform: rotate(180deg) } }
  /* Text animations */
  @keyframes t-fade { 0%{ opacity:0 } 100%{ opacity:1 } }
  @keyframes t-slide { 0%{ transform: translateY(12px); opacity:0 } 100%{ transform: translateY(0); opacity:1 } }
  @keyframes t-pop { 0%{ transform: scale(.8); opacity:.1 } 60%{ transform: scale(1.05); opacity:1 } 100%{ transform: scale(1) } }
  @keyframes t-bounce { 0%{ transform: translateY(-12px); opacity:.1 } 60%{ transform: translateY(4px); opacity:1 } 100%{ transform: translateY(0) } }
  @keyframes t-typing { 0%{ width:0 } 100%{ width:100% } }
  @keyframes t-zoom { 0%{ transform: scale(.8) } 100%{ transform: scale(1) } }
  @keyframes t-rotate { 0%{ transform: rotate(-10deg); opacity:0 } 100%{ transform: rotate(0); opacity:1 } }
  @keyframes t-sway { 0%{ transform: rotate(-6deg) } 100%{ transform: rotate(6deg) } }
  @keyframes t-flash { 0%{ opacity:1 } 50%{ opacity:.2 } 100%{ opacity:1 } }
  @keyframes t-slide-left { 0%{ transform: translateX(-12px); opacity:0 } 100%{ transform: translateX(0); opacity:1 } }
</style>
<div id="root"><div id="canvas" class="canvas"></div></div>
