<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireWork Premium - TikControl</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>if(location.hostname!=='localhost'&&location.hostname!=='127.0.0.1'){var s=document.createElement('script');s.src='/widgets/core/env.js?v=20260507-ws-storage';document.head.appendChild(s);}</script>
    <script src="tikcontrol-widget-base.js?v=20260526-storage-token-fix"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        #firework-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .gifter-name {
            position: absolute;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            font-weight: 800;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transform: translateX(-50%) scale(0.5);
            -webkit-text-stroke: 2px rgba(0, 0, 0, 0.7);
            paint-order: stroke fill;
            text-shadow:
                0 2px 6px rgba(0, 0, 0, 0.9),
                0 0 12px rgba(0, 0, 0, 0.5);
            z-index: 100;
            white-space: nowrap;
        }

        .gifter-name.visible {
            animation: nameAppear 0.5s ease-out forwards;
        }

        .gifter-name.fade-out {
            animation: nameFade 1s ease-out forwards;
        }

        @keyframes nameAppear {
            0% {
                opacity: 0;
                transform: translateX(-50%) scale(0.5) translateY(20px);
            }
            60% {
                opacity: 1;
                transform: translateX(-50%) scale(1.1) translateY(-5px);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) scale(1) translateY(0);
            }
        }

        @keyframes nameFade {
            0% { opacity: 1; }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-30px);
            }
        }

        .rainbow-text {
            background: linear-gradient(90deg,
                #ff0000, #ff8000, #ffff00, #00ff00,
                #00ffff, #0080ff, #8000ff, #ff0080, #ff0000);
            background-size: 400% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbowShift 2s linear infinite;
        }

        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        .gifter-name.epic {
            font-size: 48px;
            letter-spacing: 2px;
            text-transform: uppercase;
            -webkit-text-stroke: 3px rgba(0, 0, 0, 0.8);
            paint-order: stroke fill;
            text-shadow:
                0 3px 8px rgba(0, 0, 0, 0.9),
                0 0 15px rgba(0, 0, 0, 0.4);
        }

        .gifter-name.epic.rainbow-text {
            text-shadow:
                0 3px 8px rgba(0, 0, 0, 0.9),
                0 0 15px rgba(0, 0, 0, 0.4);
            animation: rainbowShift 1.5s linear infinite;
        }

        .combo-badge {
            display: inline-block;
            margin-left: 10px;
            font-weight: 900;
            font-size: 0.9em;
            -webkit-text-stroke: 2px rgba(0, 0, 0, 0.8);
            paint-order: stroke fill;
            -webkit-text-fill-color: initial;
            background: none !important;
            -webkit-background-clip: initial !important;
            transition: color 0.3s ease, text-shadow 0.3s ease, transform 0.3s ease;
        }
    </style>
</head>
<body>
    <canvas id="firework-canvas"></canvas>
    <script src="firework-premium.js?v=2.1.5"></script>
</body>
</html>
