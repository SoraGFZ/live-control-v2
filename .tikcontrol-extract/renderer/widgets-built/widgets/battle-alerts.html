<style>
/* === RESET === */
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:transparent;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100%}

/* === CONTAINER === */
.alerts-container{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}

/* === ALERT BOX === */
.alert{
  display:none;flex-direction:column;align-items:center;gap:16px;
  padding:40px 60px;border-radius:24px;
  text-align:center;transform:scale(0);opacity:0;
  animation-fill-mode:forwards;
}

.alert.show{
  display:flex;
  animation:alertIn 0.6s ease-out forwards;
}

.alert.hide{
  animation:alertOut 0.4s ease-in forwards;
}

/* === ALERT TYPES === */
.alert.battle-start{
  background:linear-gradient(135deg,rgba(255,62,165,0.95),rgba(139,92,246,0.95));
  box-shadow:0 20px 60px rgba(255,62,165,0.4),0 0 100px rgba(139,92,246,0.3);
}

.alert.battle-end{
  background:linear-gradient(135deg,rgba(34,197,94,0.95),rgba(16,185,129,0.95));
  box-shadow:0 20px 60px rgba(34,197,94,0.4);
}

.alert.winner-host{
  background:linear-gradient(135deg,rgba(255,62,165,0.95),rgba(255,107,183,0.95));
  box-shadow:0 20px 60px rgba(255,62,165,0.5);
}

.alert.winner-guest{
  background:linear-gradient(135deg,rgba(59,130,246,0.95),rgba(96,165,250,0.95));
  box-shadow:0 20px 60px rgba(59,130,246,0.5);
}

.alert.tie{
  background:linear-gradient(135deg,rgba(255,193,7,0.95),rgba(255,213,79,0.95));
  box-shadow:0 20px 60px rgba(255,193,7,0.4);
}

/* === ALERT CONTENT === */
.alert-icon{
  font-size:80px;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,0.3));
  animation:iconBounce 0.8s ease-out;
}

.alert-title{
  font-size:42px;font-weight:900;color:#fff;
  text-transform:uppercase;letter-spacing:3px;
  text-shadow:0 4px 12px rgba(0,0,0,0.3);
}

.alert-subtitle{
  font-size:18px;font-weight:600;color:rgba(255,255,255,0.9);
  text-shadow:0 2px 6px rgba(0,0,0,0.3);
}

.alert-players{
  display:flex;align-items:center;gap:20px;
  margin-top:8px;
}

.alert-player{
  display:flex;flex-direction:column;align-items:center;gap:8px;
}

.alert-player-avatar{
  width:70px;height:70px;border-radius:50%;
  border:4px solid rgba(255,255,255,0.5);
  object-fit:cover;
}

.alert-player-name{
  font-size:16px;font-weight:700;color:#fff;
  max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

.alert-vs{
  font-size:28px;font-weight:900;color:rgba(255,255,255,0.8);
}

.alert-score{
  font-family:'JetBrains Mono',monospace;
  font-size:48px;font-weight:800;color:#fff;
  text-shadow:0 4px 12px rgba(0,0,0,0.4);
}

.alert-winner-label{
  font-size:14px;font-weight:700;text-transform:uppercase;
  letter-spacing:2px;color:rgba(255,255,255,0.8);
  margin-top:8px;
}

/* === CONFETTI === */
.confetti{
  position:absolute;inset:0;overflow:hidden;pointer-events:none;
}
.confetti-piece{
  position:absolute;width:12px;height:12px;
  opacity:0;animation:confettiFall 3s ease-out forwards;
}

/* === ANIMATIONS === */
@keyframes alertIn{
  0%{transform:scale(0.3) rotate(-10deg);opacity:0}
  50%{transform:scale(1.1) rotate(3deg);opacity:1}
  100%{transform:scale(1) rotate(0);opacity:1}
}

@keyframes alertOut{
  0%{transform:scale(1);opacity:1}
  100%{transform:scale(0.3) translateY(-50px);opacity:0}
}

@keyframes iconBounce{
  0%{transform:scale(0)}
  50%{transform:scale(1.3)}
  75%{transform:scale(0.9)}
  100%{transform:scale(1)}
}

@keyframes confettiFall{
  0%{opacity:1;transform:translateY(-100%) rotate(0)}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg)}
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}
}

<div class="alerts-container">
  <div id="alert" class="alert">
    <div class="confetti" id="confetti"></div>
    <div id="alertIcon" class="alert-icon"><span class="tc-svg-icon swords"></span></div>
    <h1 id="alertTitle" class="alert-title">Â¡BATALLA!</h1>
    <p id="alertSubtitle" class="alert-subtitle"></p>
    <div id="alertPlayers" class="alert-players"></div>
    <div id="alertScore" class="alert-score"></div>
    <div id="alertWinnerLabel" class="alert-winner-label"></div>
  </div>
</div>

<script>
(function(){
  'use strict';
  
  const state = {
    host: { nickname: 'Host', avatar: '', score: 0 },
    guest: { nickname: 'Guest', avatar: '', score: 0 },
    isShowing: false,
    timeout: null
  };
  
  const $ = id => document.getElementById(id);
  const els = {
    alert: $('alert'),
    alertIcon: $('alertIcon'),
    alertTitle: $('alertTitle'),
    alertSubtitle: $('alertSubtitle'),
    alertPlayers: $('alertPlayers'),
    alertScore: $('alertScore'),
    alertWinnerLabel: $('alertWinnerLabel'),
    confetti: $('confetti')
  };
  
  function showAlert(type, data = {}){
    if(state.timeout) clearTimeout(state.timeout);
    
    // Hide current
    els.alert.classList.remove('show', 'battle-start', 'battle-end', 'winner-host', 'winner-guest', 'tie');
    els.confetti.innerHTML = '';
    
    // Configure alert
    switch(type){
      case 'battle-start':
        els.alertIcon.innerHTML = '<span class="tc-svg-icon swords"></span>';
        els.alertTitle.textContent = 'Â¡BATALLA!';
        els.alertSubtitle.textContent = 'La batalla ha comenzado';
        els.alertPlayers.innerHTML = `
          <div class="alert-player">
            <img class="alert-player-avatar" src="${state.host.avatar || ''}" alt="" onerror="this.style.display='none'">
            <span class="alert-player-name">${state.host.nickname}</span>
          </div>
          <span class="alert-vs">VS</span>
          <div class="alert-player">
            <img class="alert-player-avatar" src="${state.guest.avatar || ''}" alt="" onerror="this.style.display='none'">
            <span class="alert-player-name">${state.guest.nickname}</span>
          </div>
        `;
        els.alertScore.textContent = '';
        els.alertWinnerLabel.textContent = '';
        break;
        
      case 'battle-end':
        const winner = state.host.score > state.guest.score ? 'host' : 
                       state.guest.score > state.host.score ? 'guest' : 'tie';
        
        if(winner === 'tie'){
          els.alertIcon.innerHTML = '<span class="tc-svg-icon swords"></span>';
          els.alertTitle.textContent = 'Â¡EMPATE!';
          els.alertSubtitle.textContent = 'La batalla terminÃ³ en empate';
        } else {
          const winnerData = winner === 'host' ? state.host : state.guest;
          els.alertIcon.innerHTML = '<span class="tc-svg-icon swords"></span>';
          els.alertTitle.textContent = 'Â¡VICTORIA!';
          els.alertSubtitle.textContent = `${winnerData.nickname} ha ganado`;
          createConfetti();
        }
        
        els.alertPlayers.innerHTML = '';
        els.alertScore.textContent = `${state.host.score} - ${state.guest.score}`;
        els.alertWinnerLabel.textContent = winner === 'tie' ? '' : 'GANADOR';
        
        type = winner === 'tie' ? 'tie' : `winner-${winner}`;
        break;
    }
    
    // Show
    els.alert.classList.add('show', type);
    state.isShowing = true;
    
    // Auto-hide after delay
    const duration = type.includes('winner') || type === 'tie' ? 8000 : 5000;
    state.timeout = setTimeout(hideAlert, duration);
  }
  
  function hideAlert(){
    els.alert.classList.add('hide');
    setTimeout(() => {
      els.alert.classList.remove('show', 'hide');
      state.isShowing = false;
    }, 400);
  }
  
  function createConfetti(){
    const colors = ['#ff3ea5', '#3b82f6', '#ffd700', '#22c55e', '#8b5cf6', '#ff6b6b'];
    const shapes = ['â–ª', 'â—', 'â–²', 'â˜…'];
    
    for(let i = 0; i < 50; i++){
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.textContent = shapes[Math.floor(Math.random() * shapes.length)];
      piece.style.left = Math.random() * 100 + '%';
      piece.style.color = colors[Math.floor(Math.random() * colors.length)];
      piece.style.fontSize = (Math.random() * 20 + 10) + 'px';
      piece.style.animationDelay = Math.random() * 2 + 's';
      piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
      els.confetti.appendChild(piece);
    }
  }
  
  function handleBattle(data){
    const action = data.action || data.battleAction || data.status;
    
    if(action === 1 || action === 'BATTLE_START' || action === 'start'){
      const users = data.battleUsers || Object.values(data.anchorInfo || {}) || [];
      if(users[0]){
        const u = users[0].user || users[0];
        state.host.nickname = u.nickname || u.uniqueId || 'Host';
        state.host.avatar = u.profilePictureUrl || u.avatarThumb?.urlList?.[0] || '';
        state.host.score = 0;
      }
      if(users[1]){
        const u = users[1].user || users[1];
        state.guest.nickname = u.nickname || u.uniqueId || 'Guest';
        state.guest.avatar = u.profilePictureUrl || u.avatarThumb?.urlList?.[0] || '';
        state.guest.score = 0;
      }
      showAlert('battle-start');
    }
    
    if(action === 3 || action === 'BATTLE_END' || action === 'end'){
      showAlert('battle-end');
    }
  }
  
  function handleArmies(data){
    const armies = data.battleItems || data.battleGroups || data.teamArmies || data.armies;
    if(armies){
      const arr = Array.isArray(armies) ? armies : Object.values(armies);
      if(arr[0]) state.host.score = arr[0].score || arr[0].points || 0;
      if(arr[1]) state.guest.score = arr[1].score || arr[1].points || 0;
    }
  }
  
  function handlePunishFinish(data){
    showAlert('battle-end');
  }
  
  // Socket
  if(window.io){
    const sock = io(undefined, { reconnection: true });
    sock.on('tiktok:linkMicBattle', handleBattle);
    sock.on('tiktok:linkMicArmies', handleArmies);
    sock.on('tiktok:linkMicBattlePunishFinish', handlePunishFinish);
    sock.on('linkMicBattle', handleBattle);
    sock.on('linkMicArmies', handleArmies);
    sock.on('linkMicBattlePunishFinish', handlePunishFinish);
    sock.on('tiktok:event', p => {
      if(p?.type === 'linkMicBattle') handleBattle(p.data || {});
      if(p?.type === 'linkMicArmies') handleArmies(p.data || {});
      if(p?.type === 'linkMicBattlePunishFinish') handlePunishFinish(p.data || {});
    });
    // [log cleaned]
  }
  
  // Test functions
  window.testBattleStart = function(){
    state.host = { nickname: 'Player1', avatar: '', score: 0 };
    state.guest = { nickname: 'Player2', avatar: '', score: 0 };
    showAlert('battle-start');
  };
  
  window.testBattleEnd = function(winner = 'host'){
    state.host.score = winner === 'host' ? 1500 : winner === 'tie' ? 1000 : 800;
    state.guest.score = winner === 'guest' ? 1500 : winner === 'tie' ? 1000 : 800;
    showAlert('battle-end');
  };
  
  // [log cleaned]
})();
</script>
