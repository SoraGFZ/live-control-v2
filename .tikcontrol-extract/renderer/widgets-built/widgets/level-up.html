<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Level Up</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;width:100%;height:100%}

#root{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:system-ui,'Segoe UI',Roboto,sans-serif;
}

/* â”€â”€ Card â”€â”€ */
.card{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  padding:24px 32px;border-radius:18px;
  background:transparent;
  border:none;
  color:#fff;
  opacity:0;visibility:hidden;
  transform:scale(.8) translateY(20px);
  transition:opacity .5s cubic-bezier(.34,1.56,.64,1),transform .5s cubic-bezier(.34,1.56,.64,1),visibility 0s .5s;
}
.card.visible{
  opacity:1;visibility:visible;transform:scale(1) translateY(0);
  transition:opacity .5s cubic-bezier(.34,1.56,.64,1),transform .5s cubic-bezier(.34,1.56,.64,1),visibility 0s 0s;
}

/* â”€â”€ Title â”€â”€ */
.title{
  font-weight:900;font-size:34px;
  text-transform:uppercase;letter-spacing:1px;
  text-shadow:0 0 8px rgba(255,255,255,.6),0 0 16px rgba(255,255,255,.3);
}

/* â”€â”€ Avatar â”€â”€ */
.avatar{
  width:80px;height:80px;border-radius:50%;object-fit:cover;
  border:3px solid rgba(255,255,255,.25);
  box-shadow:0 0 12px rgba(0,0,0,.5);
  display:none;
}
.avatar.loaded{display:block}

/* â”€â”€ Nickname â”€â”€ */
.nick{font-weight:800;font-size:26px;color:#ffcc00;text-shadow:1px 1px 3px rgba(0,0,0,.8)}

/* â”€â”€ Levels row â”€â”€ */
.levels{
  display:flex;align-items:center;gap:12px;
  font-weight:800;
}
.lvl-prev{font-size:22px;color:#aaa;position:relative}
.lvl-arrow{font-size:18px;color:rgba(255,255,255,.4)}
.lvl-new{font-size:30px;color:#7dff9e;text-shadow:0 0 10px rgba(125,255,158,.6)}
.tc-outline{
  position:relative;
  display:inline-block;
  isolation:isolate;
  --tc-outline-width:0px;
  --tc-outline-color:#000;
}
.tc-outline::before{
  content:attr(data-text);
  position:absolute;
  inset:0;
  z-index:0;
  color:transparent;
  -webkit-text-stroke:var(--tc-outline-width) var(--tc-outline-color);
  text-shadow:none;
  pointer-events:none;
}

/* â”€â”€ Animations â”€â”€ */
@keyframes card-enter{
  0%{opacity:0;transform:scale(.7) translateY(30px);filter:blur(8px)}
  60%{opacity:1;transform:scale(1.05) translateY(-4px);filter:blur(0)}
  100%{transform:scale(1) translateY(0)}
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes title-glow{
  0%,100%{text-shadow:0 0 8px rgba(255,255,255,.6),0 0 16px rgba(255,255,255,.3)}
  50%{text-shadow:0 0 16px rgba(255,255,255,.9),0 0 32px rgba(255,255,255,.5),0 0 48px rgba(255,255,255,.2)}
}
@keyframes slide-up{
  0%{opacity:0;transform:translateY(20px) scale(.9)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes pop-in{
  0%{opacity:0;transform:scale(0);filter:blur(4px)}
  50%{opacity:1;transform:scale(1.3);filter:blur(0)}
  70%{transform:scale(.9)}
  100%{transform:scale(1)}
}
@keyframes fade-in{0%{opacity:0}100%{opacity:1}}
@keyframes slide-left{
  0%{opacity:0;transform:translateX(28px) scale(.95)}
  100%{opacity:1;transform:translateX(0) scale(1)}
}
@keyframes zoom-in{
  0%{opacity:0;transform:scale(.65)}
  70%{opacity:1;transform:scale(1.08)}
  100%{transform:scale(1)}
}
@keyframes wiggle{
  0%,100%{transform:rotate(0)}
  25%{transform:rotate(-3deg)}
  75%{transform:rotate(3deg)}
}
@keyframes bounce-in{
  0%{opacity:0;transform:translateY(-24px) scale(.9)}
  55%{opacity:1;transform:translateY(8px) scale(1.03)}
  75%{transform:translateY(-4px)}
  100%{transform:translateY(0) scale(1)}
}
@keyframes emerge-in{
  0%{opacity:0;transform:translateY(18px) scale(.4);filter:blur(6px)}
  55%{opacity:1;transform:translateY(-4px) scale(1.2);filter:blur(0)}
  100%{transform:translateY(0) scale(1)}
}
@keyframes glow-pulse{
  0%,100%{text-shadow:0 0 10px rgba(125,255,158,.5),0 0 20px rgba(125,255,158,.2)}
  50%{text-shadow:0 0 20px rgba(125,255,158,.9),0 0 40px rgba(125,255,158,.5),0 0 60px rgba(125,255,158,.2)}
}
@keyframes fade-strike{
  0%{opacity:1;transform:translateX(0) scale(1)}
  100%{opacity:.35;transform:translateX(-6px) scale(.9)}
}
@keyframes arrow-flash{
  0%{opacity:.3;transform:scale(.8)}
  50%{opacity:1;transform:scale(1.3);color:#fff}
  100%{opacity:.4;transform:scale(1)}
}
@keyframes rainbow-bg{0%{background-position:0% 50%}100%{background-position:200% 50%}}

.anim-card{animation:card-enter .6s cubic-bezier(.34,1.56,.64,1) both}
.anim-title{animation:pulse 2s ease-in-out .3s infinite, title-glow 2s ease-in-out .3s infinite}
.anim-title-pulse{animation:pulse 2s ease-in-out .3s infinite}
.effect-glow.anim-title-pulse{animation:pulse 2s ease-in-out .3s infinite,title-glow 2s ease-in-out .3s infinite}
.anim-title-slide-up{animation:slide-up .5s cubic-bezier(.34,1.56,.64,1) .2s both}
.anim-title-fade{animation:fade-in .55s ease-out .2s both}
.anim-title-wiggle{animation:wiggle .7s ease-in-out .2s both}
.anim-title-bounce{animation:bounce-in .65s cubic-bezier(.34,1.56,.64,1) .15s both}
.anim-title-zoom{animation:zoom-in .55s cubic-bezier(.34,1.56,.64,1) .2s both}
.anim-nick{animation:slide-up .5s cubic-bezier(.34,1.56,.64,1) .2s both}
.anim-nick-slide-up{animation:slide-up .5s cubic-bezier(.34,1.56,.64,1) .2s both}
.anim-nick-pop{animation:pop-in .55s cubic-bezier(.34,1.56,.64,1) .2s both}
.anim-nick-fade{animation:fade-in .5s ease-out .2s both}
.anim-prev{animation:fade-strike .5s ease-out .7s forwards}
.anim-arrow{animation:arrow-flash .4s ease-out .9s both}
.anim-new{animation:pop-in .6s cubic-bezier(.34,1.56,.64,1) 1s both}
.anim-level-pop{animation:pop-in .6s cubic-bezier(.34,1.56,.64,1) 1s both}
.anim-level-emerge{animation:emerge-in .7s cubic-bezier(.34,1.56,.64,1) 1s both}
.anim-level-slide-up{animation:slide-up .55s cubic-bezier(.34,1.56,.64,1) 1s both}
.anim-level-slide-left{animation:slide-left .55s cubic-bezier(.34,1.56,.64,1) 1s both}
.anim-level-fade-in{animation:fade-in .55s ease-out 1s both}
.anim-new-glow{animation:glow-pulse 1.5s ease-in-out 1.4s infinite}

/* â”€â”€ Text effects â”€â”€ */
.effect-glow{text-shadow:0 0 8px rgba(255,255,255,.8),0 0 16px rgba(255,255,255,.5)}
.effect-neon-pink{text-shadow:0 0 8px rgba(255,0,200,.9),0 0 20px rgba(255,0,200,.5)}
.effect-neon-blue{text-shadow:0 0 8px rgba(0,200,255,.9),0 0 20px rgba(0,200,255,.5)}
.effect-rainbow{
  background:linear-gradient(90deg,#ff0000,#ff7f00,#ffff00,#00ff00,#00bfff,#8b00ff,#ff0000);
  background-size:200% 100%;
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rainbow-bg 3s linear infinite;
  text-shadow:none;
}
.effect-rainbow.anim-title-pulse{animation:rainbow-bg 3s linear infinite,pulse 2s ease-in-out .3s infinite}
.effect-rainbow.anim-title-slide-up{animation:rainbow-bg 3s linear infinite,slide-up .5s cubic-bezier(.34,1.56,.64,1) .2s both}
.effect-rainbow.anim-title-fade{animation:rainbow-bg 3s linear infinite,fade-in .55s ease-out .2s both}
.effect-rainbow.anim-title-wiggle{animation:rainbow-bg 3s linear infinite,wiggle .7s ease-in-out .2s both}
.effect-rainbow.anim-title-bounce{animation:rainbow-bg 3s linear infinite,bounce-in .65s cubic-bezier(.34,1.56,.64,1) .15s both}
.effect-rainbow.anim-title-zoom{animation:rainbow-bg 3s linear infinite,zoom-in .55s cubic-bezier(.34,1.56,.64,1) .2s both}
.effect-rainbow.anim-nick-slide-up{animation:rainbow-bg 3s linear infinite,slide-up .5s cubic-bezier(.34,1.56,.64,1) .2s both}
.effect-rainbow.anim-nick-pop{animation:rainbow-bg 3s linear infinite,pop-in .55s cubic-bezier(.34,1.56,.64,1) .2s both}
.effect-rainbow.anim-nick-fade{animation:rainbow-bg 3s linear infinite,fade-in .5s ease-out .2s both}
</style>
</head>
<body>
<div id="root">
  <div class="card" id="card">
    <div class="title" id="title">NEW LEVEL!</div>
    <img class="avatar" id="avatar" alt="">
    <div class="nick" id="nick"></div>
    <div class="levels">
      <span class="lvl-prev" id="prevLvl"></span>
      <span class="lvl-arrow">&#10132;</span>
      <span class="lvl-new" id="newLvl"></span>
    </div>
  </div>
</div>

</html>
