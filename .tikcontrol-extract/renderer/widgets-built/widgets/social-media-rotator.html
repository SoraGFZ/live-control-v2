    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-width: 100vw;
        }

        .social-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 0.375rem;
            border-radius: 14px;
            transition: all 0.3s ease;
        }

        .social-icon {
            width: 3rem;
            height: 3rem;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-icon i {
            font-size: 1.25rem;
        }

        .social-username {
            font-weight: 600;
            font-size: 1.125rem;
            font-family: var(--custom-font, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif);
        }

        .follow-button {
            border-radius: 8px;
            padding: 0.375rem 0.75rem;
            color: white;
            gap: 0.375rem;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .follow-button:hover {
            transform: scale(1.05);
        }

        .follow-button i {
            font-size: 0.875rem;
            padding-top: 1px;
        }

        /*  Animaciones personalizadas */
        /* Fade */
        .fade-enter {
            animation: fadeIn 0.5s ease-in;
        }
        .fade-exit {
            animation: fadeOut 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }

        /* Slide */
        .slide-enter {
            animation: slideInRight 0.6s ease-out;
        }
        .slide-exit {
            animation: slideOutLeft 0.6s ease-in forwards;
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideOutLeft {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(-100%); }
        }

        /* Zoom */
        .zoom-enter {
            animation: zoomIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .zoom-exit {
            animation: zoomOut 0.5s ease-in forwards;
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes zoomOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.5); }
        }

        /* Rotate */
        .rotate-enter {
            animation: rotateIn 0.7s ease-out;
        }
        .rotate-exit {
            animation: rotateOut 0.7s ease-in forwards;
        }
        @keyframes rotateIn {
            from { opacity: 0; transform: rotate(-180deg) scale(0.5); }
            to { opacity: 1; transform: rotate(0) scale(1); }
        }
        @keyframes rotateOut {
            from { opacity: 1; transform: rotate(0) scale(1); }
            to { opacity: 0; transform: rotate(180deg) scale(0.5); }
        }

        /* Flip */
        .flip-enter {
            animation: flipIn 0.6s ease-out;
        }
        .flip-exit {
            animation: flipOut 0.6s ease-in forwards;
        }
        @keyframes flipIn {
            from { opacity: 0; transform: perspective(400px) rotateY(90deg); }
            to { opacity: 1; transform: perspective(400px) rotateY(0); }
        }
        @keyframes flipOut {
            from { opacity: 1; transform: perspective(400px) rotateY(0); }
            to { opacity: 0; transform: perspective(400px) rotateY(-90deg); }
        }

        /* Swing */
        .swing-enter {
            animation: swingIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .swing-exit {
            animation: swingOut 0.6s ease-in forwards;
        }
        @keyframes swingIn {
            0% { opacity: 0; transform: translateY(-100%) rotate(-10deg); }
            60% { transform: translateY(0) rotate(5deg); }
            100% { opacity: 1; transform: translateY(0) rotate(0); }
        }
        @keyframes swingOut {
            0% { opacity: 1; transform: translateY(0) rotate(0); }
            100% { opacity: 0; transform: translateY(100%) rotate(10deg); }
        }

        /* Elastic */
        .elastic-enter {
            animation: elasticIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);

        .elastic-exit {
            animation: elasticOut 0.6s ease-in forwards;
        }
        @keyframes elasticIn {
            0% { opacity: 0; transform: scale(0) rotate(-180deg); }

            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        @keyframes elasticOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0) rotate(180deg); }
        }

        /* Roll */
        .roll-enter {

        .roll-exit {

        @keyframes rollIn {

        }
        @keyframes rollOut {
            from { opacity: 1; transform: translateX(0) rotate(0); }
            to { opacity: 0; transform: translateX(100%) rotate(360deg); }
        }

        /* Drop */
        .drop-enter {
            animation: dropIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .drop-exit {
            animation: dropOut 0.5s ease-in forwards;

        }
        @keyframes dropOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(500px); }
        }

        /* Pulse */
        .pulse-enter {
            animation: pulseIn 0.6s ease-out;
        }
        .pulse-exit {
            animation: pulseOut 0.6s ease-in forwards;
        }
        @keyframes pulseIn {

        @keyframes pulseOut {
            0% { opacity: 1; transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { opacity: 0; transform: scale(0.3); }
        }

        /* Wobble */
        .wobble-enter {
            animation: wobbleIn 0.8s ease-out;
        }
        .wobble-exit {
            animation: wobbleOut 0.6s ease-in forwards;
        }
        @keyframes wobbleIn {

        @keyframes wobbleOut {
            0% { opacity: 1; transform: scale(1); }

        /* Spiral */
        .spiral-enter {

        .spiral-exit {

        @keyframes spiralIn {

        @keyframes spiralOut {
            from { opacity: 1; transform: translate(0, 0) rotate(0) scale(1); }

        /* Jello */
        .jello-enter {

        .jello-exit {

        @keyframes jelloOut {
            from { opacity: 1; transform: scale(1); }

        /* Splash */
        .splash-enter {

        .splash-exit {

        @keyframes splashIn {

        @keyframes splashOut {

        /*  NUEVAS ANIMACIONES ÃšNICAS  */

        /* Glitch - Efecto de distorsiÃ³n digital */
        .glitch-enter {

        .glitch-exit {

        @keyframes glitchIn {

            60% { transform: translate(-10px, 3px); clip-path: inset(0 0 10% 0); }

        @keyframes glitchOut {

            100% { opacity: 0; transform: translate(80px, 0) scale(0.5); }
        }

        /* Morph - TransformaciÃ³n suave con forma */
        .morph-enter {
            animation: morphIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);

        .morph-exit {

        @keyframes morphIn {

        }
        @keyframes morphOut {
            0% { opacity: 1; transform: scale(1) rotate(0deg); border-radius: 0%; }

        /* Tornado - Giro 3D como tornado */
        .tornado-enter {
            animation: tornadoIn 0.9s ease-out;
        }
        .tornado-exit {
            animation: tornadoOut 0.7s ease-in forwards;
        }
        @keyframes tornadoIn {
            0% { opacity: 0; transform: perspective(800px) rotateY(1080deg) translateZ(-500px) scale(0.1); }
            60% { transform: perspective(800px) rotateY(360deg) translateZ(50px) scale(1.1); }
            100% { opacity: 1; transform: perspective(800px) rotateY(0deg) translateZ(0) scale(1); }
        }
        @keyframes tornadoOut {
            0% { opacity: 1; transform: perspective(800px) rotateY(0deg) translateZ(0) scale(1); }
            40% { transform: perspective(800px) rotateY(-360deg) translateZ(50px) scale(1.1); }
            100% { opacity: 0; transform: perspective(800px) rotateY(-1080deg) translateZ(-500px) scale(0.1); }
        }

        /* Matrix - Efecto Matrix con mÃºltiples copias */
        .matrix-enter {
            animation: matrixIn 0.7s ease-out;
        }
        .matrix-exit {
            animation: matrixOut 0.5s ease-in forwards;
        }
        @keyframes matrixIn {
            0% { opacity: 0; transform: translateY(-100%) scale(0.5); filter: blur(10px) hue-rotate(120deg); }
            25% { opacity: 0.5; transform: translateY(-50%) scale(0.7); filter: blur(5px) hue-rotate(60deg); }
            50% { opacity: 0.7; transform: translateY(-20%) scale(0.9); filter: blur(2px) hue-rotate(30deg); }

        }
        @keyframes matrixOut {
            0% { opacity: 1; transform: translateY(0%) scale(1); filter: blur(0); }
            100% { opacity: 0; transform: translateY(100%) scale(0.5); filter: blur(10px) hue-rotate(-120deg); }
        }

        /* Origami - Plegado como papel */
        .origami-enter {
            animation: origamiIn 0.8s ease-out;
        }
        .origami-exit {
            animation: origamiOut 0.6s ease-in forwards;
        }
        @keyframes origamiIn {
            0% { opacity: 0; transform: perspective(1000px) rotateX(-90deg) rotateY(45deg) scale(0.5); transform-origin: top center; }
            50% { transform: perspective(1000px) rotateX(-45deg) rotateY(22deg) scale(0.8); }
            100% { opacity: 1; transform: perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1); }
        }
        @keyframes origamiOut {
            0% { opacity: 1; transform: perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1); transform-origin: bottom center; }
            50% { transform: perspective(1000px) rotateX(45deg) rotateY(-22deg) scale(0.8); }
            100% { opacity: 0; transform: perspective(1000px) rotateX(90deg) rotateY(-45deg) scale(0.5); }
        }

        /* Liquid - Efecto lÃ­quido fluido */
        .liquid-enter {
            animation: liquidIn 0.9s ease-out;
        }
        .liquid-exit {
            animation: liquidOut 0.7s ease-in forwards;
        }
        @keyframes liquidIn {
            0% { opacity: 0; transform: translateY(-100px) scaleY(0.1) scaleX(2); border-radius: 50% 50% 50% 50%; }
            30% { transform: translateY(-30px) scaleY(1.5) scaleX(0.8); border-radius: 50% 50% 40% 40%; }
            50% { transform: translateY(10px) scaleY(0.8) scaleX(1.2); border-radius: 40% 40% 50% 50%; }
            70% { transform: translateY(-5px) scaleY(1.1) scaleX(0.9); border-radius: 45% 45% 45% 45%; }
            100% { opacity: 1; transform: translateY(0) scaleY(1) scaleX(1); border-radius: 0% 0% 0% 0%; }
        }
        @keyframes liquidOut {
            0% { opacity: 1; transform: translateY(0) scaleY(1) scaleX(1); border-radius: 0% 0% 0% 0%; }
            30% { transform: translateY(5px) scaleY(1.2) scaleX(0.8); border-radius: 40% 40% 40% 40%; }
            100% { opacity: 0; transform: translateY(100px) scaleY(0.1) scaleX(2); border-radius: 50% 50% 0% 0%; }
        }

        /* Shatter - FragmentaciÃ³n */
        .shatter-enter {
            animation: shatterIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .shatter-exit {

        @keyframes shatterIn {

        @keyframes shatterOut {
            0% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.5) rotate(45deg); filter: blur(20px); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
        }

        /* Wave - OndulaciÃ³n como ola */
        .wave-enter {
            animation: waveIn 0.8s ease-out;
        }
        .wave-exit {

        @keyframes waveIn {

        @keyframes vortexIn {

        /* Prism - Efecto prismÃ¡tico */
        .prism-enter {
            animation: prismIn 0.8s ease-out;
        }
        .prism-exit {
            animation: prismOut 0.6s ease-in forwards;

        }
        .kaleidoscope-exit {
            animation: kaleidoscopeOut 0.7s ease-in forwards;
        }
        @keyframes kaleidoscopeIn {
            0% { opacity: 0; transform: scale(0.1) rotate(0deg); filter: hue-rotate(360deg) saturate(5); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
            33% { transform: scale(0.5) rotate(120deg); filter: hue-rotate(240deg) saturate(4); clip-path: polygon(30% 0%, 100% 30%, 70% 100%, 0% 70%); }
            66% { transform: scale(0.8) rotate(240deg); filter: hue-rotate(120deg) saturate(2); clip-path: polygon(20% 0%, 100% 20%, 80% 100%, 0% 80%); }
            100% { opacity: 1; transform: scale(1) rotate(360deg); filter: hue-rotate(0deg) saturate(1); clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); }
        }
        @keyframes kaleidoscopeOut {
            0% { opacity: 1; transform: scale(1) rotate(0deg); filter: hue-rotate(0deg) saturate(1); }
            100% { opacity: 0; transform: scale(0.1) rotate(-360deg); filter: hue-rotate(-360deg) saturate(5); clip-path: polygon(50% 50%, 50% 50%, 50% 50%); }
        }

        /* Neon - Efecto neÃ³n brillante */
        .neon-enter {
            animation: neonIn 0.7s ease-out;
        }
        .neon-exit {
            animation: neonOut 0.5s ease-in forwards;
        }
        @keyframes neonIn {
            0% { opacity: 0; transform: scale(0.5) translateX(-100px); filter: brightness(0) blur(10px); text-shadow: none; }
            40% { opacity: 0.5; transform: scale(1.2) translateX(20px); filter: brightness(3) blur(5px); text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00; }
            100% { opacity: 1; transform: scale(1) translateX(0); filter: brightness(1) blur(0); text-shadow: 0 0 10px rgba(0,255,0,0.5); }
        }
        @keyframes neonOut {
            0% { opacity: 1; transform: scale(1); filter: brightness(1) blur(0); }
            60% { transform: scale(1.2); filter: brightness(3) blur(5px); text-shadow: 0 0 30px #ff0000, 0 0 50px #ff0000; }
            100% { opacity: 0; transform: scale(0.5) translateX(100px); filter: brightness(0) blur(10px); text-shadow: none; }
        }

        /* Hologram - Efecto holograma */
        .hologram-enter {
            animation: hologramIn 0.8s ease-out;
        }
        .hologram-exit {
            animation: hologramOut 0.6s ease-in forwards;
        }
        @keyframes hologramIn {
            0% { opacity: 0; transform: perspective(600px) translateZ(-300px) rotateX(45deg); filter: brightness(2) contrast(2); }
            20% { opacity: 0.3; }
            40% { opacity: 0.1; }
            60% { opacity: 0.5; }
            80% { opacity: 0.2; }
            100% { opacity: 1; transform: perspective(600px) translateZ(0) rotateX(0deg); filter: brightness(1) contrast(1); }
        }
        @keyframes hologramOut {
            0% { opacity: 1; transform: perspective(600px) translateZ(0) rotateX(0deg); filter: brightness(1); }
            20% { opacity: 0.7; }
            40% { opacity: 0.3; }
            60% { opacity: 0.8; }
            80% { opacity: 0.4; }
            100% { opacity: 0; transform: perspective(600px) translateZ(-300px) rotateX(-45deg); filter: brightness(0); }
        }

        /* Typewriter - ApariciÃ³n por partes */
        .typewriter-enter {
            animation: typewriterIn 0.8s steps(20, end);
        }
        .typewriter-exit {
            animation: typewriterOut 0.5s ease-in forwards;
        }
        @keyframes typewriterIn {
            0% { opacity: 0; clip-path: inset(0 100% 0 0); transform: translateX(-20px); }
            100% { opacity: 1; clip-path: inset(0 0 0 0); transform: translateX(0); }
        }
        @keyframes typewriterOut {
            0% { opacity: 1; clip-path: inset(0 0 0 0); }
            100% { opacity: 0; clip-path: inset(0 0 0 100%); transform: translateX(20px); }
        }

        /* Curtain - Cortina teatral */
        .curtain-enter {
            animation: curtainIn 0.9s ease-out;
        }
        .curtain-exit {
            animation: curtainOut 0.7s ease-in forwards;
        }
        @keyframes curtainIn {
            0% { opacity: 0; clip-path: inset(0 50% 0 50%); transform: scaleY(0.5); }
            50% { opacity: 0.7; clip-path: inset(0 25% 0 25%); transform: scaleY(1.1); }
            100% { opacity: 1; clip-path: inset(0 0 0 0); transform: scaleY(1); }
        }
        @keyframes curtainOut {
            0% { opacity: 1; clip-path: inset(0 0 0 0); transform: scaleY(1); }
            50% { opacity: 0.7; clip-path: inset(0 25% 0 25%); transform: scaleY(1.1); }
            100% { opacity: 0; clip-path: inset(0 50% 0 50%); transform: scaleY(0.5); }
        }

        /* Pixel - Efecto pixelado */
        .pixel-enter {
            animation: pixelIn 0.7s steps(10, end);
        }
        .pixel-exit {
            animation: pixelOut 0.5s steps(10, end) forwards;
        }
        @keyframes pixelIn {
            0% { opacity: 0; transform: scale(0.3); filter: blur(20px) contrast(0.5); }
            50% { filter: blur(10px) contrast(1.5); }
            100% { opacity: 1; transform: scale(1); filter: blur(0) contrast(1); }
        }
        @keyframes pixelOut {
            0% { opacity: 1; transform: scale(1); filter: blur(0); }
            50% { filter: blur(10px) contrast(1.5); }
            100% { opacity: 0; transform: scale(1.5); filter: blur(20px) contrast(0.5); }
        }

        /* Magnetize - Efecto magnÃ©tico */
        .magnetize-enter {
            animation: magnetizeIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .magnetize-exit {
            animation: magnetizeOut 0.6s ease-in forwards;
        }
        @keyframes magnetizeIn {
            0% { opacity: 0; transform: translateX(-300px) scaleX(3) scaleY(0.3); filter: blur(10px); }
            60% { transform: translateX(20px) scaleX(0.8) scaleY(1.2); filter: blur(2px); }
            100% { opacity: 1; transform: translateX(0) scaleX(1) scaleY(1); filter: blur(0); }
        }
        @keyframes magnetizeOut {
            0% { opacity: 1; transform: translateX(0) scaleX(1) scaleY(1); filter: blur(0); }
            40% { transform: translateX(-20px) scaleX(1.2) scaleY(0.8); filter: blur(2px); }
            100% { opacity: 0; transform: translateX(300px) scaleX(3) scaleY(0.3); filter: blur(10px); }
        }
    </style>
