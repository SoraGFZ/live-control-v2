<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gift Jar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; font-family: system-ui, sans-serif; }

    /* Stage 1100×750. Tarro mediano arriba-centro (PNG 340×340) → ocupa
       solo ~31% del ancho del stage para que el pile de gifts derramados
       tenga sitio para extenderse a los lados y abajo, igual que en la
       referencia. En OBS el usuario dimensiona su browser source y el
       stage se autoescala / centra. */
    #jar-stage {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 1100px;
      height: 750px;
      pointer-events: none;
    }

    .jar-art {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 340px;
      height: 340px;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }
    #jar-back  { z-index: 1; }
    #jar-front { z-index: 3; }

    #jar-content {
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow: hidden;
    }

    .gift-body {
      position: absolute;
      transform-origin: center center;
      pointer-events: none;
      will-change: transform;
    }
    .gift-body img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    #jar-stage.is-filling #jar-front { filter: drop-shadow(0 0 8px rgba(80, 160, 255, 0.55)); }
    #jar-stage.is-full    #jar-front { filter: drop-shadow(0 0 14px rgba(255, 180, 60, 0.85)); }

    /* Toast anclado AL STAGE (position:absolute), justo debajo del tarro
       y encima del contador. bottom:40 → queda en el espacio entre el
       fondo del jar PNG (y≈470 del stage) y el contador (bottom:4). */
    #donor-toast {
      position: absolute;
      left: 50%;
      bottom: 40px;
      transform: translate(-50%, 20px);
      z-index: 6;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px 8px 8px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(6px);
      border-radius: 999px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: transform .35s cubic-bezier(.2,.7,.3,1.4), opacity .35s ease;
      white-space: nowrap;
      max-width: 360px;
    }
    #donor-toast.show { opacity: 1; transform: translate(-50%, 0); }
    #donor-toast .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5aa9ff, #7a5cff);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px;
      overflow: hidden;
      flex-shrink: 0;
    }
    #donor-toast .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    #donor-toast .info { display: flex; flex-direction: column; gap: 2px; line-height: 1.1; }
    #donor-toast .name { font-size: 14px; }
    #donor-toast .gift-line { display: flex; align-items: center; gap: 4px; font-size: 12px; opacity: .92; }
    #donor-toast .gift-line img { width: 18px; height: 18px; object-fit: contain; }
    #donor-toast .combo { color: #ffd76a; font-weight: 800; }

    #jar-counter {
      position: absolute;
      left: 50%;
      bottom: 4px;
      transform: translateX(-50%);
      z-index: 4;
      padding: 3px 9px;
      border-radius: 999px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
    }
    #jar-stage.show-counter #jar-counter { opacity: 1; }
  </style>
</head>
<body>
  <div id="jar-stage">
    <img id="jar-back"  class="jar-art" src="gift-jar-frames/pote-glass.png"       alt="">
    <div id="jar-content"></div>
    <img id="jar-front" class="jar-art" src="gift-jar-frames/pote-glass-front.png" alt="">

    <!-- Toast como hijo del stage con position:absolute → queda anclado
         al stage (bottom:40 desde el fondo del stage). Así sale debajo
         del jar y encima del contador, no en el fondo del viewport. -->
    <div id="donor-toast">
      <div class="avatar">U</div>
      <div class="info">
        <div class="name">Username</div>
        <div class="gift-line"><img src="" alt=""><span class="combo">x1</span></div>
      </div>
    </div>

    <div id="jar-counter">0</div>
  </div>

  <script src="/widgets/core/env.js?v=20260521"></script>
  <script src="tikcontrol-widget-base.js?v=2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="gift-jar.js?v=13"></script>
</body>
</html>
