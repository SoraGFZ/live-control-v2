<style>
html,body{margin:0;padding:0;background:transparent;font-family:Arial Black,sans-serif;overflow:hidden}
.container{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px}
.scoreboard-mode{display:flex;flex-direction:column;align-items:center;gap:20px;background:transparent;padding:30px;border-radius:20px;border:none;box-shadow:none;min-width:600px}
.scoreboard-teams{display:flex;align-items:center;gap:40px;width:100%;justify-content:center}
.scoreboard-team{display:flex;flex-direction:column;align-items:center;gap:15px;flex:1}
.team-name{font-size:32px;font-weight:900;text-shadow:2px 2px 4px rgba(0,0,0,.8);letter-spacing:1px}
.team-score{font-size:64px;font-weight:900;text-shadow:3px 3px 6px rgba(0,0,0,.9);padding:15px 30px;background:transparent;border-radius:15px;min-width:120px;text-align:center}
.team-gifts-carousel{display:flex;align-items:center;justify-content:center;gap:10px;height:120px;overflow:hidden;position:relative}
.carousel-gift{display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;position:absolute;transition:opacity 0.5s ease-in-out}
.carousel-gift.active{opacity:1;position:relative}
.carousel-gift img{width:70px;height:70px;object-fit:contain;filter:drop-shadow(0 3px 6px rgba(0,0,0,.9))}
.carousel-gift-value{font-size:24px;font-weight:900;text-shadow:2px 2px 4px rgba(0,0,0,.9)}
.vs-divider{font-size:48px;font-weight:900;color:#fff;text-shadow:3px 3px 6px rgba(0,0,0,.9)}
.battle-status{font-size:24px;font-weight:700;color:#fff;text-align:center;text-shadow:2px 2px 4px rgba(0,0,0,.8);margin-top:10px}
.bar-mode{display:flex;flex-direction:column;gap:20px;width:800px;background:transparent;padding:30px;border-radius:20px;border:none;box-shadow:none}
.bar-teams-header{display:flex;justify-content:space-between;align-items:center;width:100%}
.bar-team-info{display:flex;flex-direction:column;gap:8px;align-items:center;flex:1}
.bar-team-name{font-size:28px;font-weight:900;text-shadow:2px 2px 4px rgba(0,0,0,.8)}
.bar-team-gifts{display:flex;gap:10px;align-items:center;justify-content:center}
.bar-team-gifts img{width:40px;height:40px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,.8))}
.bar-vs{font-size:36px;font-weight:900;color:#fff;text-shadow:3px 3px 6px rgba(0,0,0,.9);padding:0 20px}
.single-bar-container{width:100%;height:70px;background:transparent;border-radius:35px;overflow:hidden;position:relative;border:3px solid rgba(255,255,255,.3);display:flex}
.bar-fill-left{height:100%;transition:width .5s ease-out;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;font-size:28px;font-weight:900;color:#fff;text-shadow:3px 3px 6px rgba(0,0,0,.9)}
.bar-fill-right{height:100%;transition:width .5s ease-out;display:flex;align-items:center;justify-content:flex-start;padding-left:20px;font-size:28px;font-weight:900;color:#fff;text-shadow:3px 3px 6px rgba(0,0,0,.9)}
.bar-score{font-weight:900}
/* Rainbow seamless. Usar PIXELS fijos para bg-size y shift evita que
   el tile cambie de tamaÃ±o cuando el ancho del elemento se anima con
   transition:width (que rompÃ­a el loop al recalcular el bg cada vez).
   El gradient empieza y termina con el mismo color â†’ al desplazar
   exactamente un ancho de tile (-900px), el siguiente tile encaja
   pixel-perfect y el bucle es invisible. */
@keyframes gbRainbow{0%{background-position:0 50%}100%{background-position:-900px 50%}}
.rainbow{
  animation:gbRainbow 3s linear infinite !important;
  background-image:linear-gradient(90deg,#ff0040,#ff8a00,#ffe600,#00d200,#00b7ff,#a500ff,#ff0040) !important;
  background-color:transparent !important;
  background-size:900px 100% !important;
  background-repeat:repeat-x !important;
  will-change:background-position
}
.rainbow-text{
  animation:gbRainbow 3s linear infinite;
  background-image:linear-gradient(90deg,#ff0040,#ff8a00,#ffe600,#00d200,#00b7ff,#a500ff,#ff0040);
  background-size:900px 100%;
  background-repeat:repeat-x;
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;
  text-shadow:none;
  position:relative;
  will-change:background-position
}

/* Contorno + sombra en capas separadas, estilo top-gift.
   - ::before z-index:-1 â†’ stroke (outline puro, exterior)
   - ::after  z-index:-2 â†’ sombra (texto opaco desplazado + blur)
   La sombra queda DETRÃS del stroke (no se cruzan, no hay halo raro).
   Ambos pseudos usan data-text para replicar el glifo. */
/* Sin display:inline-block aquÃ­ â€” romper flex de .bar-fill-left/right
   desplazaba el score y el pseudo se renderizaba como forma rara.
   El inline-block se aplica puntualmente via JS solo a los spans
   que lo necesitan (.bar-score, spans del mensaje ganador). */
.gb-has-stroke{position:relative; isolation:isolate}
.gb-has-stroke::before{
  content:attr(data-text);
  position:absolute; top:0; left:0; width:100%; height:100%;
  z-index:-1;
  -webkit-text-fill-color:transparent;
  color:transparent;
  -webkit-text-stroke:var(--gb-stroke-w,2px) var(--gb-stroke-c,#000);
  background:none !important;
  text-shadow:none !important;
  animation:none !important;
  pointer-events:none;
  white-space:inherit;
  text-align:inherit;
  font:inherit;
  letter-spacing:inherit;
  padding:inherit;
  box-sizing:border-box;
}

.gb-has-shadow{position:relative; isolation:isolate}
.gb-has-shadow::after{
  content:attr(data-text);
  position:absolute; top:0; left:0; width:100%; height:100%;
  z-index:-2;
  color:rgba(0,0,0,.85);
  -webkit-text-fill-color:rgba(0,0,0,.85);
  background:none !important;
  -webkit-text-stroke:0;
  text-shadow:none !important;
  animation:none !important;
  pointer-events:none;
  white-space:inherit;
  text-align:inherit;
  font:inherit;
  letter-spacing:inherit;
  filter:blur(3px);
  transform:translate(2px,2px);
}
.battle-timer{font-size:20px;font-weight:700;color:#fff;text-align:center;text-shadow:2px 2px 4px rgba(0,0,0,.8);background:transparent;padding:10px 20px;border-radius:10px}
.hidden{display:none!important}
</style>
