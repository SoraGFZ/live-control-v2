<html lang="es">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Win/Life - TikControl</title>
  <link rel="stylesheet" href="/widgets/core/tikcontrol-widget.css">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@700;900&display=swap" rel="stylesheet">
  <style>
    /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       WIN/LIFE WIDGET V2 - AWS Edition
       Modern glassmorphism design with animations
       â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */

    :root {
      --wl-wins-color: #FFD700;
      --wl-lives-color: #FF1744;
      --wl-bg: rgba(0, 0, 0, 0.6);
      --wl-border: rgba(255, 255, 255, 0.15);
      --wl-glow-wins: rgba(255, 215, 0, 0.5);
      --wl-glow-lives: rgba(255, 23, 68, 0.5);
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent !important;
      overflow: hidden;
      font-family: 'Inter', 'Bangers', system-ui, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    #container {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    /* Card styling with glassmorphism */
    .stat-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 30px;
      background: var(--wl-bg);
      border-radius: 20px;
      border: 1px solid var(--wl-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      min-width: 120px;
    }

    .stat-card.no-bg {
      background: transparent !important;
      border: none !important;
      backdrop-filter: none !important;
    }

    .stat-card.wins {
      box-shadow: 0 0 30px var(--wl-glow-wins);
    }

    .stat-card.lives {
      box-shadow: 0 0 30px var(--wl-glow-lives);
    }

    /* Icon/Emoji */
    .stat-icon {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 8px;
    }

    /* Value display */
    .stat-value {
      font-size: 42px;
      font-weight: 900;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
      line-height: 1;
    }

    .stat-value.wins {
      color: var(--wl-wins-color);
    }

    .stat-value.lives {
      color: var(--wl-lives-color);
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      margin-top: 12px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .progress-fill.wins {
      background: linear-gradient(90deg, #FFD700, #FFA000);
    }

    .progress-fill.lives {
      background: linear-gradient(90deg, #FF1744, #FF5722);
    }

    /* Label */
    .stat-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 8px;
    }

    /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       ANIMATIONS
       â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */

    /* Icon animations */
    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.15);
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-8px) rotate(-5deg);
      }

      75% {
        transform: translateX(8px) rotate(5deg);
      }
    }

    @keyframes glow-pulse {

      0%,
      100% {
        filter: drop-shadow(0 0 5px currentColor);
      }

      50% {
        filter: drop-shadow(0 0 20px currentColor);
      }
    }

    .anim-bounce {
      animation: bounce 1s ease-in-out infinite;
    }

    .anim-pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }

    .anim-shake {
      animation: shake 0.5s ease-in-out;
    }

    .anim-glow {
      animation: glow-pulse 2s ease-in-out infinite;
    }

    /* Value change animations */
    @keyframes pop {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.3);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes flash-red {

      0%,
      100% {
        color: inherit;
      }

      50% {
        color: #FF0000;
        text-shadow: 0 0 20px #FF0000;
      }
    }

    @keyframes flash-green {

      0%,
      100% {
        color: inherit;
      }

      50% {
        color: #00FF00;
        text-shadow: 0 0 20px #00FF00;
      }
    }

    .change-pop {
      animation: pop 0.4s ease-out;
    }

    .change-up {
      animation: flash-green 0.6s ease-out;
    }

    .change-down {
      animation: flash-red 0.6s ease-out;
    }

    /* Card shake on damage */
    .card-shake {
      animation: shake 0.4s ease-in-out;
    }

    /* OK Text animations */
    .text-glow {
      animation: text-glow-anim 2s ease-in-out infinite;
    }

    @keyframes text-glow-anim {

      0%,
      100% {
        text-shadow: 0 0 10px currentColor;
      }

      50% {
        text-shadow: 0 0 30px currentColor, 0 0 50px currentColor;
      }
    }

    .text-fade {
      animation: text-fade-anim 1.5s ease-in-out infinite;
    }

    @keyframes text-fade-anim {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.6;
      }
    }

    .text-slide {
      animation: text-slide-anim 2s ease-in-out infinite;
    }

    @keyframes text-slide-anim {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(3px);
      }

      75% {
        transform: translateX(-3px);
      }
    }

    /* OK No background class */
    .stat-card.no-bg {
      background: transparent !important;
      backdrop-filter: none !important;
      border: none !important;
      box-shadow: none !important;
    }

    /* Contorno de texto exterior â€” aplicado a nÃºmero, etiqueta e icono
       (antes solo afectaba al nÃºmero, el usuario esperaba todo el texto). */
    .stroke-enabled .stat-value,
    .stroke-enabled .stat-label,
    .stroke-enabled .stat-icon {
      -webkit-text-stroke: var(--wl-stroke-width) var(--wl-stroke-color);
      text-stroke: var(--wl-stroke-width) var(--wl-stroke-color);
      paint-order: stroke fill;
    }

    /* Evitar que text-shadow de animaciones (glow/flash) tape el contorno */
    .stroke-enabled .stat-value.text-glow,
    .stroke-enabled .stat-value.change-up,
    .stroke-enabled .stat-value.change-down {
      -webkit-text-stroke: var(--wl-stroke-width) var(--wl-stroke-color);
      paint-order: stroke fill;
    }

<body>
  <div id="container">
    <!-- Wins Card -->
    <div class="stat-card wins" id="wins-card">
      <div class="stat-icon anim-bounce" id="wins-icon"><span class="tc-svg-icon trophy"></span></div>
      <div class="stat-value wins" id="wins-value">0</div>
      <div class="progress-bar">
        <div class="progress-fill wins" id="wins-progress" style="width: 0%"></div>
      </div>
      <div class="stat-label" id="wins-label">WINS</div>
    </div>

    <!-- Lives Card -->
    <div class="stat-card lives" id="lives-card">
      <div class="stat-icon anim-pulse" id="lives-icon"><span class="tc-svg-icon heart"></span></div>
      <div class="stat-value lives" id="lives-value">10</div>
      <div class="progress-bar">
        <div class="progress-fill lives" id="lives-progress" style="width: 100%"></div>
      </div>
      <div class="stat-label" id="lives-label">LIVES</div>
    </div>
  </div>

  <script>
    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
    // WIN/LIFE WIDGET V2 - AWS Edition
    // Compatible con el schema de config de TikControl
    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

    // Schema idÃ©ntico al de renderer/tabs/widgets/config/winlife.js
    const DEFAULTS = {
      wins: { current: 0, target: 10, emoji: 'trophy', emojiColor: '#FFD700', label: 'WINS', allowNegative: true, showTarget: true, showLabel: true, labelOffsetX: 0, labelOffsetY: 0 },
      lives: { current: 10, target: 10, emoji: 'heart', emojiColor: '#FF1744', label: 'LIVES', allowNegative: false, showTarget: true, showLabel: true, labelOffsetX: 0, labelOffsetY: 0 },
      triggers: [],
      styles: {
        displayMode: 'both',
        showBg: true,
        showProgress: true,
        showLabels: true,
        fontFamily: 'Bangers',
        fontUrl: 'https://fonts.googleapis.com/css2?family=Bangers&display=swap',
        fontSize: 48,
        winsColor: '#FFD700',
        livesColor: '#FF1744',
        textColor: '#FFFFFF',
        backgroundColor: 'transparent',
        emojiAnimation: 'bounce',
        textAnimation: 'glow',
        valueAnimation: 'scale',
        animationDuration: 800,
        strokeEnabled: false,
        strokeColor: '#000000',
        strokeWidth: 3
      }
    };

    const state = JSON.parse(JSON.stringify(DEFAULTS));

    // DOM elements
    const winsCard = document.getElementById('wins-card');
    const livesCard = document.getElementById('lives-card');
    const winsIcon = document.getElementById('wins-icon');
    const livesIcon = document.getElementById('lives-icon');
    const winsValue = document.getElementById('wins-value');
    const livesValue = document.getElementById('lives-value');
    const winsProgress = document.getElementById('wins-progress');
    const livesProgress = document.getElementById('lives-progress');
    const winsLabelEl = document.getElementById('wins-label');
    const livesLabelEl = document.getElementById('lives-label');

    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
    // INICIALIZACIÃ“N TIKCONTROL
    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

    TikControl.init('winlife', { persistent: true, sessionBased: false });

    // Cargar configuraciÃ³n (schema compatible con TikControl)
    TikControl.onConfig((config) => {
      // Log de config eliminado para reducir spam

      // Merge wins
      if (config.wins) {
        state.wins = { ...DEFAULTS.wins, ...state.wins, ...config.wins };
      }

      // Merge lives
      if (config.lives) {
        state.lives = { ...DEFAULTS.lives, ...state.lives, ...config.lives };
      }

      // Triggers
      if (config.triggers) {
        state.triggers = config.triggers;
      }

      // Merge styles
      if (config.styles) {
        state.styles = { ...DEFAULTS.styles, ...state.styles, ...config.styles };
      }

      applyStyles();
      updateDisplay();
    });

    // Cargar datos persistentes
    TikControl.onData((data) => {
      // Log de data eliminado para reducir spam

      // OK Defensa anti-corrupciÃ³n: data.wins/lives debe ser NÃšMERO.
      // Si llega como objeto (bug histÃ³rico que guardaba state entero),
      // extraer .current o cae a 0/target.
      const coerce = (v, fallback) => {
        if (typeof v === 'number' && Number.isFinite(v)) return v;
        if (v && typeof v === 'object' && typeof v.current === 'number') return v.current;
        const n = parseInt(v, 10);
        return Number.isFinite(n) ? n : fallback;
      };

      if (data.wins !== undefined) {
        state.wins.current = coerce(data.wins, 0);
      }
      if (data.lives !== undefined) {
        state.lives.current = coerce(data.lives, state.lives.target);
      }

      updateDisplay();
    });

    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
    // EVENTOS
    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

    // Escuchar regalos para triggers.
    // Solo `gift-solo` â€” un evento por unidad de regalo. Escuchar tambiÃ©n
    // `gift` (que el server emite al terminar el combo con el total) causaba
    // que los triggers se aplicaran una vez extra por cada combo.
    TikControl.on('gift-solo', handleGiftEvent);

    // OK Escuchar actualizaciones de config en tiempo real desde TikControl
    // Pueden llegar via widget:config (AWS) o widget:configUpdated (local server)
    function toFiniteNumber(value, fallback = 0) {
      const num = Number(value);
      return Number.isFinite(num) ? num : fallback;
    }

    function handleConfigUpdate(data, options = {}) {
      const cfg = data?.config || data;
      const widget = data?.widget;
      const applyCurrent = options.applyCurrent === true;

      if (widget && widget !== 'winlife') return;

      const curWins = state.wins.current;
      const curLives = state.lives.current;

      if (cfg.wins) {
        state.wins = { ...DEFAULTS.wins, ...state.wins, ...cfg.wins };
        if (!applyCurrent || cfg.wins.current == null) state.wins.current = curWins;
      }
      if (cfg.lives) {
        state.lives = { ...DEFAULTS.lives, ...state.lives, ...cfg.lives };
        if (!applyCurrent || cfg.lives.current == null) state.lives.current = curLives;
      }
      if (cfg.triggers) {
        state.triggers = cfg.triggers;
      }
      if (cfg.styles) {
        state.styles = { ...DEFAULTS.styles, ...state.styles, ...cfg.styles };
      }

      applyStyles();
      updateDisplay();
    }

    TikControl.on('widget:config', handleConfigUpdate);
    TikControl.on('widget:configUpdated', handleConfigUpdate);
    TikControl.on('winlife:update', (data) => handleConfigUpdate(data, { applyCurrent: true }));
    TikControl.on('winlife:change', (data) => {
      const type = data?.type === 'lives' ? 'lives' : (data?.type === 'wins' ? 'wins' : '');
      if (!type) return;

      if (data.config) {
        handleConfigUpdate({ widget: 'winlife', config: data.config });
      }

      const delta = toFiniteNumber(data.delta, NaN);
      if (Number.isFinite(delta) && delta !== 0) {
        modifyValue(type, delta);
        return;
      }

      const nextValue = toFiniteNumber(data.newValue, NaN);
      if (Number.isFinite(nextValue)) {
        modifyValue(type, nextValue - state[type].current);
      }
    });

    function stableHash(value) {
      const str = String(value || '');
      let hash = 2166136261;
      for (let i = 0; i < str.length; i++) {
        hash ^= str.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function getEventSeed(data, trigger) {
      const gift = data.gift || data.giftDetails || {};
      const user = data.user || {};
      return [
        data.msgId || data.messageId || data.eventId || '',
        data.userId || data.uniqueId || user.userId || user.uniqueId || '',
        data.giftId || data.gift_id || gift.giftId || gift.id || data.id || '',
        data.repeatCount || data.repeat_count || data.comboCount || 1,
        trigger.id || trigger.giftId || trigger.giftName || '',
        trigger.type || 'wins',
        trigger.value || 1
      ].join('|');
    }

    function resolveTriggerDelta(trigger, data) {
      const value = Math.max(1, Number(trigger.value || 1));
      const mode = trigger.mode || 'add';
      if (mode === 'add') return value;
      if (mode === 'subtract') return -value;
      if (mode === 'random') {
        return stableHash(getEventSeed(data, trigger)) % 2 === 0 ? -value : value;
      }
      return 0;
    }

    function triggerMatchesGift(trigger, giftId, giftName) {
      if (!trigger) return false;
      const hasGiftId = trigger.giftId !== undefined && trigger.giftId !== null && trigger.giftId !== '';
      if (hasGiftId && String(trigger.giftId) === giftId) return true;
      return Boolean(trigger.giftName && String(trigger.giftName).trim().toLowerCase() === giftName);
    }

    function handleGiftEvent(data) {
      if (!state.triggers || state.triggers.length === 0) return;

      const giftDetails = data.giftDetails || data.gift || {};
      const giftId = String(data.giftId || giftDetails.giftId || giftDetails.id || '');
      const giftName = (giftDetails.giftName || giftDetails.name || data.giftName || '').toLowerCase();

      // Buscar triggers que coincidan. Un regalo puede tener varias reglas.
      const triggers = state.triggers.filter(t => triggerMatchesGift(t, giftId, giftName));

      if (triggers.length === 0) return;

      // Log de trigger eliminado para reducir spam
      triggers.forEach(trigger => applyTrigger(trigger, data));
    }

    function applyTrigger(trigger, data) {
      const type = trigger.type === 'lives' ? 'lives' : 'wins';
      const delta = resolveTriggerDelta(trigger, data);
      if (!delta) return;

      const oldValue = state[type].current;
      let newValue = oldValue + delta;

      // OK Respetar allowNegative de cada tipo
      const allowNegative = state[type].allowNegative !== false;
      if (!allowNegative && newValue < 0) newValue = 0;

      state[type].current = newValue;

      // Animar cambio
      animateChange(type, delta);
      updateDisplay();

      // Persistir
      TikControl.saveData({
        wins: state.wins.current,
        lives: state.lives.current
      });

      // Log de cambio eliminado para reducir spam
    }

    // Escuchar comandos (desde StreamDeck u otros)
    TikControl.on('winlife:command', (data) => {
      // [log cleaned]
      const { action, value } = data;

      switch (action) {
        case 'add_win':
          modifyValue('wins', value || 1);
          break;
        case 'subtract_win':
          modifyValue('wins', -(value || 1));
          break;
        case 'add_life':
          modifyValue('lives', value || 1);
          break;
        case 'subtract_life':
          modifyValue('lives', -(value || 1));
          break;
        case 'random_win':
          modifyValue('wins', Math.random() < 0.5 ? -(value || 1) : (value || 1));
          break;
        case 'random_life':
          modifyValue('lives', Math.random() < 0.5 ? -(value || 1) : (value || 1));
          break;
        case 'reset':
          state.wins.current = 0;
          state.lives.current = state.lives.target;
          updateDisplay();
          TikControl.saveData({ wins: 0, lives: state.lives.target });
          break;
      }
    });

    function modifyValue(type, delta) {
      const oldValue = state[type].current;
      let newValue = oldValue + delta;

      // OK Respetar allowNegative de cada tipo
      const allowNegative = state[type].allowNegative !== false; // default true para wins
      if (!allowNegative && newValue < 0) newValue = 0;

      state[type].current = newValue;
      animateChange(type, delta);
      updateDisplay();

      TikControl.saveData({
        wins: state.wins.current,
        lives: state.lives.current
      });
    }

    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
    // UI FUNCTIONS
    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

    function applyStyles() {
      const s = state.styles;

      // Display mode
      if (s.displayMode === 'wins') {
        winsCard.style.display = 'flex';
        livesCard.style.display = 'none';
      } else if (s.displayMode === 'lives') {
        winsCard.style.display = 'none';
        livesCard.style.display = 'flex';
      } else {
        winsCard.style.display = 'flex';
        livesCard.style.display = 'flex';
      }

      // Background - showBg toggle has priority
      // If showBg is true, show the background (default dark)
      // If showBg is false, hide the background
      const showBg = s.showBg !== false;
      winsCard.classList.toggle('no-bg', !showBg);
      livesCard.classList.toggle('no-bg', !showBg);
      if (showBg && s.backgroundColor && s.backgroundColor !== 'transparent') {
        document.documentElement.style.setProperty('--wl-bg', s.backgroundColor);
      }

      // Progress bars visibility
      document.querySelectorAll('.progress-bar').forEach(el => {
        el.style.display = s.showProgress !== false ? 'block' : 'none';
      });

      // Labels visibility â€” toggle global (showLabels) Y por-card (wins.showLabel / lives.showLabel)
      const globalShowLabels = s.showLabels !== false;
      const winsShowLabel = state.wins.showLabel !== false;
      const livesShowLabel = state.lives.showLabel !== false;
      winsLabelEl.style.display = (globalShowLabels && winsShowLabel) ? 'block' : 'none';
      livesLabelEl.style.display = (globalShowLabels && livesShowLabel) ? 'block' : 'none';

      // Label text editable
      winsLabelEl.textContent = state.wins.label || 'WINS';
      livesLabelEl.textContent = state.lives.label || 'LIVES';

      // Label position (offset X/Y). Uso position:relative + left/top en vez de
      // transform: translate() para no crear stacking contexts.
      const wx = state.wins.labelOffsetX || 0, wy = state.wins.labelOffsetY || 0;
      const lx = state.lives.labelOffsetX || 0, ly = state.lives.labelOffsetY || 0;
      winsLabelEl.style.position = 'relative';
      winsLabelEl.style.left = wx ? `${wx}px` : '';
      winsLabelEl.style.top = wy ? `${wy}px` : '';
      livesLabelEl.style.position = 'relative';
      livesLabelEl.style.left = lx ? `${lx}px` : '';
      livesLabelEl.style.top = ly ? `${ly}px` : '';

      // Fuente personalizada: dejar que loadCustomFont ponga el fontFamily
      // con el nombre limpio que registra font-loader.js (reemplaza `_` por
      // espacios, quita extension, etc.). Poner aqui `s.fontFamily` a pelo
      // pisaba ese valor y hacia que el navegador cayese al fallback.
      if (s.fontFamily) {
        loadCustomFont(s.fontFamily, s.fontUrl);
      }

      // Stroke via CSS class + variables (same pattern as top-donors/top-rotation)
      const sw = s.strokeWidth || 3;
      const sc = s.strokeColor || '#000000';
      document.documentElement.style.setProperty('--wl-stroke-width', `${sw}px`);
      document.documentElement.style.setProperty('--wl-stroke-color', sc);
      document.getElementById('container').classList.toggle('stroke-enabled', !!s.strokeEnabled);

      // Usar asignaciones individuales en vez de cssText para no pisar
      // propiedades aplicadas vÃ­a clase (stroke, animaciones) ni inline
      // offsets puestos por label/value positioning.
      winsValue.style.fontSize = `${s.fontSize}px`;
      winsValue.style.color = s.winsColor;
      livesValue.style.fontSize = `${s.fontSize}px`;
      livesValue.style.color = s.livesColor;

      // CSS Variables
      document.documentElement.style.setProperty('--wl-wins-color', s.winsColor);
      document.documentElement.style.setProperty('--wl-lives-color', s.livesColor);
      document.documentElement.style.setProperty('--wl-glow-wins', s.winsColor + '80');
      document.documentElement.style.setProperty('--wl-glow-lives', s.livesColor + '80');

      winsIcon.innerHTML = '<span class="tc-svg-icon trophy"></span>';
      livesIcon.innerHTML = '<span class="tc-svg-icon heart"></span>';
      winsIcon.style.cssText = `color: ${state.wins.emojiColor || s.winsColor};`;
      livesIcon.style.cssText = `color: ${state.lives.emojiColor || s.livesColor};`;

      // Emoji animations
      winsIcon.className = 'stat-icon';
      livesIcon.className = 'stat-icon';
      if (s.emojiAnimation && s.emojiAnimation !== 'none') {
        winsIcon.classList.add(`anim-${s.emojiAnimation}`);
        livesIcon.classList.add(`anim-${s.emojiAnimation}`);
      }

      // Text animations (glow, etc)
      winsValue.classList.remove('text-glow', 'text-fade', 'text-slide');
      livesValue.classList.remove('text-glow', 'text-fade', 'text-slide');
      if (s.textAnimation && s.textAnimation !== 'none') {
        winsValue.classList.add(`text-${s.textAnimation}`);
        livesValue.classList.add(`text-${s.textAnimation}`);
      }

      // [log cleaned]
    }

    function loadCustomFont(fontFamily, fontUrl) {
      if (!fontFamily) return;
      // Si el "fontFamily" es un filename .ttf/.woff y no se pasÃ³ URL,
      // construir la URL del usuario en R2 (mismo patrÃ³n que top-gift/top-combo).
      if (!fontUrl && fontFamily.match(/\.(otf|ttf|woff|woff2)$/i)) {
        var uid = new URLSearchParams(window.location.search).get('uid');
        fontUrl = ((window.__tcEnv && window.__tcEnv.st) ? window.__tcEnv.st() : '') + '/users-data/' + uid + '/fonts/' + fontFamily;
      }
      if (window.__tcLoadFont) {
        var cssVal = window.__tcLoadFont(fontFamily, fontUrl);
        if (cssVal) document.body.style.fontFamily = cssVal;
      } else if (fontUrl) {
        document.body.style.fontFamily = '"' + fontFamily + '", system-ui, sans-serif';
      }
    }

    function updateDisplay() {
      // Values - respect showTarget setting
      if (state.wins.showTarget !== false) {
        winsValue.textContent = `${state.wins.current} / ${state.wins.target}`;
      } else {
        winsValue.textContent = state.wins.current;
      }

      if (state.lives.showTarget !== false) {
        livesValue.textContent = `${state.lives.current} / ${state.lives.target}`;
      } else {
        livesValue.textContent = state.lives.current;
      }

      // Progress bars
      const winsPercent = Math.min(100, Math.max(0, (state.wins.current / state.wins.target) * 100));
      const livesPercent = Math.min(100, Math.max(0, (state.lives.current / state.lives.target) * 100));

      winsProgress.style.width = `${winsPercent}%`;
      livesProgress.style.width = `${livesPercent}%`;
    }

    function animateChange(type, delta) {
      const valueEl = type === 'wins' ? winsValue : livesValue;
      const cardEl = type === 'wins' ? winsCard : livesCard;

      // Remove previous animations
      valueEl.classList.remove('change-pop', 'change-up', 'change-down');
      cardEl.classList.remove('card-shake');

      // Force reflow
      void valueEl.offsetWidth;

      // Add animations
      valueEl.classList.add('change-pop');

      if (delta > 0) {
        valueEl.classList.add('change-up');
      } else if (delta < 0) {
        valueEl.classList.add('change-down');
        cardEl.classList.add('card-shake');
      }

      // Remove after animation
      setTimeout(() => {
        valueEl.classList.remove('change-pop', 'change-up', 'change-down');
        cardEl.classList.remove('card-shake');
      }, 600);
    }

    // Initial display
    updateDisplay();

    // OK Listener para botÃ³n de Test desde TikControl
    window.addEventListener('message', (event) => {
      if (!event.data || !event.data.type) return;
      if (event.data.type === 'WINLIFE_TEST') {
        const action = event.data.data?.action || 'win';
        if (action === 'win') {
          modifyValue('wins', 1);
        } else if (action === 'life') {
          modifyValue('lives', -1);
        }
      }
      if (event.data.type === 'WINLIFE_RESET') {
        state.wins.current = 0;
        state.lives.current = state.lives.target;
        updateDisplay();
        // OK Solo guardar los contadores, no el state entero. Guardar state
        // completo rompÃ­a state.wins.current convirtiÃ©ndolo en un objeto
        // al recargar (onData asigna data.wins a state.wins.current).
        TikControl.saveData({ wins: state.wins.current, lives: state.lives.current });
      }
      if (event.data.type === 'WINLIFE_CONFIG' && event.data.config) {
        const c = event.data.config;
        const curWins = state.wins.current;
        const curLives = state.lives.current;
        if (c.wins) { Object.assign(state.wins, c.wins); state.wins.current = c.wins.current ?? curWins; }
        if (c.lives) { Object.assign(state.lives, c.lives); state.lives.current = c.lives.current ?? curLives; }
        if (c.styles) Object.assign(state.styles, c.styles);
        if (c.triggers) state.triggers = c.triggers;
        applyStyles();
        updateDisplay();
      }
    });

    // [log cleaned]
  </script>
</body>
