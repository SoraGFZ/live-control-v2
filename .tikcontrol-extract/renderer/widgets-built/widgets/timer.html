<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer Widget</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      font-family: 'Orbitron', 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }

    #widget-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    #widget-container[data-style="minimal"] {
      gap: 10px;
    }

    #widget-container[data-style="digits"] {
      gap: 0;
    }

    #widget-container[data-style="arcade"] {
      gap: 18px;
    }

    #widget-container[data-style="digits"] #timer-wrapper::before,
    #widget-container[data-style="minimal"] #timer-wrapper::before,
    #widget-container[data-style="terminal"] #timer-wrapper::before {
      display: none;
    }

    /* ===== TIMER DISPLAY ===== */
    #timer-wrapper {
      position: relative;
      padding: 20px 40px;
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(20, 20, 40, 0.9), rgba(40, 40, 80, 0.8));
      border: 2px solid rgba(100, 180, 255, 0.3);
      box-shadow: 
        0 0 30px rgba(100, 180, 255, 0.2),
        inset 0 0 30px rgba(100, 180, 255, 0.05);
      overflow: hidden;
    }

    #timer-wrapper::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(
        transparent,
        rgba(100, 180, 255, 0.1),
        transparent 30%
      );
      animation: rotate 4s linear infinite;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .timer-running #timer-wrapper::before {
      opacity: 1;
    }

    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }

    #timer-display {
      position: relative;
      font-size: 80px;
      font-weight: 900;
      color: #ffffff;
      text-shadow:
        0 0 10px rgba(100, 180, 255, 0.8),
        0 0 20px rgba(100, 180, 255, 0.5),
        0 0 40px rgba(100, 180, 255, 0.3);
      letter-spacing: 4px;
      z-index: 1;
      white-space: nowrap;
    }

    /* ===== ESTADOS ===== */
    .timer-paused #timer-display {
      color: rgba(255, 255, 255, 0.6);
      text-shadow: none;
      animation: pulse 2s ease-in-out infinite;
    }

    .timer-urgent #timer-display {
      color: #ff6b6b;
      text-shadow:
        0 0 10px rgba(255, 107, 107, 0.8),
        0 0 20px rgba(255, 107, 107, 0.5),
        0 0 40px rgba(255, 107, 107, 0.3);
      animation: urgent-pulse 0.5s ease-in-out infinite;
    }

    .timer-urgent #timer-wrapper {
      border-color: rgba(255, 107, 107, 0.5);
      box-shadow: 
        0 0 30px rgba(255, 107, 107, 0.3),
        inset 0 0 30px rgba(255, 107, 107, 0.05);
    }

    .timer-finished #timer-display {
      color: #ff4444;
      animation: blink 0.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes urgent-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ===== LEYENDA ===== */
    #legend-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 15px 20px;
      background: linear-gradient(145deg, rgba(30, 30, 50, 0.95), rgba(50, 50, 80, 0.9));
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      max-width: 400px;
    }

    #legend-container.hidden {
      display: none !important;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }

    #widget-container[data-style="minimal"] .legend-item {
      background: rgba(0, 0, 0, 0.28);
    }

    #widget-container[data-style="neon"] .legend-item {
      background: rgba(255, 255, 255, 0.08);
    }

    #widget-container[data-style="terminal"] .legend-item {
      background: rgba(49, 242, 143, 0.08);
    }

    #widget-container[data-style="arcade"] .legend-item {
      background: rgba(250, 204, 21, 0.1);
    }

    .legend-item.highlight {
      background: rgba(100, 255, 150, 0.15);
      border-color: rgba(100, 255, 150, 0.4);
      transform: scale(1.05);
    }

    .legend-icon {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .legend-icon svg,
    .legend-unit svg,
    .bonus-icon svg,
    .particle svg {
      width: 1em;
      height: 1em;
      display: block;
      fill: currentColor;
      stroke: currentColor;
    }

    .legend-item[data-type="like"] .legend-icon,
    .legend-item[data-type="like"] .legend-unit,
    .bonus-popup[data-event-type="like"] .bonus-icon,
    .particle[data-event-type="like"] {
      color: #ff5c8a;
    }

    .legend-item[data-type="share"] .legend-icon,
    .legend-item[data-type="share"] .legend-unit,
    .bonus-popup[data-event-type="share"] .bonus-icon,
    .particle[data-event-type="share"] {
      color: #38bdf8;
    }

    .legend-item[data-type="coin"] .legend-icon,
    .legend-item[data-type="coin"] .legend-unit,
    .bonus-popup[data-event-type="coin"] .bonus-icon,
    .particle[data-event-type="coin"] {
      color: #facc15;
    }

    .legend-item[data-type="sub"] .legend-icon,
    .legend-item[data-type="sub"] .legend-unit,
    .bonus-popup[data-event-type="sub"] .bonus-icon,
    .particle[data-event-type="sub"] {
      color: #a78bfa;
    }

    .legend-item[data-type="comment"] .legend-icon,
    .legend-item[data-type="comment"] .legend-unit,
    .bonus-popup[data-event-type="comment"] .bonus-icon,
    .particle[data-event-type="comment"] {
      color: #34d399;
    }

    .legend-value {
      font-size: 16px;
      font-weight: 700;
      color: #4ade80;
      text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
    }

    /* ===== BONUS POPUP ===== */
    .bonus-popup {
      position: fixed;
      left: 50%;
      top: 40%;
      transform: translate(-50%, -50%);
      font-size: 60px;
      font-weight: 900;
      color: #4ade80;
      text-shadow: 
        0 0 20px rgba(74, 222, 128, 0.8),
        0 0 40px rgba(74, 222, 128, 0.5),
        2px 2px 0 rgba(0, 0, 0, 0.8);
      animation: bonus-anim 1.8s ease-out forwards;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
    }

    .bonus-popup .bonus-icon {
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
      vertical-align: middle;
    }

    .bonus-popup.negative {
      color: #fb7185;
      text-shadow:
        0 0 20px rgba(251, 113, 133, 0.8),
        0 0 40px rgba(251, 113, 133, 0.45),
        2px 2px 0 rgba(0, 0, 0, 0.8);
    }

    @keyframes bonus-anim {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.3) rotate(-10deg);
      }
      15% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.3) rotate(5deg);
      }
      30% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
      }
      70% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -100%) scale(0.8) rotate(0deg);
      }
    }

    /* ===== PARTICLES ===== */
    .particle {
      position: fixed;
      pointer-events: none;
      font-size: 24px;
      animation: particle-float 2s ease-out forwards;
      z-index: 999;
    }

    @keyframes particle-float {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-100px) scale(0.5);
      }
    }
  </style>
</head>

<body>
  <div id="widget-container">
    <div id="timer-wrapper">
      <div id="timer-display">00:00</div>
    </div>
    <div id="legend-container"></div>
  </div>

  <script src="/widgets/core/env.js?v=20260507-ws-storage"></script>
  <script src="/widgets/core/font-loader.js"></script>
  <script>
    // ========================================
    // TIMER WIDGET v3.0
    // ========================================

    function getWsUrl() {
      return (window.__tcEnv && window.__tcEnv.ws) ? window.__tcEnv.ws() : '';
    }

    window.__tcSignedUrl = window.__tcSignedUrl || function(url) {
      if (!url || typeof url !== 'string') return url;
      if (url.indexOf('storage.tikcontrol.live') === -1) return url;
      if (url.indexOf('token=') !== -1) return url;
      const tokens = window.__tcStorageTokens || {};
      let tk = '';
      if (url.indexOf('/users-data/') !== -1) tk = tokens.user || '';
      else if (url.indexOf('/animations/') !== -1) tk = tokens.animations || '';
      else if (url.indexOf('/games/') !== -1) tk = tokens.games || '';
      else if (url.indexOf('/public/') !== -1) tk = tokens.public || '';
      if (!tk) return url;
      return url + (url.indexOf('?') === -1 ? '?' : '&') + 'token=' + encodeURIComponent(tk);
    };

    // Estado del timer
    let state = {
      remainingSeconds: 0,
      isRunning: false,
      totalSeconds: 0
    };

    // Default config
    let config = {
      fontSize: 80,
      fontFamily: 'Orbitron',
      textColor: '#ffffff',
      glowColor: '#64b4ff',
      showLegend: true,
      showGlow: true,
      visualStyle: 'classic',
      strokeWidth: 3,
      strokeColor: '#000000',
      legendFontSize: 16,
      legendLayout: 'wrap',
      legendAlignment: 'center',
      legendTransparent: false,
      hideTimerBackground: false,
      legendLikes: true,
      legendShares: true,
      legendCoins: true,
      legendSubs: true,
      legendComments: true,
      showDays: false,
      showLabels: false,
      // Eventos habilitados y tiempo que suman
      enableLikes: true,
      likesTime: 1,
      enableShares: true,
      sharesTime: 30,
      enableCoins: true,
      coinsTime: 1, // por moneda/diamante
      enableSubs: true,
      subsTime: 120,
      enableComments: false,
      commentsTime: 0.5
    };

    let socket = null;
    let userId = null;
    let reconnectAttempts = 0;
    let countdownInterval = null;
    let fitRaf = null;

    // Elementos DOM
    const widgetContainer = document.getElementById('widget-container');
    const timerWrapper = document.getElementById('timer-wrapper');
    const timerDisplay = document.getElementById('timer-display');
    const legendContainer = document.getElementById('legend-container');

    const STYLE_PRESETS = {
      classic: {
        padding: '20px 40px',
        radius: '20px',
        background: 'linear-gradient(145deg, rgba(20, 20, 40, 0.9), rgba(40, 40, 80, 0.8))',
        border: '2px solid rgba(100, 180, 255, 0.3)',
        shadow: '0 0 30px rgba(100, 180, 255, 0.2), inset 0 0 30px rgba(100, 180, 255, 0.05)',
        letterSpacing: '4px',
        legendBackground: 'linear-gradient(145deg, rgba(30, 30, 50, 0.95), rgba(50, 50, 80, 0.9))',
        legendBorder: '1px solid rgba(255, 255, 255, 0.1)',
        legendShadow: '0 5px 20px rgba(0, 0, 0, 0.3)',
        itemBackground: 'rgba(255, 255, 255, 0.05)'
      },
      minimal: {
        padding: '6px 10px',
        radius: '6px',
        background: 'transparent',
        border: '0 solid transparent',
        shadow: 'none',
        letterSpacing: '2px',
        textShadow: '0 2px 10px rgba(0, 0, 0, 0.45)',
        legendBackground: 'transparent',
        legendBorder: '0 solid transparent',
        legendShadow: 'none',
        itemBackground: 'rgba(0, 0, 0, 0.28)'
      },
      digits: {
        padding: '0',
        radius: '0',
        background: 'transparent',
        border: '0 solid transparent',
        shadow: 'none',
        letterSpacing: '4px',
        textShadow: '0 0 10px rgba(100, 180, 255, 0.8), 0 0 24px rgba(100, 180, 255, 0.38)',
        legendBackground: 'transparent',
        legendBorder: '0 solid transparent',
        legendShadow: 'none',
        itemBackground: 'transparent'
      },
      neon: {
        padding: '18px 38px',
        radius: '18px',
        background: 'linear-gradient(135deg, rgba(8, 12, 28, 0.92), rgba(58, 18, 88, 0.82))',
        border: '2px solid rgba(34, 211, 238, 0.55)',
        shadow: '0 0 24px rgba(34, 211, 238, 0.35), 0 0 46px rgba(236, 72, 153, 0.22), inset 0 0 28px rgba(34, 211, 238, 0.08)',
        letterSpacing: '5px',
        textShadow: '0 0 12px rgba(34, 211, 238, 0.95), 0 0 28px rgba(236, 72, 153, 0.65)',
        legendBackground: 'linear-gradient(135deg, rgba(8, 12, 28, 0.92), rgba(40, 16, 64, 0.88))',
        legendBorder: '1px solid rgba(34, 211, 238, 0.28)',
        legendShadow: '0 10px 32px rgba(34, 211, 238, 0.18)',
        itemBackground: 'rgba(255, 255, 255, 0.08)'
      },
      terminal: {
        padding: '16px 32px',
        radius: '8px',
        background: 'rgba(0, 9, 6, 0.86)',
        border: '2px solid rgba(49, 242, 143, 0.48)',
        shadow: '0 0 24px rgba(49, 242, 143, 0.16), inset 0 0 18px rgba(49, 242, 143, 0.08)',
        letterSpacing: '3px',
        textShadow: '0 0 10px rgba(49, 242, 143, 0.8), 0 0 22px rgba(49, 242, 143, 0.32)',
        legendBackground: 'rgba(0, 9, 6, 0.78)',
        legendBorder: '1px solid rgba(49, 242, 143, 0.24)',
        legendShadow: '0 8px 26px rgba(0, 0, 0, 0.35)',
        itemBackground: 'rgba(49, 242, 143, 0.08)'
      },
      arcade: {
        padding: '18px 42px',
        radius: '14px',
        background: 'linear-gradient(180deg, rgba(18, 24, 54, 0.95), rgba(6, 8, 20, 0.92))',
        border: '3px solid rgba(250, 204, 21, 0.68)',
        shadow: '0 8px 0 rgba(0, 0, 0, 0.45), 0 0 28px rgba(250, 204, 21, 0.24)',
        letterSpacing: '4px',
        textShadow: '3px 3px 0 rgba(0, 0, 0, 0.62), 0 0 18px rgba(250, 204, 21, 0.45)',
        legendBackground: 'linear-gradient(180deg, rgba(18, 24, 54, 0.94), rgba(10, 12, 30, 0.92))',
        legendBorder: '2px solid rgba(250, 204, 21, 0.36)',
        legendShadow: '0 8px 0 rgba(0, 0, 0, 0.35)',
        itemBackground: 'rgba(250, 204, 21, 0.1)'
      }
    };

    // Iconos SVG inline: no dependen de emoji ni de assets remotos.
    function svgIcon(path, extra = '') {
      return `<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" ${extra}>${path}</svg>`;
    }

    const ICONS = {
      like: svgIcon('<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>'),
      share: svgIcon('<path fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M17 2l4 4-4 4"/><path fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M3 11V9a3 3 0 0 1 3-3h15"/><path fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M7 22l-4-4 4-4"/><path fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 13v2a3 3 0 0 1-3 3H3"/>'),
      coin: svgIcon('<circle cx="12" cy="12" r="9" fill="none" stroke-width="2"/><path fill="none" stroke-width="2" stroke-linecap="round" d="M12 7v10M8.5 10c0-1.7 1.5-3 3.5-3s3.5 1.3 3.5 3-1.5 2-3.5 2-3.5.3-3.5 2 1.5 3 3.5 3 3.5-1.3 3.5-3"/>'),
      sub: svgIcon('<path d="M12 2.4l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 17.2l-5.8 3.1 1.1-6.5-4.7-4.6 6.5-.9L12 2.4z"/>'),
      comment: svgIcon('<path fill="none" stroke-width="2" stroke-linejoin="round" d="M4 5.5A3.5 3.5 0 0 1 7.5 2h9A3.5 3.5 0 0 1 20 5.5v6A3.5 3.5 0 0 1 16.5 15H10l-5 5v-5.2A3.5 3.5 0 0 1 4 12.5v-7z"/>'),
      timer: svgIcon('<circle cx="12" cy="13" r="8" fill="none" stroke-width="2"/><path fill="none" stroke-width="2" stroke-linecap="round" d="M12 13V8m0 5 3 2M9 2h6"/>')
    };

    // ========================================
    // UTILIDADES
    // ========================================
    function getUidFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('uid');
    }

    function wholeConfigSeconds(value, fallback = 0) {
      const n = Number(value);
      if (!Number.isFinite(n)) return fallback;
      const rounded = Math.round(n);
      if (rounded === 0 && n !== 0) return n > 0 ? 1 : -1;
      return rounded;
    }

    function makeGlowShadow(color) {
      return `
        0 0 10px ${color}cc,
        0 0 20px ${color}80,
        0 0 40px ${color}4d
      `;
    }

    function makeIconOutlineFilter(color, width) {
      const size = Math.max(0, Math.round(Number(width) || 0));
      if (!size) return '';
      return [
        [-size, 0], [size, 0], [0, -size], [0, size],
        [-size, -size], [size, -size], [-size, size], [size, size]
      ].map(([x, y]) => `drop-shadow(${x}px ${y}px 0 ${color})`).join(' ');
    }

    function makeLegendIconFilter() {
      const strokeWidth = config.strokeWidth ?? 3;
      const strokeColor = config.strokeColor || '#000000';
      const glowColor = config.glowColor || '#64b4ff';
      const filters = [
        makeIconOutlineFilter(strokeColor, strokeWidth),
        'drop-shadow(0 2px 4px rgba(0,0,0,0.35))'
      ];
      if (config.showGlow !== false) {
        filters.push(`drop-shadow(0 0 7px ${glowColor}cc)`);
      }
      return filters.filter(Boolean).join(' ');
    }

    function formatTime(totalSeconds) {
      totalSeconds = Math.max(0, Math.round(Number(totalSeconds) || 0));
      if (totalSeconds <= 0) return '00:00';

      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const mins = Math.floor((totalSeconds % 3600) / 60);
      const secs = Math.floor(totalSeconds % 60);
      const pad = (n) => String(n).padStart(2, '0');

      if (config.showDays && days > 0) {
        return config.showLabels 
          ? `${days}d ${pad(hours)}h:${pad(mins)}m:${pad(secs)}s`
          : `${days}d ${pad(hours)}:${pad(mins)}:${pad(secs)}`;
      }

      const totalHours = days * 24 + hours;
      if (totalHours > 0) {
        return config.showLabels
          ? `${pad(totalHours)}h:${pad(mins)}m:${pad(secs)}s`
          : `${pad(totalHours)}:${pad(mins)}:${pad(secs)}`;
      }

      return config.showLabels
        ? `${pad(mins)}m:${pad(secs)}s`
        : `${pad(mins)}:${pad(secs)}`;
    }

    function formatBonus(seconds) {
      seconds = wholeConfigSeconds(seconds);
      const sign = seconds >= 0 ? '+' : '-';
      const absSeconds = Math.abs(seconds);

      if (absSeconds >= 60) {
        const mins = Math.floor(absSeconds / 60);
        const secs = absSeconds % 60;
        return secs > 0 ? `${sign}${mins}m ${secs}s` : `${sign}${mins}min`;
      }
      return `${sign}${absSeconds}s`;
    }

    // ========================================
    // DISPLAY
    // ========================================
    function updateDisplay() {
      timerDisplay.textContent = formatTime(state.remainingSeconds);

      // Estados visuales
      widgetContainer.classList.remove('timer-paused', 'timer-urgent', 'timer-finished', 'timer-running');

      if (state.remainingSeconds <= 0) {
        widgetContainer.classList.add('timer-finished');
      } else if (!state.isRunning) {
        widgetContainer.classList.add('timer-paused');
      } else {
        widgetContainer.classList.add('timer-running');
        if (state.remainingSeconds <= 60) {
          widgetContainer.classList.add('timer-urgent');
        }
      }

      fitTimerText();
    }

    function fitTimerText() {
      if (fitRaf) cancelAnimationFrame(fitRaf);
      fitRaf = requestAnimationFrame(() => {
        const configuredSize = Math.max(12, Number(config.fontSize) || 80);
        timerDisplay.style.fontSize = configuredSize + 'px';

        const viewportWidth = Math.max(80, window.innerWidth - 24);
        const wrapperWidth = Math.max(timerWrapper.scrollWidth || 0, timerDisplay.scrollWidth || 0);
        if (wrapperWidth > viewportWidth) {
          const scale = Math.max(0.34, viewportWidth / wrapperWidth);
          timerDisplay.style.fontSize = Math.floor(configuredSize * scale) + 'px';
        }
      });
    }

    // ========================================
    // ESTILOS
    // ========================================
    function applyStyles() {
      const styleName = STYLE_PRESETS[config.visualStyle] ? config.visualStyle : 'classic';
      const preset = STYLE_PRESETS[styleName];
      widgetContainer.dataset.style = styleName;

      // Custom font via __tcLoadFont (signed URL + dedup + token retry)
      if (config.fontUrl) {
        const fontName = config.fontFamily || 'CustomFont';
        if (typeof window.__tcLoadFont === 'function') {
          window.__tcLoadFont(fontName, config.fontUrl);
        } else {
          // Fallback: firmar la URL si tenemos el helper para evitar 403 en R2
          const signedUrl = (typeof window.__tcSignedUrl === 'function') ? window.__tcSignedUrl(config.fontUrl) : config.fontUrl;
          const style = document.createElement('style');
          style.textContent = `@font-face { font-family: '${fontName}'; src: url('${signedUrl}'); font-display: swap; }`;
          document.head.appendChild(style);
        }
        timerDisplay.style.fontFamily = `'${fontName}', 'Orbitron', system-ui, sans-serif`;
      } else if (config.fontFamily) {
        timerDisplay.style.fontFamily = `'${config.fontFamily}', 'Orbitron', system-ui, sans-serif`;
      }

      // Size
      if (config.fontSize) {
        timerDisplay.style.fontSize = config.fontSize + 'px';
      }

      // Color
      const textColor = config.textColor || config.color || '#ffffff';
      timerDisplay.style.color = textColor;
      timerDisplay.style.letterSpacing = preset.letterSpacing;

      timerWrapper.style.padding = preset.padding;
      timerWrapper.style.borderRadius = preset.radius;
      timerWrapper.style.background = preset.background;
      timerWrapper.style.border = preset.border;
      timerWrapper.style.boxShadow = preset.shadow;
      if (config.hideTimerBackground || styleName === 'digits') {
        timerWrapper.style.background = 'transparent';
        timerWrapper.style.border = '0 solid transparent';
        timerWrapper.style.boxShadow = 'none';
      }

      // Glow
      const glowColor = config.glowColor || '#64b4ff';
      if (config.showGlow !== false) {
        timerDisplay.style.textShadow = makeGlowShadow(glowColor);
        if (styleName === 'classic') {
          timerWrapper.style.borderColor = `${glowColor}4d`;
          timerWrapper.style.boxShadow = `
            0 0 30px ${glowColor}33,
            inset 0 0 30px ${glowColor}0d
          `;
        }
      } else {
        // Sin glow, usar contorno
        const strokeWidth = config.strokeWidth ?? 3;
        const strokeColor = config.strokeColor || '#000000';
        const shadows = [];
        for (let x = -strokeWidth; x <= strokeWidth; x++) {
          for (let y = -strokeWidth; y <= strokeWidth; y++) {
            if (Math.sqrt(x * x + y * y) <= strokeWidth && (x !== 0 || y !== 0)) {
              shadows.push(`${x}px ${y}px 0 ${strokeColor}`);
            }
          }
        }
        timerDisplay.style.textShadow = shadows.join(',');
      }

      legendContainer.style.background = config.legendTransparent ? 'transparent' : preset.legendBackground;
      legendContainer.style.border = config.legendTransparent ? '0 solid transparent' : preset.legendBorder;
      legendContainer.style.boxShadow = config.legendTransparent ? 'none' : preset.legendShadow;
      applyLegendLayout();
      applyLegendItemStyles();

      renderLegend();
      fitTimerText();
    }

    function applyLegendLayout() {
      const layout = config.legendLayout || 'wrap';
      const align = config.legendAlignment || 'center';
      legendContainer.style.flexDirection = layout === 'vertical' ? 'column' : 'row';
      legendContainer.style.flexWrap = layout === 'wrap' ? 'wrap' : 'nowrap';
      legendContainer.style.maxWidth = layout === 'horizontal' ? 'none' : '400px';
      legendContainer.style.alignItems = align === 'left' ? 'flex-start' : align === 'right' ? 'flex-end' : 'center';
      legendContainer.style.justifyContent = align === 'left' ? 'flex-start' : align === 'right' ? 'flex-end' : 'center';
    }

    function applyLegendItemStyles() {
      const fontSize = Number(config.legendFontSize) || 16;
      const iconSize = Math.max(14, Math.round(fontSize * 1.2));
      legendContainer.style.fontSize = fontSize + 'px';
      legendContainer.querySelectorAll('.legend-item').forEach(el => {
        if (config.legendTransparent) {
          el.style.background = 'transparent';
          el.style.borderColor = 'transparent';
          el.style.boxShadow = 'none';
          el.style.padding = '4px 6px';
        } else {
          el.style.background = '';
          el.style.borderColor = '';
          el.style.boxShadow = '';
          el.style.padding = '';
        }
      });
      legendContainer.querySelectorAll('.legend-value').forEach(el => {
        el.style.fontSize = fontSize + 'px';
        el.style.fontFamily = timerDisplay.style.fontFamily || '';
        el.style.color = '#4ade80';
        if (config.showGlow !== false) {
          el.style.textShadow = makeGlowShadow(config.glowColor || '#64b4ff');
        } else {
          const strokeWidth = config.strokeWidth ?? 3;
          const strokeColor = config.strokeColor || '#000000';
          const shadows = [];
          for (let x = -strokeWidth; x <= strokeWidth; x++) {
            for (let y = -strokeWidth; y <= strokeWidth; y++) {
              if (Math.sqrt(x * x + y * y) <= strokeWidth && (x !== 0 || y !== 0)) {
                shadows.push(`${x}px ${y}px 0 ${strokeColor}`);
              }
            }
          }
          el.style.textShadow = shadows.join(',');
        }
      });
      legendContainer.querySelectorAll('.legend-icon').forEach(el => {
        el.style.width = iconSize + 'px';
        el.style.height = iconSize + 'px';
        el.style.filter = makeLegendIconFilter();
      });
    }

    // ========================================
    // LEYENDA
    // ========================================
    function renderLegend() {
      // Hide if disabled
      if (!config.showLegend) {
        legendContainer.classList.add('hidden');
        return;
      }

      const items = [];

      if (widgetContainer.dataset.style === 'digits') {
        legendContainer.classList.add('hidden');
        return;
      }

      if (config.legendLikes !== false && config.enableLikes && wholeConfigSeconds(config.likesTime) !== 0) {
        items.push({ type: 'like', icon: ICONS.like, seconds: wholeConfigSeconds(config.likesTime) });
      }
      if (config.legendShares !== false && config.enableShares && wholeConfigSeconds(config.sharesTime) !== 0) {
        items.push({ type: 'share', icon: ICONS.share, seconds: wholeConfigSeconds(config.sharesTime) });
      }
      if (config.legendCoins !== false && config.enableCoins && wholeConfigSeconds(config.coinsTime) !== 0) {
        items.push({ type: 'coin', icon: ICONS.coin, seconds: wholeConfigSeconds(config.coinsTime), perUnit: true });
      }
      if (config.legendSubs !== false && config.enableSubs && wholeConfigSeconds(config.subsTime) !== 0) {
        items.push({ type: 'sub', icon: ICONS.sub, seconds: wholeConfigSeconds(config.subsTime) });
      }
      if (config.legendComments !== false && config.enableComments && wholeConfigSeconds(config.commentsTime) !== 0) {
        items.push({ type: 'comment', icon: ICONS.comment, seconds: wholeConfigSeconds(config.commentsTime) });
      }

      if (items.length === 0) {
        legendContainer.classList.add('hidden');
        return;
      }

      legendContainer.classList.remove('hidden');
      legendContainer.innerHTML = items.map(item => {
        const timeStr = formatBonus(item.seconds);
        const perUnit = '';
        return `
          <div class="legend-item" data-type="${item.type}">
            <span class="legend-icon">${item.icon}</span>
            <span class="legend-value">${timeStr}${perUnit}</span>
          </div>
        `;
      }).join('');
      applyLegendLayout();
      applyLegendItemStyles();
    }

    // Resaltar item de leyenda cuando se recibe un evento
    function highlightLegendItem(type) {
      const item = legendContainer.querySelector(`[data-type="${type}"]`);
      if (item) {
        item.classList.add('highlight');
        setTimeout(() => item.classList.remove('highlight'), 500);
      }
    }

    // ========================================
    // BONUS POPUP AND PARTICLES
    // ========================================
    function showBonusPopup(amount, icon = ICONS.timer, eventType = 'timer') {
      amount = wholeConfigSeconds(amount);
      if (amount === 0) return;

      // Popup principal
      const popup = document.createElement('div');
      popup.className = 'bonus-popup' + (amount < 0 ? ' negative' : '');
      popup.dataset.eventType = eventType;
      popup.innerHTML = `<span class="bonus-icon">${icon}</span>${formatBonus(amount)}`;
      document.body.appendChild(popup);
      setTimeout(() => popup.remove(), 1800);

      // Particles
      createParticles(icon, eventType);
    }

    function createParticles(icon, eventType = 'timer') {
      const count = 8;
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const particle = document.createElement('div');
          particle.className = 'particle';
          particle.dataset.eventType = eventType;
          particle.innerHTML = icon;
          particle.style.left = `${30 + Math.random() * 40}%`;
          particle.style.top = `${40 + Math.random() * 20}%`;
          particle.style.animationDuration = `${1.5 + Math.random() * 1}s`;
          document.body.appendChild(particle);
          setTimeout(() => particle.remove(), 2500);
        }, i * 50);
      }
    }

    // ========================================
    // COUNTDOWN LOCAL
    // ========================================
    function startLocalCountdown() {
      if (countdownInterval) return;

      // Log de countdown eliminado
      countdownInterval = setInterval(() => {
        if (!state.isRunning || state.remainingSeconds <= 0) {
          stopLocalCountdown();
          return;
        }

        state.remainingSeconds = Math.max(0, state.remainingSeconds - 1);
        updateDisplay();

        if (state.remainingSeconds <= 0) {
          state.isRunning = false;
          stopLocalCountdown();
        }
      }, 1000);
    }

    function stopLocalCountdown() {
      if (countdownInterval) {
        clearInterval(countdownInterval);
        countdownInterval = null;
        // Log de countdown detenido eliminado
      }
    }

    // ========================================
    // ESTADO
    // ========================================
    function extractState(data) {
      if (data.state && typeof data.state === 'object') {
        return data.state;
      }
      if (data.data?.state && typeof data.data.state === 'object') {
        return data.data.state;
      }
      if (typeof data.remainingSeconds === 'number') {
        return {
          remainingSeconds: data.remainingSeconds,
          isRunning: data.isRunning ?? state.isRunning,
          totalSeconds: data.totalSeconds ?? state.totalSeconds
        };
      }
      return null;
    }

    function updateState(newState, eventType = null, bonusAmount = 0) {
      if (!newState) return;

      const wasRunning = state.isRunning;

      state = { ...state, ...newState };
      updateDisplay();

      // Solo mostrar bonus popup si viene de un evento real (timer:timeBonus)
      if (bonusAmount !== 0 || eventType) {
        const icon = eventType ? ICONS[eventType] || ICONS.timer : ICONS.timer;
        showBonusPopup(bonusAmount || 0, icon, eventType || 'timer');
        if (eventType) highlightLegendItem(eventType);
      }

      // Control de countdown local
      if (state.isRunning && !wasRunning) {
        startLocalCountdown();
      } else if (!state.isRunning && wasRunning) {
        stopLocalCountdown();
      } else if (state.isRunning && !countdownInterval) {
        startLocalCountdown();
      }
    }

    // ========================================
    // WEBSOCKET
    // ========================================
    function connect() {
      userId = getUidFromUrl();
      if (!userId) {
        console.error('[Timer] No uid en URL');
        return;
      }

      // Conectar al Cloudflare Worker (wss://ws.tikcontrol.live)
      var wsBase = getWsUrl();
      if (!wsBase) {
        console.warn('[Timer] WS URL no disponible, reintentando');
        scheduleReconnect();
        return;
      }
      var wsUrl = wsBase + '?role=widget&uid=' + userId + '&widget=timer';
      try {
        setupWs(new WebSocket(wsUrl));
      } catch (e) {
        console.error('[Timer] Error:', e);
        scheduleReconnect();
      }
    }

    function setupWs(ws) {
      socket = ws;

      socket.onopen = () => {
        reconnectAttempts = 0;
        socket.send(JSON.stringify({
          type: 'getWidgetConfig',
          data: { widget: 'timer' },
          uid: userId
        }));
      };

      socket.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          handleMessage(data);
        } catch (e) {
          console.error('[Timer] Error:', e);
        }
      };

      socket.onclose = () => {
        scheduleReconnect();
      };

      socket.onerror = (err) => console.error('[Timer] Error:', err);
    }

    function scheduleReconnect() {
      reconnectAttempts++;
      const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 30000);
      setTimeout(connect, delay);
    }

    // ========================================
    // MENSAJES
    // ========================================
    function handleMessage(data) {
      const msgType = data.type || 'unknown';

      if (msgType === 'storage:sessionToken' && data.tokens) {
        window.__tcStorageTokens = data.tokens;
        window.__tcStorageToken = data.tokens.user || '';
        try { window.dispatchEvent(new Event('tc:storage-token-ready')); } catch (_) {}
        if (config.fontUrl) applyStyles();
        return;
      }

      // Initial config
      if (msgType === 'widgetConfig' && data.widget === 'timer') {
        if (data.config) {
          config = { ...config, ...data.config };
          applyStyles();
        }
        if (data.state) {
          updateState(data.state);
        }
        return;
      }

      // Config actualizada
      if ((msgType === 'widget:configUpdated' || msgType === 'widget:config' || msgType === 'timer:configUpdated') && (!data.widget || data.widget === 'timer')) {
        if (data.config) {
          config = { ...config, ...data.config };
          applyStyles();
        }
        const newState = extractState(data);
        if (newState) updateState(newState);
        return;
      }

      // Timer state
      if (msgType === 'timer:state') {
        const newState = extractState(data);
        if (newState) updateState(newState);
        return;
      }

      // Timer control
      if (msgType === 'timer:control') {
        const newState = extractState(data);
        if (newState) updateState(newState);
        return;
      }

      // Time bonus (con tipo de evento)
      if (msgType === 'timer:timeBonus') {
        const amount = data.amount || data.data?.amount || 0;
        const eventType = data.eventType || data.data?.eventType || null;
        const newState = extractState(data);
        if (newState) {
          updateState(newState, eventType, amount);
        } else if (amount !== 0) {
          const icon = eventType ? ICONS[eventType] || ICONS.timer : ICONS.timer;
          showBonusPopup(amount, icon, eventType || 'timer');
          if (eventType) highlightLegendItem(eventType);
        }
        return;
      }

      // Widget reset
      if (msgType === 'widget:reset' && data.widget === 'timer') {
        state = { remainingSeconds: 0, isRunning: false, totalSeconds: 0 };
        stopLocalCountdown();
        updateDisplay();
        return;
      }

      // Cualquier mensaje con estado
      const newState = extractState(data);
      if (newState && newState.remainingSeconds !== undefined) {
        updateState(newState);
      }
    }

    // ========================================
    // MODO PREVIEW
    // ========================================
    const urlParams = new URLSearchParams(window.location.search);
    const isPreview = urlParams.get('preview') === '1' || urlParams.get('preview') === 'true';
    
    if (isPreview) {
      // In preview mode, show static demo time
      state = {
        remainingSeconds: 3 * 60 + 45, // 3:45 de ejemplo
        totalSeconds: 10 * 60, // 10 minutos total
        isRunning: true
      };
    }

    // ========================================
    // INIT
    // ========================================
    document.addEventListener('DOMContentLoaded', () => {
      // Version log removed
      applyStyles();
      updateDisplay();
      window.addEventListener('resize', fitTimerText);
      
      // En modo preview, no conectar (evita eventos que modifiquen el estado)
      if (!isPreview) {
        connect();
      }
    });
  </script>
</body>
