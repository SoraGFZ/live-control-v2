<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Chat - TikControl</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;font-family:system-ui,sans-serif}
#chat{position:fixed;display:flex;flex-direction:column;gap:8px;max-width:600px;pointer-events:none;bottom:10px;left:10px}
.m{animation:fadeIn .3s ease-out;will-change:opacity,transform}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes rainbow{0%{background-position:0% 50%}100%{background-position:200% 50%}}

/* Animaciones de entrada (se aplican con .style.animation) */
@keyframes enterFade{from{opacity:0}to{opacity:1}}
@keyframes enterSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes enterSlideLeft{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
@keyframes enterSlideRight{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes enterPop{0%{opacity:0;transform:scale(.6)}60%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
@keyframes enterBounce{0%{opacity:0;transform:translateY(-24px)}40%{transform:translateY(6px)}70%{transform:translateY(-3px)}100%{opacity:1;transform:translateY(0)}}
@keyframes enterZoomIn{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
@keyframes enterFlip{from{opacity:0;transform:rotateY(-90deg)}to{opacity:1;transform:rotateY(0)}}
@keyframes enterRotateIn{from{opacity:0;transform:rotate(-20deg) scale(.7)}to{opacity:1;transform:rotate(0) scale(1)}}

/* Loops (opcional, se aplican como segunda animaciÃ³n) */
@keyframes loopHeartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.15)}28%{transform:scale(1)}42%{transform:scale(1.1)}70%{transform:scale(1)}}
@keyframes loopBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes loopWobble{0%,100%{transform:rotate(0)}25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)}}
@keyframes loopFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes loopVibrate{0%,100%{transform:translate(0,0)}20%{transform:translate(-1px,1px)}40%{transform:translate(1px,-1px)}60%{transform:translate(-1px,-1px)}80%{transform:translate(1px,1px)}}
@keyframes loopShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
@keyframes loopTilt{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes loopZoom{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes loopPulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes loopBlink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes loopFlip{0%,100%{transform:rotateY(0)}50%{transform:rotateY(180deg)}}
@keyframes loopSpinSlow{from{transform:rotate(0)}to{transform:rotate(360deg)}}

#error{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a2e;padding:30px;border-radius:16px;color:#fff;text-align:center;display:none}
#error h2{color:#f87171;margin-bottom:10px}
#error p{color:#94a3b8}
</style>
</head>
<body>
<div id="error">
  <h2>URL no valida</h2>
  <p>Copia la URL desde TikControl / Widgets / Copiar URL</p>
</div>
<div id="chat"></div>

<script src="/widgets/core/env.js?v=20260507-ws-storage"></script>
<script src="core/font-loader.js?v=20260526-storage-token-fix"></script>
<script>
(function(){
  'use strict';

  var chat = document.getElementById('chat');
  var error = document.getElementById('error');
  var fonts = {};

  // Config reactiva. Se rellena cuando llega `widgetConfig` o
  // `widget:configUpdated` desde el Cloudflare Worker. Los defaults
  // deben coincidir con CHAT_DEFAULTS del worker (chat-renderer.js).
  var cfg = {
    position: 'top-left', stackAlign: 'left', offsetX: 10, offsetY: 10,
    maxWidthPx: 600, gap: 8, padding: 0, maxMessages: 12,
    animNick: 'none', animText: 'none', animAvatar: 'none',
    loopNick: 'none', loopText: 'none', loopAvatar: 'none'
  };
  function enforceFixedLayout() {
    cfg.position = 'top-left';
    cfg.stackAlign = 'left';
  }

  // Normalizadores â€” aceptan labels ES, EN, y lowercased (como los guarda
  // ConfigHelper.select), devuelven claves canonicas estables.
  function normEnterAnim(s) {
    var v = String(s || '').toLowerCase().trim();
    if (!v || v === 'none' || v === 'sin animaciÃ³n' || v === 'sin animacion' || v === 'no animation') return 'none';
    if (v === 'fade' || v.indexOf('desvanec') >= 0) return 'fade';
    if (v === 'slide up' || v === 'slide-up' || v.indexOf('arriba') >= 0) return 'slide-up';
    if (v === 'slide left' || v === 'slide-left' || v.indexOf('izquierda') >= 0) return 'slide-left';
    if (v === 'slide right' || v === 'slide-right' || v.indexOf('derecha') >= 0) return 'slide-right';
    if (v === 'pop') return 'pop';
    if (v === 'bounce' || v.indexOf('rebot') >= 0) return 'bounce';
    if (v === 'zoom in' || v === 'zoom-in' || v === 'acercar') return 'zoom-in';
    if (v === 'flip' || v === 'voltear') return 'flip';
    if (v === 'rotate in' || v === 'rotate-in' || v.indexOf('rotar') >= 0 || v.indexOf('girar') >= 0) return 'rotate-in';
    return 'none';
  }
  function normLoopAnim(s) {
    var v = String(s || '').toLowerCase().trim();
    if (!v || v === 'none' || v === 'sin animaciÃ³n' || v === 'sin animacion' || v === 'no animation') return 'none';
    if (v.indexOf('heartbeat') >= 0 || v.indexOf('corazon') >= 0 || v.indexOf('corazÃ³n') >= 0) return 'heartbeat';
    if (v === 'breathe' || v === 'breath' || v.indexOf('respir') >= 0) return 'breathe';
    if (v === 'wobble' || v === 'wiggle' || v.indexOf('bambol') >= 0 || v.indexOf('tambale') >= 0) return 'wobble';
    if (v === 'float' || v.indexOf('flotar') >= 0 || v.indexOf('flotac') >= 0) return 'float';
    if (v === 'vibrate' || v === 'vibrar') return 'vibrate';
    if (v === 'shake' || v.indexOf('sacud') >= 0 || v.indexOf('agitar') >= 0) return 'shake';
    if (v === 'tilt' || v.indexOf('inclinar') >= 0 || v.indexOf('inclinac') >= 0) return 'tilt';
    if (v === 'zoom') return 'zoom';
    if (v === 'pulse' || v === 'pulso' || v.indexOf('latido') >= 0) return 'pulse';
    if (v === 'blink' || v.indexOf('parpad') >= 0) return 'blink';
    if (v === 'flip' || v === 'voltear') return 'flip';
    if (v === 'spin slow' || v === 'spinslow' || v === 'slow spin' || v === 'giro lento') return 'spin-slow';
    return 'none';
  }

  var ENTER_MAP = {
    'fade': 'enterFade .35s ease-out both',
    'slide-up': 'enterSlideUp .35s ease-out both',
    'slide-left': 'enterSlideLeft .35s ease-out both',
    'slide-right': 'enterSlideRight .35s ease-out both',
    'pop': 'enterPop .28s cubic-bezier(.34,1.56,.64,1) both',
    'bounce': 'enterBounce .5s ease-out both',
    'zoom-in': 'enterZoomIn .3s ease-out both',
    'flip': 'enterFlip .4s ease-out both',
    'rotate-in': 'enterRotateIn .35s ease-out both'
  };
  var LOOP_MAP = {
    'heartbeat': 'loopHeartbeat 1.2s ease-in-out infinite',
    'breathe': 'loopBreathe 2.4s ease-in-out infinite',
    'wobble': 'loopWobble 1.4s ease-in-out infinite',
    'float': 'loopFloat 2.2s ease-in-out infinite',
    'vibrate': 'loopVibrate .6s linear infinite',
    'shake': 'loopShake .8s ease-in-out infinite',
    'tilt': 'loopTilt 1.2s ease-in-out infinite',
    'zoom': 'loopZoom 1.4s ease-in-out infinite',
    'pulse': 'loopPulse 1.2s ease-in-out infinite',
    'blink': 'loopBlink 1.2s ease-in-out infinite',
    'flip': 'loopFlip 2.4s linear infinite',
    'spin-slow': 'loopSpinSlow 8s linear infinite'
  };

  // Detectar entorno
  var isLocal = location.hostname === '127.0.0.1' || location.hostname === 'localhost';
  var params = new URLSearchParams(location.search);
  var userId = params.get('uid') || '';
  var token = params.get('t') || '';

  if (!isLocal && !userId && !token) {
    error.style.display = 'block';
    return;
  }

  // Aplicar estilos de container â€” posicion, tamano, gap, alineacion.
  // Se llama cada vez que llega una config nueva para que las updates
  // en caliente (widget:configUpdated) sean visibles sin refrescar.
  function applyContainerStyles() {
    enforceFixedLayout();
    var pos = 'top-left';
    var ox = Number(cfg.offsetX) || 0;
    var oy = Number(cfg.offsetY) || 0;

    chat.style.top = '';
    chat.style.right = '';
    chat.style.bottom = '';
    chat.style.left = '';
    chat.style.transform = '';

    if (pos === 'bottom-left') { chat.style.left = ox + 'px'; chat.style.bottom = oy + 'px'; }
    else if (pos === 'bottom-right') { chat.style.right = ox + 'px'; chat.style.bottom = oy + 'px'; }
    else if (pos === 'bottom-center') { chat.style.left = '50%'; chat.style.bottom = oy + 'px'; chat.style.transform = 'translateX(calc(-50% + ' + ox + 'px))'; }
    else if (pos === 'top-left') { chat.style.left = ox + 'px'; chat.style.top = oy + 'px'; }
    else if (pos === 'top-right') { chat.style.right = ox + 'px'; chat.style.top = oy + 'px'; }
    else if (pos === 'top-center') { chat.style.left = '50%'; chat.style.top = oy + 'px'; chat.style.transform = 'translateX(calc(-50% + ' + ox + 'px))'; }
    else if (pos === 'middle-left' || pos === 'center-left') { chat.style.left = ox + 'px'; chat.style.top = '50%'; chat.style.transform = 'translateY(calc(-50% + ' + oy + 'px))'; }
    else if (pos === 'middle-right' || pos === 'center-right') { chat.style.right = ox + 'px'; chat.style.top = '50%'; chat.style.transform = 'translateY(calc(-50% + ' + oy + 'px))'; }
    else if (pos === 'middle-center' || pos === 'center') { chat.style.left = '50%'; chat.style.top = '50%'; chat.style.transform = 'translate(-50%,-50%) translate(' + ox + 'px,' + oy + 'px)'; }
    else { chat.style.left = ox + 'px'; chat.style.bottom = oy + 'px'; }

    chat.style.width = (Number(cfg.maxWidthPx) || 600) + 'px';
    chat.style.maxWidth = '';
    chat.style.gap = (Number(cfg.gap) || 0) + 'px';
    chat.style.padding = (Number(cfg.padding) || 0) + 'px';

    var sa = 'left';
    chat.style.alignItems = sa === 'center' ? 'center' : (sa === 'right' ? 'flex-end' : 'flex-start');
    chat.style.justifyContent = pos.indexOf('bottom') === 0 ? 'flex-end' : 'flex-start';

    // Descartar mensajes viejos si maxMessages bajo
    var maxM = Number(cfg.maxMessages) || 12;
    while (chat.children.length > maxM) chat.removeChild(chat.firstChild);
  }
  applyContainerStyles();

  // Cargar fuente de Google Fonts
  function loadFont(url) {
    if (!url || fonts[url]) return;
    fonts[url] = true;
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = url;
    document.head.appendChild(link);
  }

  // Aplicar animaciones de entrada + loop al mensaje recien creado.
  // Cada componente del mensaje (.name, .text, img) recibe su propia
  // animacion segun animNick/animText/animAvatar y loopNick/loopText/loopAvatar.
  function animateMessageParts(msg) {
    try {
      var enterText = ENTER_MAP[normEnterAnim(cfg.animText)];
      var enterNick = ENTER_MAP[normEnterAnim(cfg.animNick)];
      var enterAvatar = ENTER_MAP[normEnterAnim(cfg.animAvatar)];
      var loopText = LOOP_MAP[normLoopAnim(cfg.loopText)];
      var loopNick = LOOP_MAP[normLoopAnim(cfg.loopNick)];
      var loopAvatar = LOOP_MAP[normLoopAnim(cfg.loopAvatar)];

      // Si no hay animaciones por-elemento, aplicar la de entrada al mensaje entero.
      if (!enterText && !enterNick && !enterAvatar && !loopText && !loopNick && !loopAvatar) return;

      // El HTML del worker usa <span style="font-weight:600..."> para el nick
      // (sin clase). Localizar heuristicamente: primer <span> con font-weight,
      // segundo <span> = texto, <img> = avatar.
      var spans = msg.querySelectorAll('span');
      var nickEl = null, textEl = null;
      for (var i = 0; i < spans.length; i++) {
        var s = spans[i];
        if (s.className && (/tag|chip/i).test(s.className)) continue;
        if (!nickEl && s.style && /font-weight/i.test(s.style.cssText)) { nickEl = s; continue; }
        if (nickEl && !textEl) { textEl = s; break; }
      }
      var img = msg.querySelector('img');

      function combine(el, enterAnim, loopAnim) {
        if (!el) return;
        var parts = [];
        if (enterAnim) parts.push(enterAnim);
        if (loopAnim) parts.push(loopAnim);
        if (parts.length) el.style.animation = parts.join(', ');
      }
      combine(nickEl, enterNick, loopNick);
      combine(textEl, enterText, loopText);
      combine(img, enterAvatar, loopAvatar);
    } catch (_) {}
  }

  // Anadir mensaje al chat
  function addMessage(html) {
    var wrapper = document.createElement('div');
    wrapper.innerHTML = html;

    // Si hay <style> (fuente personalizada), moverlo al <head>
    var styles = wrapper.querySelectorAll('style');
    for (var i = 0; i < styles.length; i++) {
      var styleContent = styles[i].textContent;
      if (!fonts['style:' + styleContent.substring(0, 50)]) {
        fonts['style:' + styleContent.substring(0, 50)] = true;
        document.head.appendChild(styles[i]);
      } else {
        styles[i].remove();
      }
    }

    var msg = wrapper.querySelector('div');
    if (msg) {
      msg.classList.add('m');
      chat.appendChild(msg);
      animateMessageParts(msg);
      var maxM = Number(cfg.maxMessages) || 12;
      while (chat.children.length > maxM) chat.removeChild(chat.firstChild);
    }
  }

  // ========== MODO LOCAL (Socket.IO) ==========
  if (isLocal) {
    var s = document.createElement('script');
    s.src = '/socket.io/socket.io.js';
    s.onload = function () {
      if (typeof io === 'undefined') return;
      var socket = io(location.origin, { reconnection: true });

      // Config inicial + updates en vivo
      function fetchConfig() {
        fetch('/api/widgets/chat/v2/config').then(function (r) { return r.ok ? r.json() : null; }).then(function (j) {
          if (j && j.config) {
            cfg = Object.assign({}, cfg, j.config);
            applyContainerStyles();
          }
        }).catch(function () {});
      }
      fetchConfig();
      socket.on('widget:configUpdated', function (msg) {
        if (msg && msg.widget === 'chat' && msg.config) {
          cfg = Object.assign({}, cfg, msg.config);
          applyContainerStyles();
        }
      });

      socket.on('tiktok:event', function (ev) {
        if (ev && ev.type === 'chat') {
          var d = ev.data || ev;
          var u = d.user || {};
          var nick = u.nickname || 'Anonimo';
          var avatar = u.profilePictureUrl || '';
          var text = d.comment || '';

          var html = '<div style="display:flex;gap:8px;padding:8px 10px;border-radius:10px;background:rgba(0,0,0,0.6);color:#fff;font-size:18px">';
          if (avatar) {
            html += '<img src="' + avatar + '" style="width:32px;height:32px;border-radius:50%;object-fit:cover" onerror="this.style.display=\'none\'"/>';
          }
          html += '<div><span style="font-weight:600;color:#ffcc00;margin-right:6px">' + nick + '</span>';
          html += '<span>' + text + '</span></div></div>';

          addMessage(html);
        }
      });
    };
    s.onerror = function () {};
    document.head.appendChild(s);
    setupTestListener();
    return;
  }

  // ========== MODO CLOUD (WebSocket / Cloudflare Worker) ==========
  function connect() {
    var identifier = userId ? 'uid=' + userId : 't=' + token;
    var wsBase = (window.__tcEnv && window.__tcEnv.ws) ? window.__tcEnv.ws() : '';
    if (!wsBase) {
      console.warn('[TikControl] WS URL no disponible, reintentando en 2s');
      setTimeout(connect, 2000);
      return;
    }
    var wsUrl = wsBase + '?role=widget&' + identifier + '&widget=chat';
    setupWs(new WebSocket(wsUrl));
  }
  function setupWs(ws) {
    ws.onopen = function () {
      // Pedir la config activa; el Worker responde con `widgetConfig`.
      try { ws.send(JSON.stringify({ type: 'getWidgetConfig', data: { widget: 'chat' }, uid: userId, token: token })); } catch (_) {}
    };
    ws.onmessage = function (e) {
      try {
        var data = JSON.parse(e.data);

        // Config inicial del worker
        if (data.type === 'widgetConfig' && data.widget === 'chat' && data.config) {
          cfg = Object.assign({}, cfg, data.config);
          applyContainerStyles();
          return;
        }
        // Update en vivo
        if (data.type === 'widget:configUpdated' && data.widget === 'chat' && data.config) {
          cfg = Object.assign({}, cfg, data.config);
          applyContainerStyles();
          return;
        }

        // Fuente (Google Fonts link)
        if (data.f) loadFont(data.f);
        // HTML pre-renderizado del worker
        if (data.h) addMessage(data.h);

        // eventBatch (otros eventos multiplexados en un frame)
        if (data.type === 'eventBatch' && Array.isArray(data.events)) {
          for (var i = 0; i < data.events.length; i++) {
            var evt = data.events[i];
            if (evt && evt.type === 'chat') {
              var d = evt.data || evt;
              var u = d.user || {};
              var nick = u.nickname || 'Anonimo';
              var avatar = u.profilePictureUrl || '';
              var text = d.comment || '';
              var h = '<div style="display:flex;gap:8px;padding:8px 10px;border-radius:10px;background:rgba(0,0,0,0.6);color:#fff;font-size:18px">';
              if (avatar) h += '<img src="' + avatar + '" style="width:32px;height:32px;border-radius:50%;object-fit:cover" onerror="this.style.display=\'none\'"/>';
              h += '<div><span style="font-weight:600;color:#ffcc00;margin-right:6px">' + nick + '</span>';
              h += '<span>' + text + '</span></div></div>';
              addMessage(h);
            }
          }
        }
      } catch (err) {
        console.error('[TikControl] Error:', err);
      }
    };
    ws.onclose = function () { setTimeout(connect, 3000); };
    ws.onerror = function () { ws.close(); };
  }

  // Listener para boton de Test desde la app
  function setupTestListener() {
    window.addEventListener('message', function (event) {
      if (event.data && event.data.type === 'CHAT_TEST') {
        var d = event.data.data || {};
        var nick = d.nickname || 'TikControl';
        var text = d.comment || 'Hola! Este es un mensaje de prueba';
        var avatar = d.avatar || '';
        // Reutilizamos el estilo del mensaje normal para que los efectos
        // y colores configurados (cuando el worker los renderice) salten.
        // En local solo el test: estilo basico, pero aplicamos animaciones.
        var html = '<div style="display:flex;gap:8px;padding:8px 10px;border-radius:10px;background:rgba(0,0,0,0.3);color:#fff;font-size:' + (cfg.fontSize || 20) + 'px">';
        if (avatar) {
          html += '<img src="' + avatar + '" style="width:' + (cfg.avatarSize || 32) + 'px;height:' + (cfg.avatarSize || 32) + 'px;border-radius:50%;object-fit:cover" onerror="this.style.display=\'none\'"/>';
        }
        html += '<div><span style="font-weight:600;color:' + (cfg.colorNickname || '#ffcc00') + ';margin-right:6px">' + nick + '</span>';
        html += '<span style="color:' + (cfg.textColor || '#fff') + '">' + text + '</span></div></div>';
        addMessage(html);
      }
    });
  }

  setupTestListener();
  connect();
})();
</script>
</body>
</html>
