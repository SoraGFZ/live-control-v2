<!doctype html>
<meta charset="utf-8">
<title>TikControl: Climb HUD</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:transparent; overflow:hidden; font-family:'Fredoka',sans-serif; }

  /* ─── LEVEL BAR (left side) ─── */
  #level-bar {
    position:fixed; left:24px; top:50%; transform:translateY(-50%);
    width:48px; height:420px; background:rgba(10,10,20,0.85);
    border-radius:24px; border:2px solid rgba(0,180,255,0.3);
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    padding:8px 0; overflow:hidden;
  }
  #level-fill {
    width:36px; border-radius:18px; background:linear-gradient(to top, #00b4d8, #00e5ff, #a0ff70);
    transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1);
    min-height:4px; position:absolute; bottom:8px; left:6px;
  }
  #level-number {
    position:absolute; top:12px; font-size:28px; font-weight:700;
    color:#fff; text-shadow:0 0 12px rgba(0,180,255,0.8); z-index:2;
  }
  #level-label {
    position:absolute; bottom:12px; font-size:10px; font-weight:500;
    color:rgba(255,255,255,0.5); letter-spacing:1px; z-index:2;
  }

  /* ─── WINS (top left) ─── */
  #wins-panel {
    position:fixed; left:24px; top:24px;
    background:rgba(10,10,20,0.85); border-radius:16px;
    padding:10px 18px; display:flex; align-items:center; gap:10px;
    border:2px solid rgba(255,215,0,0.3);
  }
  #wins-icon { font-size:24px; }
  #wins-text { font-size:20px; font-weight:700; color:#ffd700; }
  #wins-target { font-size:13px; color:rgba(255,255,255,0.4); }

  /* ─── COUNTDOWN (center) ─── */
  #countdown {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0);
    width:140px; height:140px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,215,0,0.15), rgba(10,10,20,0.9));
    border:4px solid #ffd700; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    opacity:0;
  }
  #countdown.active { transform:translate(-50%,-50%) scale(1); opacity:1; }
  #countdown-number { font-size:52px; font-weight:700; color:#ffd700; }
  #countdown-label { font-size:12px; font-weight:600; color:rgba(255,255,255,0.6); letter-spacing:2px; }
  @keyframes pulse-cd { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.08)} }
  #countdown.pulse { animation: pulse-cd 0.4s ease; }

  /* ─── GIFT FEED (right side) ─── */
  #gift-feed {
    position:fixed; right:24px; top:50%; transform:translateY(-50%);
    display:flex; flex-direction:column; gap:8px; align-items:flex-end;
    max-height:500px; overflow:hidden;
  }
  .gift-item {
    display:flex; align-items:center; gap:10px; padding:8px 14px;
    border-radius:12px; animation: gift-in 0.5s cubic-bezier(0.34,1.56,0.64,1);
    white-space:nowrap;
  }
  .gift-item.help { background:rgba(0,200,120,0.2); border:1px solid rgba(0,200,120,0.4); }
  .gift-item.hinder { background:rgba(255,50,50,0.2); border:1px solid rgba(255,50,50,0.4); }
  .gift-img { width:36px; height:36px; border-radius:8px; object-fit:cover; }
  .gift-viewer { font-size:13px; font-weight:600; color:#fff; }
  .gift-label { font-size:16px; font-weight:700; }
  .gift-item.help .gift-label { color:#00e676; }
  .gift-item.hinder .gift-label { color:#ff5252; }

  @keyframes gift-in {
    from { transform:translateX(60px); opacity:0; }
    to { transform:translateX(0); opacity:1; }
  }
  @keyframes gift-out {
    from { transform:translateX(0); opacity:1; max-height:60px; }
    to { transform:translateX(80px); opacity:0; max-height:0; margin:0; padding:0; }
  }
</style>

<div id="level-bar">
  <div id="level-fill"></div>
  <div id="level-number">0</div>
  <div id="level-label">NIVEL</div>
</div>

<div id="wins-panel">
  <span id="wins-icon">🏆</span>
  <span id="wins-text">0</span>
  <span id="wins-target">/ 20</span>
</div>

<div id="countdown">
  <div id="countdown-number">10</div>
  <div id="countdown-label">WIN!</div>
</div>

<div id="gift-feed"></div>

<script>
(function() {
  'use strict';

  const BASE = window.location.origin;
  const STATE_URL = BASE + '/api/roblox/state';
  const CONFIG_URL = BASE + '/api/roblox/config';

  let displayConfig = { gifts: {}, sounds: {} };
  let lastState = null;
  let lastGiftTimestamp = 0;
  let effectAudio = null;
  let musicAudio = null;

  // ─── Load display config ───
  async function loadConfig() {
    try {
      const res = await fetch(CONFIG_URL);
      const data = await res.json();
      if (data.ok && data.config) {
        displayConfig = data.config;
        // Start music if configured
        if (displayConfig.sounds?.music && !musicAudio) {
          musicAudio = new Audio(displayConfig.sounds.music);
          musicAudio.loop = true;
          musicAudio.volume = 0.3;
          musicAudio.play().catch(() => {});
        }
      }
    } catch (_) {}
  }

  // ─── Update UI from state ───
  function updateUI(state) {
    if (!state) return;

    const level = state.level || 0;
    const total = state.totalPlatforms || 100;
    const wins = state.wins || 0;
    const winTarget = state.winTarget || 20;
    const countdown = state.countdown;

    // Level bar
    const pct = Math.min(100, (level / total) * 100);
    document.getElementById('level-fill').style.height = pct + '%';
    document.getElementById('level-number').textContent = level;

    // Color based on zone
    const ratio = level / total;
    let color = '#00b4d8';
    if (ratio >= 0.9) color = '#ffd700';
    else if (ratio >= 0.7) color = '#ff5252';
    else if (ratio >= 0.45) color = '#a040ff';
    else if (ratio >= 0.2) color = '#00e676';
    document.getElementById('level-number').style.textShadow = '0 0 12px ' + color;

    // Wins
    document.getElementById('wins-text').textContent = wins;
    document.getElementById('wins-target').textContent = '/ ' + winTarget;

    // Countdown
    const cdEl = document.getElementById('countdown');
    const cdNum = document.getElementById('countdown-number');
    if (countdown && countdown.active) {
      cdEl.classList.add('active');
      cdNum.textContent = countdown.remaining;
      // Pulse animation
      cdEl.classList.remove('pulse');
      void cdEl.offsetWidth;
      cdEl.classList.add('pulse');
      // Color: gold → yellow → red
      const cdRatio = countdown.remaining / 10;
      if (cdRatio <= 0.3) {
        cdEl.style.borderColor = '#ff2020';
        cdNum.style.color = '#ff2020';
      } else if (cdRatio <= 0.6) {
        cdEl.style.borderColor = '#ffaa00';
        cdNum.style.color = '#ffaa00';
      } else {
        cdEl.style.borderColor = '#ffd700';
        cdNum.style.color = '#ffd700';
      }
    } else {
      cdEl.classList.remove('active');
    }

    // Gift feed (new gifts)
    if (state.lastGift && state.lastGift.timestamp > lastGiftTimestamp) {
      lastGiftTimestamp = state.lastGift.timestamp;
      showGift(state.lastGift);
    }
  }

  function showGift(gift) {
    const feed = document.getElementById('gift-feed');
    const giftId = gift.giftId || gift.gift;
    const viewer = gift.viewer || 'Viewer';
    const customGift = displayConfig.gifts?.[giftId] || {};

    // Display label: custom > default
    const label = customGift.display || gift.display || giftId;
    const imageUrl = customGift.imageUrl || '';
    const isHelp = gift.side === 'left' || (gift.platforms && gift.platforms > 0) || (gift.wins && gift.wins > 0);

    const item = document.createElement('div');
    item.className = 'gift-item ' + (isHelp ? 'help' : 'hinder');
    item.innerHTML = `
      ${imageUrl ? '<img class="gift-img" src="' + imageUrl + '" onerror="this.style.display=\'none\'">' : ''}
      <span class="gift-viewer">${viewer}</span>
      <span class="gift-label">${label}</span>
    `;
    feed.insertBefore(item, feed.firstChild);

    // Play sound
    if (displayConfig.sounds?.effect) {
      try {
        effectAudio = new Audio(displayConfig.sounds.effect);
        effectAudio.volume = 0.6;
        effectAudio.play().catch(() => {});
      } catch (_) {}
    }

    // Auto-remove after 5s
    setTimeout(() => {
      item.style.animation = 'gift-out 0.4s forwards';
      setTimeout(() => item.remove(), 400);
    }, 5000);

    // Max 6 visible
    while (feed.children.length > 6) {
      feed.lastChild.remove();
    }
  }

  // ─── Polling loop ───
  async function poll() {
    try {
      const res = await fetch(STATE_URL);
      const data = await res.json();
      if (data.ok && data.state) {
        updateUI(data.state);
        lastState = data.state;
      }
    } catch (_) {}
  }

  // Init
  loadConfig();
  setInterval(poll, 500);
  // Reload config every 30s
  setInterval(loadConfig, 30000);
})();
</script>
