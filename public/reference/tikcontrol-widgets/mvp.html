<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>MVP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:transparent;
  overflow:hidden;
  font-family:'Poppins','Segoe UI',Arial,sans-serif;
}
#root{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
/* Limita el card a 300x300 mÃ¡x aunque el iframe sea mÃ¡s grande:
   evita avatares gigantes/deformados cuando el creador estira la fuente. */
.mvp-card-wrap{
  width:min(100%, 300px);
  height:min(100%, 300px);
  display:flex;align-items:center;justify-content:center;
}
.mvp-card{
  position:relative;
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0.15em;
  opacity:0;
  transform:scale(0.4);
  transition:opacity .35s ease,transform .45s cubic-bezier(.18,1.25,.4,1);
  filter:drop-shadow(0 0 30px rgba(255,215,100,.45)) drop-shadow(0 6px 24px rgba(0,0,0,.5));
  font-size:8cqh;
  container-type:size;
}
.mvp-card.visible{opacity:1;transform:scale(1)}

/* Caja cuadrada que contiene marco + avatar. El marco es cuadrado y
   el avatar se ancla al hueco interior usando porcentajes RELATIVOS
   al marco. Max-height para no comerse el espacio del nombre/puntos. */
.mvp-frame-box{
  position:relative;
  width:min(100%, calc(75cqh * var(--frame-aspect, 1)));
  aspect-ratio:var(--frame-aspect, 1) / 1;
  flex-shrink:0;
}

.mvp-frame{
  position:absolute;
  inset:0;
  width:100%;height:100%;
  object-fit:contain;
  pointer-events:none;
  z-index:2;
}

/* Avatar circular anclado al hueco interior del marco. Suficientemente
   grande para llenar visualmente el cÃ­rculo de llamas/hielo en ambos
   marcos (fuego y hielo tienen el hueco a la misma posiciÃ³n). */
.mvp-avatar-wrap{
  position:absolute;
  top:var(--avatar-top, 44%);
  left:var(--avatar-left, 50%);
  width:var(--avatar-size, 62%);
  aspect-ratio:1/1;
  transform:translate(-50%,-50%);
  border-radius:50%;
  overflow:hidden;
  background:#0d1117;
  z-index:1;
}
.mvp-avatar{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}

/* Nombre + valor BAJO el marco â€” apilados en columna, sin overlapping
   con el banner MVP del marco. Fuentes proporcionales al alto del card
   (cqh) para que escalen al redimensionar. */
.mvp-info{
  position:relative;
  text-align:center;
  pointer-events:none;
  display:flex;flex-direction:column;align-items:center;
  gap:0.05em;
  margin-top:0.15em;
  width:100%;
}
.mvp-name{
  font-size:1.4em;
  font-weight:900;
  color:#fff;
  text-shadow:
    -2px -2px 0 #000,
     2px -2px 0 #000,
    -2px  2px 0 #000,
     2px  2px 0 #000,
     0 4px 12px rgba(0,0,0,.7);
  /* No wrap ni break â€” el JS escala el texto para que SIEMPRE quepa
     dentro del card. Antes con word-break: break-word los nombres
     largos rompÃ­an a media palabra (p.ej. "Hugo Rodriguez8730" â†’ 2
     lÃ­neas con corte). Ahora se mantiene en una lÃ­nea y se reduce el
     tamaÃ±o con transform: scale() si excede el ancho. */
  white-space:nowrap;
  line-height:1;
  letter-spacing:0.02em;
  transform-origin:center top;
  display:inline-block;
  max-width:none;
}
.mvp-value{
  font-size:1.0em;
  font-weight:800;
  color:#ffd700;
  text-shadow:
    -2px -2px 0 #000,
     2px -2px 0 #000,
    -2px  2px 0 #000,
     2px  2px 0 #000,
     0 3px 8px rgba(0,0,0,.7);
  line-height:1;
}

/* Hide name/value individually via config */
.mvp-card.hide-name .mvp-name{display:none}
.mvp-card.hide-value .mvp-value{display:none}

/* Glow pulse alrededor del marco mientras estÃ¡ visible */
@keyframes mvp-pulse{
  0%,100%{filter:drop-shadow(0 6px 24px rgba(0,0,0,.5))}
  50%{filter:drop-shadow(0 0 36px rgba(255,215,0,.8))}
}
.mvp-card.visible{animation:mvp-pulse 2.4s ease-in-out infinite}
</style>
</head>
<body>
<div id="root">
  <div class="mvp-card-wrap">
    <div class="mvp-card" id="mvp-card">
      <div class="mvp-frame-box">
        <img class="mvp-frame" id="mvp-frame-img" alt="" onerror="this.style.opacity='0.3'">
        <div class="mvp-avatar-wrap">
          <img class="mvp-avatar" id="mvp-avatar-img" alt="" onerror="this.style.display='none'">
        </div>
      </div>
      <div class="mvp-info">
        <div class="mvp-name" id="mvp-name"></div>
        <div class="mvp-value" id="mvp-value"></div>
      </div>
    </div>
  </div>
</div>

<script src="/widgets/core/env.js?v=20260507-ws-storage"></script>

<script>
(function(){
  'use strict';

  // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  // Logger que tambiÃ©n escribe en el console del frame top (overlay
  // padre) para que el creador vea los logs sin tener que cambiar de
  // contexto en DevTools. Si top no es accesible (cross-origin), cae
  // silenciosamente al console local del iframe.
  // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  // En same-origin los logs del iframe ya aparecen en el console del
  // parent automÃ¡ticamente, asÃ­ que solo logueamos al console local.
  // Evita duplicados visibles cuando devtools combina frames.
  // Logs sÃ³lo si window.__mvpDebug estÃ¡ activo (para diagnÃ³stico)
  function mvpLog(...args){
    if (typeof window !== 'undefined' && window.__mvpDebug) {
      try { console.log('[MVP]', ...args); } catch(_) {}
    }
  }
  function mvpWarn(...args){
    if (typeof window !== 'undefined' && window.__mvpDebug) {
      try { console.warn('[MVP]', ...args); } catch(_) {}
    }
  }
  // mvpLog inicial omitido â€” usar window.__mvpDebug = true en console para activar.

  // Marca visible en el body del overlay padre para diagnosticar que el
  // iframe MVP se cargÃ³ correctamente. Inspecciona el <body> del overlay
  // padre (vertical.html) â€” deberÃ­a tener: data-mvp-iframe-loaded="true"
  try {
    if (window.parent && window.parent !== window && window.parent.document &&
        window.parent.document.body) {
      window.parent.document.body.dataset.mvpIframeLoaded = 'true';
      window.parent.document.body.dataset.mvpIframeLoadedAt = String(Date.now());
    }
  } catch(_) {}

  // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  // Config
  // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  const FRAMES = {
    fuego: {
      src: 'mvp-frames/mvp_fuego.png',
      aspect: 1,
      avatar: { left: '50%', top: '44%', size: '62%' }
    },
    hielo: {
      src: 'mvp-frames/mvp_hielo.png',
      aspect: 1,
      avatar: { left: '50%', top: '44%', size: '62%' }
    }
  };

  const cfg = {
    frame: 'fuego',          // 'fuego' | 'hielo'
    duration: 8,             // segundos visible
    showName: true,
    showValue: true,
    showAlways: false,       // mostrar MVP aunque el host PIERDA la batalla
    fontFamily: '',          // fuente seleccionada (e.g. 'Luckiest Guy')
    fontUrl: '',             // URL de @font-face (Google Fonts, custom, R2)
    streamerUserId: null,    // userId del host (para identificar lado del streamer)
    streamerRoomId: null,    // roomId del host (fallback de detecciÃ³n via combos)
    streamerUsername: null,  // username/uniqueId del host (otro fallback)
    soundEnabled: false,
    soundVolume: 70
  };

  function getStorageBase(){
    return (window.__tcEnv && window.__tcEnv.st) ? window.__tcEnv.st() : 'https://storage.tikcontrol.live';
  }

  function frameUrl(key){
    const base = getStorageBase();
    const frame = FRAMES[key] || FRAMES.fuego;
    const path = frame.src;
    if (/^(localhost|127\.0\.0\.1|\[::1\]|tikcontrol\.live)$/.test(window.location.hostname)) {
      return '/widgets/' + path;
    }
    const u = base + '/widgets/' + path;
    return (window.__tcSignedUrl ? window.__tcSignedUrl(u) : u);
  }

  function getFrameDef(key){
    return FRAMES[key] || FRAMES.fuego;
  }

  // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  // Tracking per-batalla â€” adopta el mismo enfoque que la pestaÃ±a Batallas
  // (renderer/tabs/batallas/). Usa Map<userId,user> para acumular TODOS los
  // contributors a travÃ©s de events (TikTok solo envÃ­a top ~3 por evento,
  // asÃ­ que mergear es necesario para no perder gente).
  // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  let battleId = null;
  let hostAnchorId = null;
  // Map: anchorId â†’ Map<userKey, { userId, uniqueId, nickname, avatar, points, anchorId }>
  const contributorsByAnchor = new Map();
  // Map: teamIdx â†’ Map<userKey, user> (modo team)
  const contributorsByTeam = new Map();
  // anchorId â†’ score oficial
  const scoresByAnchor = {};
  // teamIdx â†’ score (modo team)
  const scoresByTeam = {};
  let hostTeamIdx = -1;
  let _isTeamMode = false;
  let _armiesDumped = false;
  let _teamDumped = false;
  // Set de anchorIds conocidos en la batalla actual â€” los excluimos de los
  // contributors (un anchor NO es un viewer-MVP, son los streamers de la PK).
  const knownAnchors = new Set();
  // Cache de info de anchors (nickname, avatar) para mejorar entries con
  // datos vacÃ­os en userArmy.
  const anchorInfoCache = new Map();

  function resetBattleState(){
    contributorsByAnchor.clear();
    contributorsByTeam.clear();
    Object.keys(scoresByAnchor).forEach(k => delete scoresByAnchor[k]);
    Object.keys(scoresByTeam).forEach(k => delete scoresByTeam[k]);
    knownAnchors.clear();
    anchorInfoCache.clear();
    hostTeamIdx = -1;
    _isTeamMode = false;
    _armiesDumped = false;
    _teamDumped = false;
  }

  // â”€â”€â”€ Avatar extraction (estilo battleUtils.js extractAvatar) â”€â”€â”€
  function pickAvatarFromUser(obj){
    if (!obj) return '';
    const sources = [
      obj.profilePictureUrl,
      obj.profilePicture?.urls?.[0], obj.profilePicture?.urlList?.[0],
      obj.avatarThumb?.url?.[0], obj.avatarThumb?.urlList?.[0], obj.avatarThumb?.urls?.[0],
      obj.avatarMedium?.urlList?.[0], obj.avatarMedium?.url?.[0],
      obj.avatarLarge?.urlList?.[0], obj.avatarLarge?.url?.[0],
      obj.avatar?.urlList?.[0], obj.avatar?.urls?.[0], obj.avatar?.url?.[0],
      obj.avatarUrl, obj.avatar
    ];
    for (const src of sources) {
      if (src && typeof src === 'string' && src.startsWith('http')) return src;
    }
    return '';
  }

  function pickNameFromUser(u){
    if (!u) return '';
    return u.nickName || u.nickname || u.nick_name || u.uniqueId || u.displayId || '';
  }

  function pickIdFromUser(u){
    if (!u) return '';
    return String(u.userId || u.user_id || u.uid || u.uniqueId || '');
  }

  // Merge un user en un Map de contributors (mismo patrÃ³n que mergeMVPs en
  // batallas: usa Math.max para el score, prioriza datos no vacÃ­os).
  // FILTRA anchors conocidos â€” un anchor NO puede ser un viewer-MVP.
  function mergeContributor(map, user, anchorId){
    const usr = user.user || user;
    const key = pickIdFromUser(usr) || user.uniqueId || pickNameFromUser(usr);
    if (!key) return;
    // Skip si el "user" es realmente otro anchor de la batalla
    if (knownAnchors.has(key)) return;
    const points = parseInt(user.diamondScore ?? user.score ?? user.points ?? usr.diamondScore ?? usr.score ?? 0, 10) || 0;
    const existing = map.get(key);
    if (existing) {
      existing.points = Math.max(existing.points || 0, points);
      const newName = pickNameFromUser(usr) || user.nickname;
      const newAvatar = pickAvatarFromUser(usr) || user.avatar;
      if (newName && !newName.startsWith('Streamer_') && !isNumericId(newName)) {
        existing.nickname = newName;
      }
      if (newAvatar) existing.avatar = newAvatar;
    } else {
      const initialName = pickNameFromUser(usr) || user.nickname || '';
      map.set(key, {
        userId: pickIdFromUser(usr) || '',
        uniqueId: usr.uniqueId || user.uniqueId || '',
        nickname: (initialName && !isNumericId(initialName)) ? initialName : '',
        avatar: pickAvatarFromUser(usr) || user.avatar || '',
        points,
        anchorId
      });
    }
  }

  function isNumericId(s){
    return typeof s === 'string' && /^\d{10,}$/.test(s);
  }

  // Mejora un contributor con datos del cache de anchorInfo si los suyos
  // estÃ¡n vacÃ­os. Ãštil cuando userArmy llega con uniqueId pero sin nickname.
  function enrichFromCache(contributor){
    if (!contributor) return contributor;
    if (contributor.nickname && !isNumericId(contributor.nickname) && contributor.avatar) {
      return contributor;
    }
    // Buscar por uniqueId o userId en el cache
    for (const info of anchorInfoCache.values()) {
      if (info.uniqueId && info.uniqueId === contributor.uniqueId) {
        if (!contributor.nickname || isNumericId(contributor.nickname)) {
          contributor.nickname = info.nickname || contributor.nickname;
        }
        if (!contributor.avatar) contributor.avatar = info.avatar || '';
        break;
      }
    }
    // Fallback: si todavÃ­a es numÃ©rico, usar uniqueId si existe
    if (isNumericId(contributor.nickname) && contributor.uniqueId) {
      contributor.nickname = contributor.uniqueId;
    }
    return contributor;
  }

  // Devuelve el contributor con mÃ¡s puntos del Map (filtra los que tienen 0)
  function topOfMap(map){
    let top = null;
    for (const u of map.values()) {
      const p = u.points || 0;
      if (p <= 0) continue; // un user con 0 puntos no es MVP
      if (!top || p > (top.points || 0)) top = u;
    }
    return top;
  }

  // â”€â”€â”€ DetecciÃ³n del host â€” mÃºltiples mÃ©todos en orden de fiabilidad â”€
  // Replica las heurÃ­sticas de la pestaÃ±a Batallas
  // (renderer/tabs/batallas/battleIdentity.js).
  function detectHostAnchorFromBattle(data){
    if (!data) return null;

    // 1) cfg.streamerUserId match exacto en anchorInfo
    const streamerId = cfg.streamerUserId ? String(cfg.streamerUserId) : '';
    if (streamerId && data.anchorInfo && typeof data.anchorInfo === 'object') {
      if (data.anchorInfo[streamerId]) return streamerId;
      for (const [k, v] of Object.entries(data.anchorInfo)) {
        const u = (v && (v.user || v)) || {};
        if (pickIdFromUser(u) === streamerId) return String(k);
      }
    }

    // 2) cfg.streamerRoomId via battleCombos[anchorId].comboRuleGuideSchema
    const myRoomId = cfg.streamerRoomId ? String(cfg.streamerRoomId) : '';
    if (myRoomId && data.battleCombos && typeof data.battleCombos === 'object') {
      for (const [aid, combo] of Object.entries(data.battleCombos)) {
        const schema = String(combo?.comboRuleGuideSchema || '');
        const m = schema.match(/server_room_id=(\d+)/);
        if (m && m[1] === myRoomId) return String(aid);
      }
    }

    // 3) cfg.streamerUsername match en anchorInfo
    const username = cfg.streamerUsername ? String(cfg.streamerUsername).toLowerCase().replace('@', '') : '';
    if (username && data.anchorInfo && typeof data.anchorInfo === 'object') {
      for (const [k, v] of Object.entries(data.anchorInfo)) {
        const u = (v && (v.user || v)) || {};
        const uniq = (u.uniqueId || '').toLowerCase().replace('@', '');
        const disp = (u.displayId || '').toLowerCase().replace('@', '');
        const nick = (pickNameFromUser(u) || '').toLowerCase().replace('@', '');
        if (uniq && uniq === username) return String(k);
        if (disp && disp === username) return String(k);
        if (nick && !nick.startsWith('streamer_') && nick === username) return String(k);
      }
    }

    // 4) BigInt prefix (si streamerUserId tiene precisiÃ³n perdida en JSON)
    if (streamerId && streamerId.length >= 15 && data.anchorInfo) {
      const prefix = streamerId.substring(0, 15);
      const matches = Object.keys(data.anchorInfo).filter(aid => {
        const a = String(aid);
        return a.length === streamerId.length && a.substring(0, 15) === prefix;
      });
      if (matches.length === 1) return matches[0];
    }

    return null;
  }

  // captureHostFromGift â€” el host RECIBE los regalos. Si nos llega un
  // gift con receiverUserId que coincide con un anchor activo, ESE es
  // el host. Ãštil cuando los IDs grandes pierden precisiÃ³n en JSON (>2^53).
  // NO acumula puntos por gift â€” los puntos REALES de batalla vienen en
  // `userArmy[].diamondScore` de linkMicArmies (lo que muestra TikTok en
  // la barra de la batalla).
  function captureHostFromGift(data){
    if (!data || hostAnchorId) return;
    const receiverId = String(data?.receiverUserId || data?.toUserId || data?.giftExtra?.toUserId || '');
    if (!receiverId || receiverId === '0') return;
    if (contributorsByAnchor.has(receiverId) || scoresByAnchor[receiverId] !== undefined ||
        knownAnchors.has(receiverId)) {
      mvpLog('host capturado vÃ­a gift.receiverUserId:', receiverId);
      hostAnchorId = receiverId;
      if (pendingBattleResult) {
        const r = pendingBattleResult;
        pendingBattleResult = null;
        handleBattleEnd(r);
      }
    }
  }

  // Guarda el Ãºltimo battleResult recibido para evaluaciÃ³n diferida si
  // todavÃ­a no tenemos hostAnchorId (cfg.streamerUserId aÃºn no llegÃ³).
  let pendingBattleResult = null;

  // â”€â”€â”€ linkMicBattle handler â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  // Detecta fin de batalla por presencia de `battleResult` (mismo mÃ©todo
  // que usa el widget battle-pk â€” mÃ¡s robusto que confiar en `action`).
  function onLinkMicBattle(data){
    if (!data) return;
    const action = parseInt(data.action, 10) || 0;
    const newId = String(data.battleId || data.battle_id || '');
    const hasResult = data.battleResult && Object.keys(data.battleResult).length > 0;
    const hasTeamResult = Array.isArray(data.teamBattleResult) && data.teamBattleResult.length > 0;

    mvpLog('linkMicBattle action=' + action + ' battleId=' + newId +
      ' anchors=' + Object.keys(data.anchorInfo || {}).length +
      ' battleResult=' + (hasResult ? 'YES' : 'no') +
      ' teamResult=' + (hasTeamResult ? 'YES' : 'no'));

    if (newId && newId !== battleId && !hasResult && !hasTeamResult) {
      // Nueva batalla (no es el final de la anterior)
      mvpLog('â†’ nueva batalla:', newId);
      battleId = newId;
      resetBattleState();
      pendingBattleResult = null;
    }

    // Cachear anchors conocidos + sus datos (nickname/avatar) para
    // (a) filtrar anchors de los contributors (un anchor NO es MVP)
    // (b) enriquecer contributors con datos vacÃ­os en userArmy
    if (data.anchorInfo && typeof data.anchorInfo === 'object') {
      for (const [aid, info] of Object.entries(data.anchorInfo)) {
        const aidStr = String(aid);
        knownAnchors.add(aidStr);
        const u = (info && (info.user || info)) || {};
        const uid = pickIdFromUser(u);
        if (uid) knownAnchors.add(uid);
        anchorInfoCache.set(aidStr, {
          uniqueId: u.uniqueId || u.displayId || '',
          nickname: pickNameFromUser(u) || '',
          avatar: pickAvatarFromUser(u) || ''
        });
      }
    }

    const detected = detectHostAnchorFromBattle(data);
    if (detected && detected !== hostAnchorId) {
      mvpLog('â†’ host anchor detectado:', detected,
        '(via', cfg.streamerUserId ? 'streamerUserId' : 'roomId combos', ')');
      hostAnchorId = detected;
      // Si habÃ­a un resultado pendiente (battleResult llegÃ³ antes que streamerUserId)
      if (pendingBattleResult) {
        mvpLog('â†’ aplicando battleResult pendiente ahora que tenemos host');
        const r = pendingBattleResult;
        pendingBattleResult = null;
        handleBattleEnd(r);
      }
    }

    // DetecciÃ³n de fin: `battleResult` (1v1/multi) O `teamBattleResult` (team).
    // No requerimos `action===5/6` porque algunos modos no lo setean.
    if (hasResult || hasTeamResult) {
      mvpLog('â†’ fin de batalla detectado (battleResult=' + hasResult +
        ', teamResult=' + hasTeamResult + '), evaluando MVP');
      handleBattleEnd(data);
    }
  }

  // â”€â”€â”€ Fin de batalla â€” adaptado a 1v1, team y multi-anchor â”€
  // Acepta tanto `data.battleResult` (1v1, multi-anchor) como
  // `data.teamBattleResult` (team battles).
  function handleBattleEnd(rawData){
    // rawData puede ser el evento entero o solo battleResult (legacy)
    const data = (rawData && (rawData.battleResult || rawData.teamBattleResult))
      ? rawData
      : { battleResult: rawData };
    const battleResult = data.battleResult || null;
    const teamBattleResult = Array.isArray(data.teamBattleResult) ? data.teamBattleResult : null;

    if (!hostAnchorId) {
      mvpWarn('handleBattleEnd: hostAnchorId NO detectado todavÃ­a. ' +
        'Guardando como pendiente. ' +
        'cfg.streamerUserId=' + (cfg.streamerUserId || '(vacÃ­o)') +
        ', cfg.streamerRoomId=' + (cfg.streamerRoomId || '(vacÃ­o)'));
      pendingBattleResult = data;
      if (cfg.showAlways) {
        const fallback = pickGlobalTop();
        if (fallback) {
          mvpLog('showAlways=true y sin host â†’ mostrando top global:', fallback);
          show(fallback);
        }
      }
      return;
    }

    let won = false;
    let mode = '?';

    // â”€â”€â”€ 1) Team battle (teamBattleResult con array) â”€â”€
    if (teamBattleResult && teamBattleResult.length > 0) {
      mode = 'team';
      // Buscar el resultado del equipo del host
      // Los items tienen { teamId, result, ...} O { groupId, result, ... }
      const myTeam = teamBattleResult.find(t => {
        const tid = t.teamId ?? t.groupId ?? t.team_id ?? t.team;
        if (tid === undefined || tid === null) return false;
        return parseInt(tid, 10) === hostTeamIdx;
      });
      if (myTeam) {
        const r = myTeam.result;
        won = r === 0 || r === '0';
        mvpLog('teamBattleResult: hostTeam=' + hostTeamIdx + ' result=' + r +
          ' â†’ ' + (won ? 'GANÃ“' : 'PERDIÃ“/EMPATE'));
      } else if (Object.keys(scoresByTeam).length > 0 && hostTeamIdx >= 0) {
        // Fallback: comparar scores localmente
        const hostScore = scoresByTeam[hostTeamIdx] || 0;
        let rivalMax = 0;
        Object.entries(scoresByTeam).forEach(([idx, s]) => {
          if (parseInt(idx, 10) !== hostTeamIdx && s > rivalMax) rivalMax = s;
        });
        won = hostScore > rivalMax;
        mvpLog('team mode (sin teamBattleResult): scores host=' + hostScore +
          ' rival=' + rivalMax + ' â†’ ' + (won ? 'GANÃ“' : 'PERDIÃ“/EMPATE'));
      } else {
        mvpWarn('team mode pero no podemos determinar ganador. ' +
          'hostTeamIdx=' + hostTeamIdx + ' scoresByTeam=', scoresByTeam);
      }
    }
    // â”€â”€â”€ 2) 1v1 / multi-anchor (battleResult por anchor) â”€â”€
    else if (battleResult && Object.keys(battleResult).length > 0) {
      mode = battleResult[hostAnchorId] ? '1v1/multi' : 'fallback';
      const myResult = battleResult[hostAnchorId];
      if (myResult) {
        const r = myResult.result;
        won = r === 0 || r === '0';
        mvpLog('battleResult host=' + hostAnchorId + ' â†’ result=' + r +
          ' (' + (won ? 'GANÃ“' : 'PERDIÃ“/EMPATE') + ')');
      } else {
        // Fallback: comparar scores
        const hostScore = scoresByAnchor[hostAnchorId] || 0;
        let rivalMax = 0;
        Object.entries(scoresByAnchor).forEach(([aid, s]) => {
          if (aid !== hostAnchorId && s > rivalMax) rivalMax = s;
        });
        won = hostScore > rivalMax;
        mvpLog('1v1/multi (sin battleResult para host): scores host=' + hostScore +
          ' rival=' + rivalMax + ' â†’ ' + (won ? 'GANÃ“' : 'PERDIÃ“/EMPATE'));
      }
    }
    else {
      mvpWarn('handleBattleEnd: no hay ni battleResult ni teamBattleResult');
      return;
    }

    if (!won && !cfg.showAlways) {
      mvpLog('host no ganÃ³ (modo=' + mode + ') y showAlways=false â†’ no mostrar MVP');
      return;
    }

    // Buscar el MVP del lado del host
    let top = null;
    if (_isTeamMode && hostTeamIdx >= 0) {
      const teamMap = contributorsByTeam.get(hostTeamIdx);
      top = teamMap ? topOfMap(teamMap) : null;
      // Si no hay contributors en el teamMap, buscar en battleItems del
      // host como fallback
      if (!top) {
        const anchorMap = contributorsByAnchor.get(hostAnchorId);
        top = anchorMap ? topOfMap(anchorMap) : null;
      }
    } else {
      const anchorMap = contributorsByAnchor.get(hostAnchorId);
      top = anchorMap ? topOfMap(anchorMap) : null;
    }

    // Fallback: si el lado del host no tiene MVP (todos con 0 puntos) y
    // showAlways estÃ¡ activo, mostramos el top GLOBAL â€” Ãºtil cuando TikTok
    // no envÃ­a userArmy con scores para el lado del host pero sÃ­ para el
    // rival (caso comÃºn cuando solo se donÃ³ al lado contrario).
    if (!top && cfg.showAlways) {
      top = pickGlobalTop();
      if (top) mvpLog('fallback â†’ top global (host no tiene MVP propio):', top);
    }

    if (top) {
      enrichFromCache(top);
      mvpLog((won ? 'host GANÃ“' : 'showAlways=true') + ' (modo=' + mode +
        ') â†’ mostrando MVP:', top);
      show(top);
    } else {
      mvpWarn('no tenemos contributors trackeados para el host (modo=' + mode + '). ' +
        'hostAnchorId=' + hostAnchorId + ' hostTeamIdx=' + hostTeamIdx +
        ' contributorsByAnchor=', [...contributorsByAnchor.keys()],
        ' contributorsByTeam=', [...contributorsByTeam.keys()]);
    }
  }

  // Devuelve el top user a travÃ©s de TODOS los anchors (fallback para
  // showAlways cuando no sabemos cuÃ¡l anchor es el host).
  function pickGlobalTop(){
    let best = null;
    const all = _isTeamMode ? contributorsByTeam : contributorsByAnchor;
    for (const sub of all.values()) {
      const t = topOfMap(sub);
      if (t && (!best || (t.points || 0) > (best.points || 0))) best = t;
    }
    return best;
  }

  // â”€â”€â”€ linkMicArmies handler â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  // Actualiza scoresByAnchor + topUserByAnchor (1v1) o
  // scoresByTeam + topUserByTeam (team mode).
  function onLinkMicArmies(data){
    if (!data) return;

      // Modo team â€” teamArmies[i].teamUsers[]
    if (Array.isArray(data.teamArmies) && data.teamArmies.length > 0) {
      _isTeamMode = true;
      data.teamArmies.forEach((team, idx) => {
        const score = parseInt(team.totalScore ?? team.score ?? team.hostScore ?? 0, 10) || 0;
        scoresByTeam[idx] = score;
        const users = team.teamUsers || team.users || [];
        if (!contributorsByTeam.has(idx)) contributorsByTeam.set(idx, new Map());
        const map = contributorsByTeam.get(idx);
        users.forEach(u => {
          mergeContributor(map, u, idx);
          // Si este team contiene al host como teamUser, recordar el idx
          const usr = u.user || u;
          if (hostAnchorId && pickIdFromUser(usr) === String(hostAnchorId)) {
            hostTeamIdx = idx;
          }
        });
      });
    }

    // battleItems puede coexistir con teamArmies en team mode â€” los
    // battleItems son por ANCHOR (hosts), teamArmies son por equipo.
    // Si hay battleItems, tambiÃ©n los procesamos para extraer userArmy
    // y para detectar a quÃ© teamId pertenece el hostAnchor.
    if (data.battleItems && typeof data.battleItems === 'object') {
      for (const [anchorId, item] of Object.entries(data.battleItems)) {
        if (!item) continue;
        const aid = String(anchorId);
        const score = parseInt(item.hostScore ?? item.score ?? 0, 10) || 0;
        scoresByAnchor[aid] = score;
        // Si ESTE anchor es el host y conocemos su teamId, marcar
        if (hostAnchorId === aid) {
          const tid = item.teamId ?? item.team_id ?? item.team;
          if (tid !== undefined && tid !== null) {
            const tidNum = parseInt(tid, 10);
            if (!Number.isNaN(tidNum)) hostTeamIdx = tidNum;
          }
        }
        const users = item.userArmy || item.users || [];
        if (!contributorsByAnchor.has(aid)) contributorsByAnchor.set(aid, new Map());
        const map = contributorsByAnchor.get(aid);
        users.forEach(u => mergeContributor(map, u, aid));
      }
    }

    // anchorInfo a veces trae teamId por anchor â€” fallback
    if (_isTeamMode && hostAnchorId && hostTeamIdx < 0 && data.anchorInfo) {
      const info = data.anchorInfo[hostAnchorId];
      if (info) {
        const tid = info.teamId ?? info.team_id ?? info.team;
        if (tid !== undefined && tid !== null) {
          const tidNum = parseInt(tid, 10);
          if (!Number.isNaN(tidNum)) hostTeamIdx = tidNum;
        }
      }
    }
  }


  // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  // Render
  // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  const cardEl = document.getElementById('mvp-card');
  const frameBoxEl = document.querySelector('.mvp-frame-box');
  const frameImg = document.getElementById('mvp-frame-img');
  const avatarImg = document.getElementById('mvp-avatar-img');
  const nameEl = document.getElementById('mvp-name');
  const valueEl = document.getElementById('mvp-value');

  let _hideTimer = null;

  function applyConfig(){
    cardEl.classList.toggle('hide-name', !cfg.showName);
    cardEl.classList.toggle('hide-value', !cfg.showValue);
    const frameDef = getFrameDef(cfg.frame);
    if (frameBoxEl) {
      const avatar = frameDef.avatar || {};
      frameBoxEl.style.setProperty('--frame-aspect', String(frameDef.aspect || 1));
      frameBoxEl.style.setProperty('--avatar-left', avatar.left || '50%');
      frameBoxEl.style.setProperty('--avatar-top', avatar.top || '44%');
      frameBoxEl.style.setProperty('--avatar-size', avatar.size || '62%');
    }
    frameImg.src = frameUrl(cfg.frame);

    // Aplicar fuente personalizada (sistema unificado: __tcLoadFont del
    // widget-base la carga vÃ­a @font-face si tiene URL, y la asigna al
    // card. Sin fontFamily, fallback a system-ui/sans-serif).
    const family = (cfg.fontFamily || '').trim();
    const url = (cfg.fontUrl || '').trim();
    if (family && window.__tcLoadFont) {
      try { window.__tcLoadFont(family, url); } catch(_) {}
    }
    cardEl.style.fontFamily = family
      ? "'" + family + "',system-ui,sans-serif"
      : "system-ui,'Segoe UI',Roboto,sans-serif";
  }

  // Ajusta el nombre y el valor al ancho del card escalando el texto si
  // se sale. Mantiene una sola lÃ­nea (white-space:nowrap) y reduce con
  // transform: scale() â€” la fuente sigue al 1.4em "natural" pero
  // visualmente cabe entera. Funciona con cualquier fuente custom
  // (las anchas se escalan mÃ¡s, las estrechas no se escalan).
  function fitTextToCard(el){
    if (!el) return;
    el.style.transform = '';
    const card = cardEl;
    const cardWidth = card.clientWidth || 0;
    if (!cardWidth || !el.textContent) return;
    // Margen de seguridad: dejar 6% de aire a cada lado.
    const maxWidth = cardWidth * 0.94;
    const naturalWidth = el.scrollWidth;
    if (naturalWidth > maxWidth) {
      const scale = Math.max(0.4, maxWidth / naturalWidth);
      el.style.transform = 'scale(' + scale.toFixed(3) + ')';
    }
  }

  function show(mvp){
    if (!mvp) return;
    if (_hideTimer) clearTimeout(_hideTimer);

    nameEl.textContent = mvp.nickname || '';
    // Aceptar tanto points (nuevo) como diamonds (legacy/test) para
    // compatibilidad con eventos manuales antiguos.
    const value = mvp.points != null ? mvp.points : (mvp.diamonds || 0);
    valueEl.textContent = formatNumber(value);
    if (mvp.avatar) {
      avatarImg.src = mvp.avatar;
      avatarImg.style.display = 'block';
    } else {
      avatarImg.removeAttribute('src');
      avatarImg.style.display = 'none';
    }
    applyConfig();

    // Forzar reflow para que la transiciÃ³n se aplique
    cardEl.classList.remove('visible');
    void cardEl.offsetWidth;
    cardEl.classList.add('visible');

    // Ajustar tamaÃ±o del texto DESPUÃ‰S del reflow para tener el ancho
    // del card medido con el font final. Doble rAF para esperar a la
    // fuente custom si __tcLoadFont estÃ¡ cargando una @font-face nueva.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        fitTextToCard(nameEl);
        fitTextToCard(valueEl);
      });
    });

    const ms = Math.max(2, Number(cfg.duration) || 8) * 1000;
    _hideTimer = setTimeout(() => {
      cardEl.classList.remove('visible');
      _hideTimer = null;
    }, ms);
  }

  function formatNumber(n){
    // El creador prefiere ver el nÃºmero exacto con separador de miles
    // (1.500 en vez de 1.5K). No abreviar.
    n = Math.floor(Number(n) || 0);
    return n.toLocaleString('es-ES');
  }

  // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  // Listeners
  // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function connect(){
    if (!window.TikControlRelay){
      setTimeout(connect, 200);
      return;
    }
    const relay = window.TikControlRelay;

    // Eventos de batalla TikTok PK
    //   linkMicBattle â†’ detecta host + fin (con battleResult)
    //   linkMicArmies â†’ trackea scores y contributors per-anchor
    //   gift / gift-solo â†’ fallback para identificar host (vÃ­a receiverUserId)
    relay.on('linkMicBattle', onLinkMicBattle);
    relay.on('linkMicArmies', onLinkMicArmies);
    relay.on('gift', captureHostFromGift);
    relay.on('gift-solo', captureHostFromGift);

    // Evento push desde la pestaÃ±a Batallas (cinturÃ³n de seguridad).
    //   data: { mvp, won?, battleId? }
    // Si trae `won === false`, respetamos cfg.showAlways igual que en el
    // path local de handleBattleEnd. Si data.mvp viene, lo mostramos
    // directamente sin necesidad de tener hostAnchorId resuelto en el widget.
    relay.on('mvp:show', (data) => {
      if (data && data.mvp) {
        if (data.won === false && !cfg.showAlways) {
          mvpLog('mvp:show recibido pero won=false y showAlways=false â†’ no mostrar');
          return;
        }
        mvpLog('mvp:show recibido (push externo) â†’ mostrando MVP:', data.mvp);
        show(data.mvp);
        return;
      }
      // Fallback sin data.mvp: si hay un MVP en curso trackeado localmente
      let mvp = null;
      if (_isTeamMode && hostTeamIdx >= 0) {
        mvp = topOfMap(contributorsByTeam.get(hostTeamIdx) || new Map());
      } else if (hostAnchorId) {
        mvp = topOfMap(contributorsByAnchor.get(hostAnchorId) || new Map());
      }
      if (mvp) { enrichFromCache(mvp); show(mvp); }
    });

    // Config desde TikControl: { frame, duration, showName, showValue }
    function applyAnyConfig(m){
      if (!m || !m.config) return;
      const hadStreamerId = !!cfg.streamerUserId;
      mvpLog('config recibida (widget=' + (m.widget || '?') + '): streamerUserId=' +
        (m.config.streamerUserId || '(no incluido)') +
        ', streamerRoomId=' + (m.config.streamerRoomId || '(no incluido)'));
      // Cualquier widget que publique streamerUserId / streamerRoomId
      // (tÃ­picamente battle-pk o el propio mvp al recibir `connection`)
      // nos sirve para identificar al host.
      if (m.config.streamerUserId) cfg.streamerUserId = String(m.config.streamerUserId);
      if (m.config.streamerRoomId) cfg.streamerRoomId = String(m.config.streamerRoomId);
      if (m.widget === 'mvp') Object.assign(cfg, m.config);
      if (!hadStreamerId && cfg.streamerUserId) {
        mvpLog('streamerUserId AHORA fijado:', cfg.streamerUserId);
        // Si habÃ­a un battleResult pendiente esperando este dato, evaluarlo
        if (pendingBattleResult && hostAnchorId === null) {
          // Necesitamos detectar host con el streamerUserId nuevo
          // (el siguiente linkMicBattle lo harÃ¡ automÃ¡ticamente, pero
          // si la batalla ya terminÃ³ podemos hacerlo retroactivamente)
          mvpLog('hay un battleResult pendiente â€” el siguiente linkMicBattle lo procesarÃ¡');
        }
      }
      applyConfig();
    }
    relay.on('widgetConfig', applyAnyConfig);
    relay.on('widget:configUpdated', applyAnyConfig);
    // battle-pk tambiÃ©n emite battlePk:config con la misma info
    relay.on('battlePk:config', applyAnyConfig);

    // BotÃ³n "Probar en overlay" del editor: muestra un MVP de ejemplo
    // durante cfg.duration segundos. El test no afecta al ranking real
    // (se renderea con datos fake sin tocar el Map donors).
    relay.on('widget:test', (d) => {
      if (!d || d.widget !== 'mvp') return;
      const fake = (d.data && d.data.mvp) || {
        nickname: 'TestAlpha',
        avatar: 'https://tikcontrol.live/assets/xCousito.png',
        points: 1500
      };
      // Si el msg trae frame, aplicarlo solo durante el test
      if (d.data && d.data.frame && FRAMES[d.data.frame]) {
        const prevFrame = cfg.frame;
        cfg.frame = d.data.frame;
        applyConfig();
        // Restaurar frame al ocultarse
        const ms = Math.max(2, Number(cfg.duration) || 8) * 1000;
        setTimeout(() => { cfg.frame = prevFrame; applyConfig(); }, ms + 500);
      }
      show(fake);
    });
  }

  applyConfig();
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', connect);
  } else {
    connect();
  }

  // Preview en el Overlay Editor â€” muestra un MVP de placeholder de forma
  // permanente cuando se carga con `?inEditor=true` para que el creador
  // VEA el widget al aÃ±adirlo (en lugar de un cuadro vacÃ­o). El preview
  // se reemplaza automÃ¡ticamente cuando llega un MVP real.
  try {
    const params = new URLSearchParams(window.location.search);
    if (params.get('inEditor') === 'true') {
      mvpLog('modo Overlay Editor â€” mostrando placeholder permanente');
      // Dejarlo visible siempre (sin auto-hide) en el editor
      cardEl.classList.add('visible');
      nameEl.textContent = 'MVP de la Batalla';
      valueEl.textContent = formatNumber(1500);
      avatarImg.src = 'https://tikcontrol.live/assets/xCousito.png';
      avatarImg.style.display = 'block';
      // Anular el timer de hide cuando estamos en editor
      const origShow = show;
      // Sobrescribir show para que en editor no se oculte automÃ¡ticamente
      // (los datos reales reemplazan al placeholder pero quedan visibles)
      window.__mvpShowOriginal = origShow;
    }
  } catch (_) {}
})();
</script>
