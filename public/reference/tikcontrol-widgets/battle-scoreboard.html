<style>
/* === RESET === */
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:transparent;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100%}
.hidden{display:none!important}

/* === CONTAINER === */
.scoreboard-container{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  padding:16px;
}

/* === SCOREBOARD === */
.scoreboard{
  display:flex;align-items:stretch;gap:0;
  background:linear-gradient(135deg,rgba(10,10,15,0.95),rgba(20,20,30,0.9));
  border-radius:16px;overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,0.4),0 0 60px rgba(255,62,165,0.08);
  border:2px solid rgba(255,255,255,0.1);
}

/* === TEAM SIDES === */
.team{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px 30px;min-width:180px;gap:10px;
  position:relative;transition:all 0.3s ease;
}
.team.host{background:linear-gradient(135deg,rgba(255,62,165,0.15),rgba(255,62,165,0.05))}
.team.guest{background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(59,130,246,0.05))}

.team.winning{transform:scale(1.02)}
.team.winning::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,215,0,0.1),transparent);
  pointer-events:none;
}

/* === AVATAR === */
.team-avatar{
  width:60px;height:60px;border-radius:50%;object-fit:cover;
  border:3px solid rgba(255,255,255,0.2);
  transition:all 0.3s ease;
}
.team.host .team-avatar{border-color:#ff3ea5}
.team.guest .team-avatar{border-color:#3b82f6}
.team.winning .team-avatar{
  border-color:#ffd700;
  box-shadow:0 0 20px rgba(255,215,0,0.5);
}

/* === NAME === */
.team-name{
  font-size:14px;font-weight:600;color:rgba(255,255,255,0.8);
  max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* === SCORE === */
.team-score{
  font-family:'JetBrains Mono',monospace;font-size:42px;font-weight:800;
  transition:all 0.3s ease;
}
.team.host .team-score{color:#ff3ea5}
.team.guest .team-score{color:#3b82f6}
.team.winning .team-score{color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,0.5)}

/* === CROWN === */
.team-crown{
  position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  font-size:24px;opacity:0;transition:opacity 0.3s ease;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}
.team.winning .team-crown{opacity:1;animation:bounce 1s ease-in-out infinite}

/* === VS DIVIDER === */
.vs-divider{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px 16px;gap:8px;
  background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(0,0,0,0.2));
  border-left:1px solid rgba(255,255,255,0.1);
  border-right:1px solid rgba(255,255,255,0.1);
}
.vs-text{
  font-size:20px;font-weight:900;color:rgba(255,255,255,0.3);
}
.vs-timer{
  font-family:'JetBrains Mono',monospace;font-size:14px;
  color:rgba(255,255,255,0.5);
}
.vs-live{
  font-size:10px;font-weight:700;text-transform:uppercase;
  color:#22c55e;animation:pulse 1.5s infinite;
  background:rgba(34,197,94,0.2);padding:4px 8px;border-radius:10px;
}

/* === IDLE STATE === */
.idle-scoreboard{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 50px;gap:12px;
  background:linear-gradient(135deg,rgba(10,10,15,0.95),rgba(20,20,30,0.9));
  border-radius:16px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
  border:2px solid rgba(255,255,255,0.1);
}
.idle-icon{font-size:40px;opacity:0.4}
.idle-text{font-size:14px;color:rgba(255,255,255,0.5)}

/* === ANIMATIONS === */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
@keyframes scoreUp{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.score-flash{animation:scoreUp 0.4s ease-out}

/* === HORIZONTAL MODE === */
.scoreboard.horizontal{flex-direction:row}
.scoreboard.horizontal .team{flex-direction:row;gap:16px}
.scoreboard.horizontal .team-score{font-size:36px}

/* === MINIMAL MODE === */
.scoreboard.minimal{border-radius:12px}
.scoreboard.minimal .team{padding:12px 20px;min-width:120px}
.scoreboard.minimal .team-avatar{width:40px;height:40px}
.scoreboard.minimal .team-name{display:none}
.scoreboard.minimal .team-score{font-size:32px}
.scoreboard.minimal .vs-divider{padding:12px}
.scoreboard.minimal .vs-text{font-size:16px}
.scoreboard.minimal .vs-timer{display:none}

<div class="scoreboard-container">
  <!-- Active Scoreboard -->
  <div id="scoreboard" class="scoreboard hidden">
    <div id="hostTeam" class="team host">
      <div class="team-crown"><span class="tc-svg-icon crown"></span></div>
      <img id="hostAvatar" class="team-avatar" alt="">
      <span id="hostName" class="team-name">Host</span>
      <span id="hostScore" class="team-score">0</span>
    </div>
    
    <div class="vs-divider">
      <span class="vs-text">VS</span>
      <span id="timer" class="vs-timer">00:00</span>
      <span class="vs-live">EN VIVO</span>
    </div>
    
    <div id="guestTeam" class="team guest">
      <div class="team-crown"><span class="tc-svg-icon crown"></span></div>
      <img id="guestAvatar" class="team-avatar" alt="">
      <span id="guestName" class="team-name">Guest</span>
      <span id="guestScore" class="team-score">0</span>
    </div>
  </div>
  
  <!-- Idle State -->
  <div id="idleScoreboard" class="idle-scoreboard">
    <div class="idle-icon"><span class="tc-svg-icon swords"></span></div>
    <span class="idle-text">Esperando batalla...</span>
  </div>
</div>

<script>
(function(){
  'use strict';
  
  const state = {
    isActive: false,
    startTime: null,
    timerInterval: null,
    host: { nickname: 'Host', avatar: '', score: 0 },
    guest: { nickname: 'Guest', avatar: '', score: 0 }
  };

  const TEXTS = {
    waiting: 'Waiting for battle'
  };
  
  const $ = id => document.getElementById(id);
  const els = {
    scoreboard: $('scoreboard'),
    idleScoreboard: $('idleScoreboard'),
    hostTeam: $('hostTeam'),
    hostAvatar: $('hostAvatar'),
    hostName: $('hostName'),
    hostScore: $('hostScore'),
    guestTeam: $('guestTeam'),
    guestAvatar: $('guestAvatar'),
    guestName: $('guestName'),
    guestScore: $('guestScore'),
    timer: $('timer')
  };
  
  function formatNumber(n){
    if(n >= 1000000) return (n/1000000).toFixed(1)+'M';
    if(n >= 1000) return (n/1000).toFixed(1)+'K';
    return n.toString();
  }
  
  function formatTime(s){
    const m = Math.floor(s/60), sec = s%60;
    return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  }
  
  function startTimer(){
    if(state.timerInterval) clearInterval(state.timerInterval);
    state.startTime = Date.now();
    state.timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - state.startTime)/1000);
      if(els.timer) els.timer.textContent = formatTime(elapsed);
    }, 1000);
  }
  
  function updateUI(){
    if(!state.isActive){
      els.scoreboard?.classList.add('hidden');
      els.idleScoreboard?.classList.remove('hidden');
      return;
    }
    
    els.scoreboard?.classList.remove('hidden');
    els.idleScoreboard?.classList.add('hidden');
    
    if(els.hostAvatar) {
      if(state.host.avatar) els.hostAvatar.src = state.host.avatar;
      else els.hostAvatar.removeAttribute('src');
    }
    if(els.hostName) els.hostName.textContent = state.host.nickname;
    if(els.hostScore) els.hostScore.textContent = formatNumber(state.host.score);
    
    if(els.guestAvatar) {
      if(state.guest.avatar) els.guestAvatar.src = state.guest.avatar;
      else els.guestAvatar.removeAttribute('src');
    }
    if(els.guestName) els.guestName.textContent = state.guest.nickname;
    if(els.guestScore) els.guestScore.textContent = formatNumber(state.guest.score);
    
    els.hostTeam?.classList.remove('winning');
    els.guestTeam?.classList.remove('winning');
    
    if(state.host.score > state.guest.score) els.hostTeam?.classList.add('winning');
    else if(state.guest.score > state.host.score) els.guestTeam?.classList.add('winning');
  }
  
  function flashScore(isHost){
    const el = isHost ? els.hostScore : els.guestScore;
    if(el){ el.classList.add('score-flash'); setTimeout(()=>el.classList.remove('score-flash'),400); }
  }

  function normalizeScore(item){
    if(!item) return 0;
    const raw = item.hostScore ?? item.totalScore ?? item.teamTotalScore ?? item.score ?? item.points ?? 0;
    return Number(raw) || 0;
  }
  
  function handleBattle(data){
    const action = data.action || data.battleAction || data.status;
    if(action === 1 || action === 'BATTLE_START' || action === 'start'){
      state.isActive = true;
      const users = data.battleUsers || Object.values(data.anchorInfo || {}) || [];
      if(users[0]){
        const u = users[0].user || users[0];
        state.host.nickname = u.nickname || u.uniqueId || 'Host';
        state.host.avatar = u.profilePictureUrl || u.avatarThumb?.urlList?.[0] || '';
        state.host.score = 0;
      }
      if(users[1]){
        const u = users[1].user || users[1];
        state.guest.nickname = u.nickname || u.uniqueId || 'Guest';
        state.guest.avatar = u.profilePictureUrl || u.avatarThumb?.urlList?.[0] || '';
        state.guest.score = 0;
      }
      startTimer();
      updateUI();
    }
    if(action === 3 || action === 'BATTLE_END' || action === 'end'){
      setTimeout(() => { state.isActive = false; updateUI(); }, 10000);
    }
  }
  
  function handleArmies(data){
    if(!state.isActive){ state.isActive = true; startTimer(); }
    const armies = data.battleItems || data.battleGroups || data.teamArmies || data.armies;
    if(armies){
      const arr = Array.isArray(armies) ? armies : Object.values(armies);
      if(arr[0]){
        const s = normalizeScore(arr[0]);
        if(s !== state.host.score) flashScore(true);
        state.host.score = s;
      }
      if(arr[1]){
        const s = normalizeScore(arr[1]);
        if(s !== state.guest.score) flashScore(false);
        state.guest.score = s;
      }
    }
    updateUI();
  }
  
  // Socket
  if(window.io){
    const sock = io(undefined, { reconnection: true });
    sock.on('tiktok:linkMicBattle', handleBattle);
    sock.on('tiktok:linkMicArmies', handleArmies);
    sock.on('linkMicBattle', handleBattle);
    sock.on('linkMicArmies', handleArmies);
    sock.on('tiktok:event', p => {
      if(p?.type === 'linkMicBattle') handleBattle(p.data || {});
      if(p?.type === 'linkMicArmies') handleArmies(p.data || {});
    });
    // [log cleaned]
  }
  
  // Test
  if(location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
    window.testScoreboard = function(){
      handleBattle({
        action: 1,
        battleUsers: [
          { user: { nickname: 'Player1', profilePictureUrl: '' }},
          { user: { nickname: 'Player2', profilePictureUrl: '' }}
        ]
      });
      let s = 0;
      const i = setInterval(() => {
        s += Math.floor(Math.random() * 50) + 10;
        handleArmies({ teamArmies: [{ score: s }, { score: Math.floor(s * 0.9) }] });
      }, 1500);
      setTimeout(() => { clearInterval(i); }, 15000);
    };
  }
  
  updateUI();
})();
</script>
