<!doctype html>
<meta charset="utf-8"/>
<title>Gift Gallery</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    width: 100%;
    height: 100%;
    font-family: 'Bangers', system-ui, -apple-system, sans-serif;
  }

  #root {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0;
    overflow: visible;
  }

  /* ===== TITLE ===== */
  .gallery-title {
    font-size: 36px;
    color: #ffffff;
    text-align: center;
    margin-bottom: 4px;
    -webkit-text-stroke: 3px #000000;
    paint-order: stroke fill;
    text-shadow: 0 0 10px rgba(0,0,0,0.5);
    white-space: nowrap;
    letter-spacing: 2px;
    z-index: 10;
    flex-shrink: 0;
  }

  /* ===== CAROUSEL CONTAINER ===== */
  .carousel-wrapper {
    width: 100%;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .carousel-track {
    display: flex;
    align-items: center;
    gap: 20px;
    animation: scroll-left 30s linear infinite;
    will-change: transform;
    padding: 0 10px;
  }

  @keyframes scroll-left {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  @keyframes scroll-right {
    0%   { transform: translateX(-50%); }
    100% { transform: translateX(0); }
  }

  /* ===== GIFT CARD ===== */
  .gift-card {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px;
    min-width: 100px;
    transition: filter 0.5s ease, transform 0.3s ease;
    position: relative;
  }

  /* Uncompleted = grayscale */
  .gift-card.uncompleted {
    filter: grayscale(1) opacity(0.6);
  }

  /* Completed = full color + glow */
  .gift-card.completed {
    filter: none;
    animation: glow-pulse 2s ease-in-out infinite alternate;
  }

  @keyframes glow-pulse {
    0%   { filter: drop-shadow(0 0 4px rgba(255,215,0,0.3)); }
    100% { filter: drop-shadow(0 0 12px rgba(255,215,0,0.8)); }
  }

  .gift-card.completed .gift-completed-check {
    display: flex;
  }

  /* Gift image */
  .gift-img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    image-rendering: auto;
  }

  /* Quantity badge */
  .gift-quantity {
    position: absolute;
    top: 2px;
    right: 2px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 12px;
    font-weight: bold;
    padding: 2px 6px;
    border-radius: 10px;
    min-width: 16px;
    text-align: center;
    -webkit-text-stroke: 0;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .gift-quantity.done {
    background: rgba(76, 175, 80, 0.9);
  }

  /* Gift name */
  .gift-name {
    font-size: 11px;
    color: #fff;
    text-align: center;
    max-width: 120px;
    overflow: visible;
    white-space: nowrap;
    -webkit-text-stroke: 1px #000;
    paint-order: stroke fill;
    font-family: inherit;
    font-weight: 600;
  }

  /* Completed check icon */
  .gift-completed-check {
    display: none;
    position: absolute;
    bottom: 28px;
    right: 6px;
    width: 20px;
    height: 20px;
    background: #4CAF50;
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #fff;
    border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  /* Completed by user info */
  .gift-completed-by {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-top: 2px;
  }

  .completed-avatar {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.5);
  }

  .completed-nick {
    font-size: 9px;
    color: rgba(255,255,255,0.9);
    max-width: 70px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: inherit;
    font-weight: 500;
    -webkit-text-stroke: 0.5px #000;
    paint-order: stroke fill;
  }

  /* ===== TRANSITION ANIMATIONS ===== */
  .gift-card.just-completed {
    animation: celebrate 0.8s ease-out;
  }

  @keyframes celebrate {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.3); }
    60%  { transform: scale(0.95); }
    100% { transform: scale(1); }
  }
</style>

<div id="root">
  <div class="gallery-title" id="galleryTitle">Completa la GalerÃ­a</div>
  <div class="carousel-wrapper">
    <div class="carousel-track" id="carouselTrack"></div>
  </div>
</div>
