<style>
/* === RESET === */
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:transparent;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100%}

/* === CONTAINER === */
.gifts-container{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  padding:16px;gap:10px;
  overflow:hidden;
}

/* === HEADER === */
.gifts-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:linear-gradient(135deg,rgba(15,15,20,0.95),rgba(25,25,35,0.9));
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
}

.gifts-title{
  display:flex;align-items:center;gap:8px;
  font-size:14px;font-weight:700;color:#fff;
}

.gifts-title-icon{font-size:18px}

.gifts-stats{
  display:flex;gap:16px;
}

.gifts-stat{
  display:flex;align-items:center;gap:6px;
  font-size:13px;color:rgba(255,255,255,0.7);
}

.gifts-stat-value{
  font-family:'JetBrains Mono',monospace;
  font-weight:700;color:#fff;
}

.live-badge{
  font-size:10px;font-weight:700;text-transform:uppercase;
  color:#22c55e;background:rgba(34,197,94,0.2);
  padding:4px 8px;border-radius:10px;
  animation:pulse 1.5s infinite;
}

/* === GIFTS LIST === */
.gifts-list{
  flex:1;display:flex;flex-direction:column;gap:8px;
  overflow:hidden;
}

/* === GIFT ITEM === */
.gift-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  background:linear-gradient(135deg,rgba(15,15,20,0.9),rgba(25,25,35,0.85));
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  animation:slideIn 0.4s ease-out;
  transition:all 0.3s ease;
}

.gift-item:hover{
  background:rgba(255,255,255,0.05);
  border-color:rgba(255,255,255,0.15);
}

.gift-item.host{border-left:3px solid #ff3ea5}
.gift-item.guest{border-left:3px solid #3b82f6}

.gift-item.fadeout{
  animation:fadeOut 0.3s ease-out forwards;
}

/* === GIFT USER === */
.gift-user{
  display:flex;align-items:center;gap:10px;flex:1;min-width:0;
}

.gift-avatar{
  width:40px;height:40px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.2);
  object-fit:cover;flex-shrink:0;
}

.gift-user-info{
  display:flex;flex-direction:column;gap:2px;min-width:0;
}

.gift-username{
  font-size:14px;font-weight:600;color:#fff;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

.gift-target{
  font-size:11px;color:rgba(255,255,255,0.5);
}

/* === GIFT INFO === */
.gift-info{
  display:flex;align-items:center;gap:12px;
}

.gift-image{
  width:48px;height:48px;object-fit:contain;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4));
}

.gift-details{
  display:flex;flex-direction:column;align-items:flex-end;gap:2px;
}

.gift-name{
  font-size:12px;color:rgba(255,255,255,0.7);
  max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

.gift-value{
  font-family:'JetBrains Mono',monospace;
  font-size:16px;font-weight:700;
  background:linear-gradient(135deg,#ff3ea5,#8b5cf6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.gift-count{
  font-size:12px;font-weight:600;
  color:rgba(255,255,255,0.6);
}

/* === EMPTY STATE === */
.gifts-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  text-align:center;
}

.gifts-empty-icon{font-size:48px;opacity:0.3}
.gifts-empty-text{font-size:14px;color:rgba(255,255,255,0.4)}

/* === ANIMATIONS === */
@keyframes slideIn{
  0%{transform:translateX(-30px);opacity:0}
  100%{transform:translateX(0);opacity:1}
}

@keyframes fadeOut{
  0%{transform:translateX(0);opacity:1}
  100%{transform:translateX(30px);opacity:0}
}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:0.6}
}

/* === COMPACT MODE === */
.gifts-container.compact .gifts-header{padding:8px 12px}
.gifts-container.compact .gift-item{padding:8px 12px}
.gifts-container.compact .gift-avatar{width:32px;height:32px}
.gifts-container.compact .gift-image{width:36px;height:36px}
.gifts-container.compact .gift-username{font-size:12px}
.gifts-container.compact .gift-value{font-size:14px}

  </style>

<div id="giftsContainer" class="gifts-container">
  <!-- Header -->
  <div class="gifts-header">
    <div class="gifts-title">
      <span class="gifts-title-icon tc-svg-icon gift"></span>
      <span>Regalos de Batalla</span>
    </div>
    <div class="gifts-stats">
      <div class="gifts-stat">
        <span class="tc-svg-icon gift"></span>
        <span id="totalGifts" class="gifts-stat-value">0</span>
      </div>
      <div class="gifts-stat">
        <span class="tc-svg-icon coin"></span>
        <span id="totalDiamonds" class="gifts-stat-value">0</span>
      </div>
      <span id="liveBadge" class="live-badge" style="display:none">EN VIVO</span>
    </div>
  </div>
  
  <!-- Gifts List -->
  <div id="giftsList" class="gifts-list">
    <div class="gifts-empty">
      <div class="gifts-empty-icon"><span class="tc-svg-icon gift"></span></div>
      <p class="gifts-empty-text">Esperando regalos de batalla...</p>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  
  const MAX_GIFTS = 8;
  
  const state = {
    isActive: false,
    host: { uniqueId: '', nickname: 'Host' },
    guest: { uniqueId: '', nickname: 'Guest' },
    gifts: [],
    totalGifts: 0,
    totalDiamonds: 0
  };
  
  const $ = id => document.getElementById(id);
  const els = {
    giftsList: $('giftsList'),
    totalGifts: $('totalGifts'),
    totalDiamonds: $('totalDiamonds'),
    liveBadge: $('liveBadge')
  };
  
  function formatNumber(n){
    if(n >= 1000000) return (n/1000000).toFixed(1)+'M';
    if(n >= 1000) return (n/1000).toFixed(1)+'K';
    return n.toString();
  }
  
  function addGift(giftData){
    const { user, gift, target, diamonds, count } = giftData;
    
    const item = document.createElement('div');
    const isHost = target === state.host.uniqueId;
    item.className = `gift-item ${isHost ? 'host' : 'guest'}`;
    
    const avatarUrl = user.profilePictureUrl || user.avatarThumb?.urlList?.[0] || '';
    const giftImage = gift.image || gift.picture || gift.img || '';
    
    item.innerHTML = `
      <div class="gift-user">
        <img class="gift-avatar" src="${avatarUrl}" alt="" onerror="this.style.display='none'">
        <div class="gift-user-info">
          <span class="gift-username">${user.nickname || user.uniqueId || 'Usuario'}</span>
          <span class="gift-target">para ${isHost ? state.host.nickname : state.guest.nickname}</span>
        </div>
      </div>
      <div class="gift-info">
        <img class="gift-image" src="${giftImage}" alt="" onerror="this.style.display='none'">
        <div class="gift-details">
          <span class="gift-name">${gift.name || 'Regalo'}</span>
          <span class="gift-value">+${diamonds}</span>
          ${count > 1 ? `<span class="gift-count">x${count}</span>` : ''}
        </div>
      </div>
    `;
    
    // Add to list (at top)
    els.giftsList.insertBefore(item, els.giftsList.firstChild);
    
    // Remove empty state if exists
    const empty = els.giftsList.querySelector('.gifts-empty');
    if(empty) empty.remove();
    
    // Limit items
    while(els.giftsList.children.length > MAX_GIFTS){
      const last = els.giftsList.lastChild;
      last.classList.add('fadeout');
      setTimeout(() => last.remove(), 300);
    }
    
    // Update stats
    state.totalGifts += count || 1;
    state.totalDiamonds += diamonds || 0;
    updateStats();
  }
  
  function updateStats(){
    if(els.totalGifts) els.totalGifts.textContent = formatNumber(state.totalGifts);
    if(els.totalDiamonds) els.totalDiamonds.textContent = formatNumber(state.totalDiamonds);
  }
  
  function setBattleActive(active){
    state.isActive = active;
    if(els.liveBadge) els.liveBadge.style.display = active ? 'block' : 'none';
    
    if(!active){
      // Clear after battle ends
      setTimeout(() => {
        els.giftsList.innerHTML = `
          <div class="gifts-empty">
            <div class="gifts-empty-icon"><span class="tc-svg-icon gift"></span></div>
            <p class="gifts-empty-text">Esperando regalos de batalla...</p>
          </div>
        `;
        state.totalGifts = 0;
        state.totalDiamonds = 0;
        updateStats();
      }, 10000);
    }
  }
  
  function handleBattle(data){
    const action = data.action || data.battleAction || data.status;
    
    if(action === 1 || action === 'BATTLE_START' || action === 'start'){
      const users = data.battleUsers || Object.values(data.anchorInfo || {}) || [];
      if(users[0]){
        const u = users[0].user || users[0];
        state.host.uniqueId = u.uniqueId || u.unique_id || '';
        state.host.nickname = u.nickname || 'Host';
      }
      if(users[1]){
        const u = users[1].user || users[1];
        state.guest.uniqueId = u.uniqueId || u.unique_id || '';
        state.guest.nickname = u.nickname || 'Guest';
      }
      
      // Reset
      els.giftsList.innerHTML = '';
      state.totalGifts = 0;
      state.totalDiamonds = 0;
      updateStats();
      setBattleActive(true);
    }
    
    if(action === 3 || action === 'BATTLE_END' || action === 'end'){
      setBattleActive(false);
    }
  }
  
  function handleGift(data){
    if(!state.isActive) return;
    
    const user = data.user || {};
    const gift = data.giftDetails || data.gift || {};
    const diamonds = data.diamondCount || data.diamond_count || gift.diamondCount || gift.diamond_count || 0;
    const count = data.repeatCount || data.count || 1;
    
    // Determine target (which streamer received this gift)
    // This may come from the raw event or need to be inferred
    const target = data.battleHostId || data.hostUserId || state.host.uniqueId;
    
    addGift({
      user: {
        uniqueId: user.uniqueId || user.unique_id || '',
        nickname: user.nickname || user.uniqueId || 'Usuario',
        profilePictureUrl: user.profilePictureUrl || user.avatarThumb?.urlList?.[0] || ''
      },
      gift: {
        name: data.giftName || gift.name || gift.giftName || 'Regalo',
        image: gift.picture || gift.image || gift.icon || gift.img || ''
      },
      target: target,
      diamonds: diamonds,
      count: count
    });
  }
  
  // Socket
  if(window.io){
    const sock = io(undefined, { reconnection: true });
    
    // Canal unificado: `tiktok:event` es el Ãºnico que emite el servidor
    // local (main.js â†’ overlayIO.emit('tiktok:event', evt)). Antes tambiÃ©n
    // escuchÃ¡bamos `tiktok:gift`, `tiktok:linkMicBattle`, `gift` y
    // `linkMicBattle` directos, pero ningÃºn emisor los manda hoy y, si los
    // mandara, causarÃ­an triple-conteo al solaparse con este canal.
    sock.on('tiktok:event', p => {
      if(p?.type === 'linkMicBattle') handleBattle(p.data || {});
      // Solo `gift` (se emite al terminar el combo con repeatCount total).
      // Escuchar tambiÃ©n `gift-solo` (uno por unidad) aÃ±adirÃ­a N entradas
      // en la lista por cada combo â€” en un combo de 5 rosas acabarÃ­amos
      // con 5 gift-solo + 1 gift = 6 entradas.
      if(p?.type === 'gift') handleGift(p.data || {});
    });
    
    // [log cleaned]
  }
  
  // Test
  window.testGift = function(){
    if(!state.isActive){
      handleBattle({
        action: 1,
        battleUsers: [
          { user: { uniqueId: 'host', nickname: 'Streamer1' }},
          { user: { uniqueId: 'guest', nickname: 'Streamer2' }}
        ]
      });
    }
    
    addGift({
      user: {
        uniqueId: 'tester' + Math.random(),
        nickname: 'TestUser' + Math.floor(Math.random() * 100),
        profilePictureUrl: ''
      },
      gift: {
        name: ['Rosa', 'CorazÃ³n', 'Galaxia', 'LeÃ³n', 'TikTok'][Math.floor(Math.random() * 5)],
        image: ''
      },
      target: Math.random() > 0.5 ? state.host.uniqueId : state.guest.uniqueId,
      diamonds: Math.floor(Math.random() * 500) + 1,
      count: Math.floor(Math.random() * 5) + 1
    });
  };
  
  // [log cleaned]
})();
</script>
