<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Fireworks V2 - Canvas Particles</title>
    <script src="tikcontrol-widget-base.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
            position: relative;
            height: 100vh;
        }

        #fireworkCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .username-popup {
            position: absolute;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            font-weight: 800;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8),
                0 0 40px rgba(255, 255, 255, 0.6),
                0 4px 8px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            opacity: 0;
            transform: scale(0.5);
            animation: usernameAppear 0.5s ease-out forwards;
            z-index: 100;
        }

        @keyframes usernameAppear {
            0% {
                opacity: 0;
                transform: scale(0.5) translateY(20px);
            }

            50% {
                opacity: 1;
                transform: scale(1.1) translateY(-10px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes usernameFade {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translateY(-30px);
            }
        }
    </style>
</head>

<body>
    <canvas id="fireworkCanvas"></canvas>
    <script src="firework-v2.js"></script>
</body>

</html>
