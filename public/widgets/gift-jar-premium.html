<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gift Jar Premium</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; font-family: system-ui, sans-serif; }

    /* Stage 1100×750. Tarro mediano arriba-centro (PNG 340×340) → ocupa
       solo ~31% del ancho del stage para que el pile de gifts derramados
       tenga sitio para extenderse a los lados y abajo, igual que en la
       referencia. En OBS el usuario dimensiona su browser source y el
       stage se autoescala / centra. */
    #jar-stage {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 1100px;
      height: 750px;
      pointer-events: none;
    }

    .jar-art {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 340px;
      height: 340px;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }
    #jar-back,
    #jar-front {
      display: none;
    }
    #jar-theme {
      z-index: 4;
      opacity: 1;
      mix-blend-mode: normal;
      transition: filter .2s ease;
    }
    #jar-cracks {
      z-index: 5;
      display: none;
      opacity: 0;
      mix-blend-mode: normal;
      transition: opacity .28s ease, filter .28s ease;
    }

    #burst-layer {
      position: absolute;
      inset: 0;
      z-index: 7;
      pointer-events: none;
      overflow: visible;
    }
    .burst-shard {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      height: var(--h);
      opacity: 0;
      transform: translate(-50%, -50%) rotate(var(--r));
      clip-path: polygon(50% 0, 100% 78%, 8% 100%);
      background: linear-gradient(135deg, rgba(255,255,255,.95), rgba(108,205,255,.35) 46%, rgba(255,255,255,.08));
      border: 1px solid rgba(255,255,255,.82);
      filter: drop-shadow(0 0 6px rgba(130,220,255,.65));
      animation: shardFly .95s cubic-bezier(.18,.78,.16,1) forwards;
      animation-delay: var(--d);
    }
    .impact-gift {
      position: absolute;
      left: 50%;
      top: -70px;
      z-index: 9;
      width: 168px;
      height: 168px;
      opacity: 0;
      pointer-events: none;
      transform: translate(-130%, -150%) scale(.35) rotate(-24deg);
      filter:
        drop-shadow(0 0 18px rgba(255,255,255,.8))
        drop-shadow(0 18px 22px rgba(0,0,0,.45));
      animation: giantGiftHit .98s cubic-bezier(.16,.92,.2,1) forwards;
    }
    .impact-gift img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .impact-ring {
      position: absolute;
      left: 50%;
      top: 220px;
      z-index: 8;
      width: 170px;
      height: 170px;
      border-radius: 999px;
      border: 3px solid rgba(255,255,255,.82);
      box-shadow:
        0 0 22px rgba(120,220,255,.72),
        inset 0 0 26px rgba(255,255,255,.28);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(.35);
      animation: impactRing .9s cubic-bezier(.14,.76,.18,1) forwards;
      animation-delay: var(--delay);
    }
    .impact-flash {
      position: absolute;
      left: 50%;
      top: 214px;
      z-index: 8;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(.2);
      background:
        radial-gradient(circle, rgba(255,255,255,.96) 0 10%, rgba(105,214,255,.54) 16%, rgba(255,92,229,.36) 28%, rgba(255,255,255,0) 56%);
      filter: blur(.3px) drop-shadow(0 0 22px rgba(110,220,255,.8));
      animation: impactFlash .54s ease-out forwards;
    }
    #jar-stage.is-breaking .jar-art,
    #jar-stage.is-breaking #jar-theme,
    #jar-stage.is-breaking #jar-cracks {
      animation: jarImpactShake .46s cubic-bezier(.18,.86,.24,1);
    }
    #jar-stage.is-broken #jar-theme {
      opacity: 1;
      filter: drop-shadow(0 0 18px rgba(255,255,255,.45));
    }

    #jar-content {
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow: hidden;
    }

    .gift-body {
      position: absolute;
      transform-origin: center center;
      pointer-events: none;
      will-change: transform;
    }
    .gift-body img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    #jar-stage.is-filling #jar-theme,
    #jar-stage.is-filling #jar-cracks { filter: drop-shadow(0 0 8px rgba(80, 160, 255, 0.55)); }
    #jar-stage.is-full #jar-theme,
    #jar-stage.is-full #jar-cracks { filter: drop-shadow(0 0 14px rgba(255, 180, 60, 0.85)); }

    /* Toast anclado AL STAGE (position:absolute), justo debajo del tarro
       y encima del contador. bottom:40 → queda en el espacio entre el
       fondo del jar PNG (y≈470 del stage) y el contador (bottom:4). */
    #donor-toast {
      position: absolute;
      left: 50%;
      bottom: 40px;
      transform: translate(-50%, 20px);
      z-index: 6;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px 8px 8px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(6px);
      border-radius: 999px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: transform .35s cubic-bezier(.2,.7,.3,1.4), opacity .35s ease;
      white-space: nowrap;
      max-width: 360px;
    }
    #donor-toast.show { opacity: 1; transform: translate(-50%, 0); }
    #donor-toast .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5aa9ff, #7a5cff);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px;
      overflow: hidden;
      flex-shrink: 0;
    }
    #donor-toast .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    #donor-toast .info { display: flex; flex-direction: column; gap: 2px; line-height: 1.1; }
    #donor-toast .name { font-size: 14px; }
    #donor-toast .gift-line { display: flex; align-items: center; gap: 4px; font-size: 12px; opacity: .92; }
    #donor-toast .gift-line img { width: 18px; height: 18px; object-fit: contain; }
    #donor-toast .combo { color: #ffd76a; font-weight: 800; }

    #jar-break-notice {
      position: absolute;
      left: 50%;
      top: 18px;
      transform: translate(-50%, -12px) scale(.96);
      z-index: 12;
      max-width: 520px;
      padding: 10px 18px;
      border-radius: 999px;
      color: #fff;
      font-size: 19px;
      font-weight: 900;
      text-align: center;
      white-space: nowrap;
      background: linear-gradient(135deg, rgba(255, 92, 180, .9), rgba(84, 196, 255, .86));
      box-shadow:
        0 0 22px rgba(110, 220, 255, .5),
        0 12px 26px rgba(0, 0, 0, .34);
      text-shadow: 0 2px 10px rgba(0,0,0,.42);
      pointer-events: none;
      opacity: 0;
      transition: opacity .22s ease, transform .28s cubic-bezier(.18,.82,.22,1.25);
    }
    #jar-break-notice.show {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    #jar-regeneration-badge {
      position: absolute;
      left: calc(50% + 92px);
      top: 374px;
      transform: translate(-50%, -5px) scale(.92);
      z-index: 12;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      color: #dffcff;
      font-size: 17px;
      font-weight: 950;
      line-height: 34px;
      text-align: center;
      background: rgba(7, 15, 28, .76);
      border: 1px solid rgba(128, 235, 255, .52);
      box-shadow:
        0 0 14px rgba(84, 221, 255, .32),
        0 7px 18px rgba(0, 0, 0, .34),
        inset 0 1px 0 rgba(255, 255, 255, .18);
      text-shadow: 0 2px 8px rgba(0, 0, 0, .48);
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s ease, transform .22s cubic-bezier(.18,.8,.22,1.2);
    }
    #jar-regeneration-badge.show {
      opacity: 0;
    }

    #jar-regeneration-countdown {
      position: absolute;
      left: 50%;
      top: 382px;
      transform: translate(-50%, -7px) scale(.94);
      z-index: 11;
      min-width: 42px;
      height: 28px;
      padding: 0 13px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      font-weight: 950;
      background: rgba(6, 13, 26, .72);
      border: 1px solid rgba(255,255,255,.48);
      box-shadow:
        0 0 14px rgba(102, 218, 255, .28),
        inset 0 1px 0 rgba(255,255,255,.18);
      text-shadow: 0 3px 12px rgba(0,0,0,.48);
      pointer-events: none;
      opacity: 0;
      transition: opacity .18s ease, transform .2s ease;
    }
    #jar-regeneration-countdown.show {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    #jar-counter {
      position: absolute;
      left: 50%;
      top: 24px;
      transform: translateX(-50%);
      z-index: 12;
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
    }
    #jar-stage.show-counter #jar-counter { opacity: 1; }

    #jar-generation-hud {
      position: absolute;
      left: 50%;
      top: 716px;
      z-index: 13;
      min-width: 360px;
      max-width: 860px;
      transform: translate(-50%, 12px) scale(.98);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      --jar-history-title-color: #050505;
      --jar-history-user-color: #ffd900;
      --jar-history-multiplier-color: #080808;
      --jar-history-stroke-color: #ffffff;
      --jar-history-stroke-width: 1px;
      --jar-history-outline-shadow: 0 0 0 transparent;
      color: var(--jar-history-title-color);
      font-family: var(--jar-history-font, "Arial Black", Impact, system-ui, sans-serif);
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity .22s ease, transform .26s cubic-bezier(.18,.82,.22,1.12);
    }
    #jar-generation-hud.show {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }
    #jar-generation-hud.compact {
      display: grid;
      grid-template-columns: auto auto;
      align-items: center;
      justify-content: center;
      column-gap: 0;
      row-gap: 2px;
    }
    #jar-generation-jars {
      min-height: 42px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 9px;
    }
    #jar-generation-jars img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      filter:
        drop-shadow(0 0 5px rgba(255,255,255,.86))
        drop-shadow(0 4px 6px rgba(0,0,0,.24));
    }
    #jar-generation-hud.compact #jar-generation-jars {
      grid-column: 1;
      grid-row: 1;
      justify-content: flex-end;
      min-height: 42px;
      margin-right: -16px;
      transform: translateX(8px);
    }
    #jar-generation-hud.compact #jar-generation-jars img {
      width: 44px;
      height: 44px;
    }
    #jar-generation-multiplier {
      min-height: 36px;
      font-size: 38px;
      line-height: .95;
      font-weight: 950;
      letter-spacing: 0;
      color: var(--jar-history-multiplier-color);
      text-shadow:
        var(--jar-history-outline-shadow),
        0 2px 0 rgba(255,255,255,.74),
        0 5px 12px rgba(0,0,0,.28);
    }
    #jar-generation-hud.compact #jar-generation-multiplier {
      grid-column: 2;
      grid-row: 1;
      min-height: auto;
      font-size: 42px;
      margin-left: -16px;
      transform: translateX(0);
    }
    #jar-generation-last {
      margin-top: 8px;
      min-height: 18px;
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 16px;
      line-height: 1.15;
      font-weight: 950;
      text-transform: uppercase;
      color: var(--jar-history-title-color);
      text-shadow:
        var(--jar-history-outline-shadow),
        0 1px 0 rgba(255,255,255,.78),
        0 3px 8px rgba(0,0,0,.18);
    }
    #jar-generation-hud.compact #jar-generation-last {
      grid-column: 1 / 3;
      grid-row: 2;
      margin-top: 2px;
    }
    #jar-generation-last .last-name {
      color: var(--jar-history-user-color);
      text-shadow:
        var(--jar-history-outline-shadow),
        0 1px 0 rgba(50,35,0,.8),
        0 0 10px rgba(255,220,0,.58);
      overflow-wrap: anywhere;
    }

    @keyframes jarImpactShake {
      0% { transform: translateX(-50%) rotate(0deg); }
      18% { transform: translateX(calc(-50% - 9px)) rotate(-2deg); }
      38% { transform: translateX(calc(-50% + 11px)) rotate(2.2deg); }
      58% { transform: translateX(calc(-50% - 6px)) rotate(-1.2deg); }
      100% { transform: translateX(-50%) rotate(0deg); }
    }
    @keyframes giantGiftHit {
      0% { opacity: 0; transform: translate(-130%, -150%) scale(.35) rotate(-24deg); }
      12% { opacity: 1; transform: translate(-95%, -58px) scale(.88) rotate(-14deg); }
      46% { opacity: 1; transform: translate(-50%, 128px) scale(1.68) rotate(9deg); }
      58% { opacity: 1; transform: translate(-50%, 104px) scale(1.28) rotate(-7deg); }
      82% { opacity: .78; transform: translate(-50%, 168px) scale(.74) rotate(8deg); }
      100% { opacity: 0; transform: translate(-50%, 226px) scale(.28) rotate(18deg); }
    }
    @keyframes impactRing {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.25); }
      14% { opacity: .95; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(var(--scale)); }
    }
    @keyframes impactFlash {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.18); }
      16% { opacity: .95; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.8); }
    }
    @keyframes shardFly {
      0% { opacity: 0; transform: translate(-50%, -50%) rotate(var(--r)) scale(.25); }
      12% { opacity: .95; }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) rotate(var(--rr)) scale(1.08);
      }
    }
  </style>
</head>
<body>
  <div id="jar-stage">
    <img id="jar-back"  class="jar-art" src="gift-jar-frames/pote-glass.png"       alt="">
    <div id="jar-content"></div>
    <img id="jar-front" class="jar-art" src="gift-jar-frames/pote-glass-front.png" alt="">
    <img id="jar-theme" class="jar-art" alt="">
    <img id="jar-cracks" class="jar-art" alt="">
    <div id="burst-layer"></div>
    <div id="jar-break-notice" aria-live="polite"></div>
    <div id="jar-regeneration-countdown" aria-hidden="true"></div>
    <div id="jar-regeneration-badge" aria-hidden="true"></div>
    <div id="jar-generation-hud" aria-live="polite">
      <div id="jar-generation-jars" aria-hidden="true"></div>
      <div id="jar-generation-multiplier"></div>
      <div id="jar-generation-last">
        <span class="last-label"></span>
        <span class="last-name"></span>
      </div>
    </div>

    <!-- Toast como hijo del stage con position:absolute → queda anclado
         al stage (bottom:40 desde el fondo del stage). Así sale debajo
         del jar y encima del contador, no en el fondo del viewport. -->
    <div id="donor-toast">
      <div class="avatar">U</div>
      <div class="info">
        <div class="name">Username</div>
        <div class="gift-line"><img src="" alt=""><span class="combo">x1</span></div>
      </div>
    </div>

    <div id="jar-counter">0</div>
  </div>

  <script src="/widgets/core/env.js?v=20260521"></script>
  <script src="/widgets/core/font-loader.js?v=20260526-storage-token-fix"></script>
  <script src="tikcontrol-widget-base.js?v=2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="gift-jar-premium.js?v=28"></script>
</body>
</html>
