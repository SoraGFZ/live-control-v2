<!doctype html>
<meta charset="utf-8" />
<title>Subasta</title>
<style>
	html,body{margin:0;background:transparent}
	#root{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
	.card{position:relative; min-width:420px; max-width:54vw; padding:14px 16px; border-radius:14px; border:1px solid rgba(255,255,255,.18); background:rgba(0,0,0,.45); color:#fff; font:14px/1.4 system-ui, Segoe UI, Roboto, sans-serif; box-shadow: 0 10px 24px -10px rgba(0,0,0,.6)}
	.title{font-weight:700; font-size:22px; text-align:center; margin:0 0 6px}
	/* Wave animation for title letters */
	@keyframes waveY { 0%{ transform: translateY(0) } 25%{ transform: translateY(-6px) } 50%{ transform: translateY(0) } 75%{ transform: translateY(6px) } 100%{ transform: translateY(0) } }
	.title .ch { display:inline-block; will-change:transform; animation: waveY 1.4s ease-in-out infinite; }
	.title.wave .ch { animation-delay: calc(var(--i, 0) * 80ms); }
	.timer{font-weight:700; font-size:28px; text-align:center; margin:2px 0 10px}
	.minimo{display:flex; align-items:center; justify-content:center; gap:7px; background:linear-gradient(135deg, #ffcf5a, #ffa500); color:#fff; font-weight:900; font-size:15px; padding:9px 16px; border-radius:10px; border:1px solid rgba(255,255,255,.28); box-shadow:0 4px 12px -4px rgba(255,165,0,.5); margin:0 0 10px; text-align:center; letter-spacing:0.5px; text-shadow:0 1px 2px rgba(0,0,0,.55)}
	.minimo .min-label{opacity:.96; font-weight:900; font-size:12px; text-transform:uppercase; letter-spacing:1px}
	.minimo .min-value{font-size:20px; font-weight:900; color:#fff}
	.tops{display:grid; grid-template-columns: 1fr; gap:8px; margin:8px 0}
	.top{display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:8px}
	.top .pos{width:24px; height:24px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; background:#24323d; color:#cfe8ff}
	.top .avatar{width:36px; height:36px; border-radius:999px; object-fit:cover}
	.top .name{font-weight:600}
	.top .coins{margin-left:auto; font-weight:700; display:flex; align-items:center; gap:6px}
	.coin-emoji{display:inline-block; font-size:16px; animation: coinflip 1.1s linear infinite; transform-origin:center}
	.coin-static{animation:none!important}
	@keyframes coinflip{ 0%{ transform: rotateY(0) } 50%{ transform: rotateY(180deg) } 100%{ transform: rotateY(360deg) } }
	.participando{margin-top:8px; text-align:center; font-size:12px; opacity:.9}
	.winner{display:none; margin-top:10px; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,.2); background:rgba(0,0,0,.5); text-align:center}
	.winner.show{display:block}
	.winner .w-title{font-weight:700; margin-bottom:6px}
	.winner .w-avatar{width:64px; height:64px; border-radius:999px; object-fit:cover}
	.winner .w-name{font-weight:700; font-size:18px}
	.winner .w-comment{font-size:12px; opacity:.95; margin-top:6px; white-space:pre-wrap}
	/* Snipe alert layer */
	.snipe{ position:absolute; inset:0; pointer-events:none; overflow:hidden; }
	.snipe .txt{ position:absolute; left:50%; top:12%; transform:translateX(-50%); font-weight:800; font-size:28px; opacity:.18; letter-spacing:2px; pointer-events:none; }
	.snipe .emo, .snipe .txt.fly{ position:absolute; will-change:transform,opacity; pointer-events:none; }
	@keyframes snipeMoveTopDown{ 0%{ transform:translate(-50%, -20%); opacity:0 } 10%{ opacity:.3 } 80%{ opacity:.25 } 100%{ transform:translate(-50%, 120%); opacity:0 } }
	@keyframes snipeMoveLeftRight{ 0%{ transform:translate(-20%, -50%); opacity:0 } 10%{ opacity:.3 } 80%{ opacity:.25 } 100%{ transform:translate(120%, -30%); opacity:0 } }
	@keyframes snipeMoveRightLeft{ 0%{ transform:translate(120%, -20%); opacity:0 } 10%{ opacity:.3 } 80%{ opacity:.25 } 100%{ transform:translate(-20%, 10%); opacity:0 } }
	@keyframes snipeMoveDrift{ 0%{ transform:translate(0,0); opacity:0 } 10%{ opacity:.3 } 80%{ opacity:.25 } 100%{ transform:translate(12%, 40%); opacity:0 } }
	/* Animations */
	@keyframes bump { 0%{ transform:scale(1) } 50%{ transform:scale(1.14) } 100%{ transform:scale(1) } }
	.bump{ animation: bump .35s ease }
	@keyframes pulse { 0%{ transform:scale(1) } 50%{ transform:scale(1.05) } 100%{ transform:scale(1) } }
	.pulse{ animation: pulse 1.4s ease-in-out infinite }
	@keyframes tension { 0%,100%{ filter:brightness(1) } 50%{ filter:brightness(1.35) } }
	.tension{ animation: tension .7s ease-in-out infinite }
	.coin{ position:absolute; font-size:18px; animation: coinFall 1.2s ease-out forwards; }
	@keyframes coinFall{ 0%{ transform: translateY(-30px); opacity:0 } 10%{ opacity:1 } 100%{ transform: translateY(24px); opacity:0 } }
	/* Extra animations/effects */
	@keyframes shake { 0%,100%{ transform:translateX(0) } 20%{ transform:translateX(-3px) } 40%{ transform:translateX(3px) } 60%{ transform:translateX(-2px) } 80%{ transform:translateX(2px) } }
	.shake{ animation: shake .7s ease-in-out infinite }
	@keyframes wiggle { 0%,100%{ transform:rotate(0) } 25%{ transform:rotate(-2deg) } 75%{ transform:rotate(2deg) } }
	.wiggle{ animation: wiggle 1.2s ease-in-out infinite }
	@keyframes bounceIn { 0%{ transform:translateY(12px); opacity:.1 } 60%{ transform:translateY(-4px); opacity:1 } 100%{ transform:translateY(0) } }
	.bounce{ animation: bounceIn .8s ease both }
	@keyframes flash { 0%,50%,100%{ opacity:1 } 25%,75%{ opacity:.45 } }
	.flash{ animation: flash 1s ease-in-out infinite }
	@keyframes zoom { 0%,100%{ transform:scale(1) } 50%{ transform:scale(1.08) } }
	.zoom{ animation: zoom 1.2s ease-in-out infinite }
	/* Extra loop animations */
	@keyframes breath { 0%{ transform:scale(1) } 50%{ transform:scale(1.03) } 100%{ transform:scale(1) } }
	.breath{ animation: breath 2.2s ease-in-out infinite }
	@keyframes floatSlow { 0%{ transform:translateY(0) } 50%{ transform:translateY(-4px) } 100%{ transform:translateY(0) } }
	.float{ animation: floatSlow 3s ease-in-out infinite }
	@keyframes vibrate { 0%{ transform:translate(0,0) } 25%{ transform:translate(1px,-1px) } 50%{ transform:translate(-1px,1px) } 75%{ transform:translate(1px,1px) } 100%{ transform:translate(0,0) } }
	.vibrate{ animation: vibrate .5s linear infinite }
	@keyframes tilt { 0%{ transform:rotate(-1deg) } 50%{ transform:rotate(1deg) } 100%{ transform:rotate(-1deg) } }
	.tilt{ animation: tilt 1.5s ease-in-out infinite }
	@keyframes spinSlow { 0%{ transform:rotate(0) } 100%{ transform:rotate(360deg) } }
	.spin{ animation: spinSlow 8s linear infinite }
	@keyframes rainbowTextShadow { 0%{ text-shadow:0 0 6px #f00,0 0 12px #f00 } 20%{ text-shadow:0 0 6px #ffa500,0 0 12px #ffa500 } 40%{ text-shadow:0 0 6px #ff0,0 0 12px #ff0 } 60%{ text-shadow:0 0 6px #0f0,0 0 12px #0f0 } 80%{ text-shadow:0 0 6px #00f,0 0 12px #00f } 100%{ text-shadow:0 0 6px #800080,0 0 12px #800080 } }
	.neon{ text-shadow: 0 0 6px currentColor, 0 0 12px currentColor, 0 0 18px currentColor }
	.rainbow{ animation: rainbowTextShadow 2.4s linear infinite }
	/* No background mode */
	.card.no-bg, .card.no-bg .top, .card.no-bg .winner{ background: transparent !important; border: 0 !important; box-shadow:none !important }
	.card.no-bg .pos{ background: transparent !important }
