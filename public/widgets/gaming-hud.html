<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:transparent;overflow:hidden;height:100%;width:100%}

/* â•â•â• GOOGLE FONTS PRELOAD â•â•â• */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&family=Montserrat:wght@400;500;600;700;800&family=Press+Start+2P&family=Orbitron:wght@400;500;600;700;800;900&family=Bebas+Neue&family=Fredoka+One&display=swap');

#hud-root {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--row-gap, 8px);
  padding: var(--hud-padding, 10px);
}

.hud-row {
  display: flex;
  gap: var(--col-gap, 8px);
  align-items: stretch;
  justify-content: center;
  flex-shrink: 1;
}

/* Carousel container */
#hud-carousel {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.hud-page {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--row-gap, 8px);
  padding: var(--hud-padding, 10px);
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
}

.hud-page.active {
  opacity: 1;
  pointer-events: auto;
}

/* â•â•â• CELL WRAPPER â•â•â• */
.hud-cell {
  display: flex;
  min-width: var(--cell-min-w, 90px);
  flex: 1 1 0;
  max-width: 140px;
  transition: transform 0.3s ease;
  overflow: visible;
}

/* â•â•â• CELL BOX (everything inside) â•â•â• */
.hud-cell-box {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--cell-gap, 4px);
  padding: var(--cell-padding, 10px);
  padding-top: calc(var(--cell-padding, 10px) + 8px);
  border-radius: var(--cell-radius, 12px);
  background: var(--cell-bg, rgba(15,15,25,0.85));
  border: var(--cell-border, 1px solid rgba(255,255,255,0.12));
  backdrop-filter: blur(12px);
  width: 100%;
  flex: 1;
  transition: border-color 0.3s ease;
}

.hud-cell.style-overlay .hud-cell-box {
  padding: 6px;
  padding-top: 12px;
}

/* â•â•â• COMMAND IMAGE â•â•â• */
.hud-img-wrap {
  position: relative;
  width: var(--img-size, 64px);
  height: var(--img-size, 64px);
  flex-shrink: 0;
  margin-top: auto;
  margin-bottom: auto;
}

.hud-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: var(--img-radius, 6px);
  filter: var(--img-shadow, drop-shadow(0 2px 6px rgba(0,0,0,0.6)));
  transition: transform 0.3s ease, filter 0.3s ease;
}

/* â•â•â• TRIGGER (overlaps top edge of box) â•â•â• */
.hud-overlay-trigger {
  position: absolute;
  top: calc(var(--trigger-icon-size, 18px) * -0.4);
  left: var(--trig-left, 4px);
  right: var(--trig-right, auto);
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: var(--trigger-icon-size, 18px);
  line-height: 1;
  filter: var(--trigger-shadow, drop-shadow(0 2px 4px rgba(0,0,0,0.8)));
  white-space: nowrap;
  justify-content: var(--trig-justify, flex-start);
  transform: translate(var(--trigger-offset-x, 0px), var(--trigger-offset-y, 0px));
}

.hud-overlay-trigger .trig-emoji {
  font-size: inherit;
}

/* â•â•â• SVG TRIGGER ICONS â•â•â• */
.trig-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: var(--trigger-icon-size, 18px);
  height: var(--trigger-icon-size, 18px);
  flex-shrink: 0;
}
.trig-svg {
  width: 100%;
  height: 100%;
  filter: var(--svg-outline-filter, drop-shadow(0 1px 2px rgba(0,0,0,0.8)));
}

.hud-overlay-trigger .trig-info {
  font-family: var(--font-family, 'Inter', sans-serif);
  font-size: calc(var(--trigger-icon-size, 18px) * 0.7);
  font-weight: 800;
  color: var(--trigger-color, rgba(255,255,255,0.9));
  paint-order: stroke fill;
  -webkit-text-stroke: var(--text-stroke, 0px transparent);
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
}

.hud-trigger-img {
  width: var(--trigger-gift-size, 28px);
  height: var(--trigger-gift-size, 28px);
  object-fit: contain;
  border-radius: 3px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7)) drop-shadow(0 0 6px rgba(0,0,0,0.5)) drop-shadow(0 0 2px rgba(255,255,255,0.15));
}

/* â•â•â• PARAM VALUE (centered over image) â•â•â• */
.hud-overlay-count {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-family, 'Inter', sans-serif);
  font-size: var(--count-size, 20px);
  font-weight: 900;
  color: var(--count-color, #ffffff);
  paint-order: stroke fill;
  -webkit-text-stroke: var(--text-stroke, 0px transparent);
  text-shadow: 0 2px 6px rgba(0,0,0,0.9), 0 0 10px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,0.5);
  line-height: 1;
  text-align: center;
  white-space: nowrap;
  transition: transform 0.15s ease;
  z-index: 1;
  pointer-events: none;
}

.hud-overlay-count.bump {
  animation: countBump 0.35s ease;
}

/* â•â•â• COMMAND NAME â•â•â• */
.hud-name {
  font-family: var(--font-family, 'Inter', sans-serif);
  font-size: var(--name-size, 11px);
  font-weight: var(--name-weight, 600);
  color: var(--name-color, #ffffff);
  text-align: center;
  white-space: normal;
  word-break: break-word;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  max-width: calc(var(--img-size, 64px) + 20px);
  line-height: 1.2;
  margin-top: auto;
  flex-shrink: 0;
  /* Always reserve 2 lines of height so all cells align equally */
  min-height: calc(var(--name-size, 11px) * 1.2 * 2);
  paint-order: stroke fill;
  -webkit-text-stroke: var(--text-stroke, 0px transparent);
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
}

/* â•â•â• ANIMATIONS â•â•â• */

/* Entry animation */
@keyframes cellEntry {
  0% { opacity: 0; transform: translateY(10px) scale(0.9); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
.hud-cell.entering {
  animation: cellEntry 0.4s ease forwards;
}

/* Image pulse on trigger event */
@keyframes imgPulse {
  0% { transform: scale(1); filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
  30% { transform: scale(1.15); filter: drop-shadow(0 0 12px var(--pulse-color, rgba(122,92,255,0.6))) brightness(1.2); }
  60% { transform: scale(0.95); }
  100% { transform: scale(1); filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
}
.hud-img.img-pulse {
  animation: imgPulse 0.5s ease;
}

/* Count bump */
@keyframes countBump {
  0% { transform: translate(-50%, -50%) scale(1); }
  30% { transform: translate(-50%, -50%) scale(1.4); }
  60% { transform: translate(-50%, -50%) scale(0.95); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

/* â•â•â• IDLE ANIMATIONS (CSS classes applied by JS) â•â•â• */

/* Breathing: gentle image float + glow */
.hud-cell.breathing .hud-img {
  animation: imgBreathe 3s ease-in-out infinite;
}
.hud-cell.breathing .hud-name {
  animation: textBreathe 3s ease-in-out infinite;
}
.hud-cell.breathing .hud-overlay-trigger {
  animation: triggerBreathe 3s ease-in-out infinite 0.5s;
}

@keyframes imgBreathe {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
  50% { transform: scale(1.03); filter: drop-shadow(0 2px 10px var(--pulse-color, rgba(122,92,255,0.35))); }
}
@keyframes textBreathe {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.85; }
}
@keyframes triggerBreathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

/* Shimmer: sweep glow across image */
.hud-cell.shimmer .hud-img-wrap::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  animation: imgShimmer 3s ease-in-out infinite;
  pointer-events: none;
  border-radius: inherit;
  z-index: 1;
}
@keyframes imgShimmer {
  0% { left: -100%; }
  50% { left: 150%; }
  100% { left: 150%; }
}
.hud-cell.shimmer .hud-overlay-count {
  animation: countShimmer 3s ease-in-out infinite;
}
@keyframes countShimmer {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; text-shadow: 0 0 8px var(--count-color, rgba(255,255,255,0.6)); }
}

/* â•â•â• NEW CELL ANIMATIONS â•â•â• */

/* Pulse: snappy scale */
.hud-cell.anim-pulse { animation: cellPulse 1.5s ease-in-out infinite; }
@keyframes cellPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

/* Float: gentle Y hover */
.hud-cell.anim-float { animation: cellFloat 3s ease-in-out infinite; }
@keyframes cellFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

/* Bounce: playful overshoot */
.hud-cell.anim-bounce { animation: cellBounce 2s cubic-bezier(0.36, 0.07, 0.19, 0.97) infinite; }
@keyframes cellBounce {
  0%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
  50% { transform: translateY(2px); }
  70% { transform: translateY(-2px); }
}

/* Neon Pulse: border glow cycle */
.hud-cell.anim-neon-pulse .hud-cell-box { animation: neonPulse 2s ease-in-out infinite; }
@keyframes neonPulse {
  0%, 100% { box-shadow: 0 0 4px var(--pulse-color, rgba(122,92,255,0.4)); }
  50% { box-shadow: 0 0 16px var(--pulse-color, rgba(122,92,255,0.7)), 0 0 30px var(--pulse-color, rgba(122,92,255,0.3)); }
}

/* Swing: gentle rotation */
.hud-cell.anim-swing { animation: cellSwing 2.5s ease-in-out infinite; transform-origin: top center; }
@keyframes cellSwing {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(2deg); }
  75% { transform: rotate(-2deg); }
}

/* Jelly: squash & stretch */
.hud-cell.anim-jelly { animation: cellJelly 2s ease-in-out infinite; }
@keyframes cellJelly {
  0%, 100% { transform: scale(1, 1); }
  25% { transform: scale(0.97, 1.03); }
  50% { transform: scale(1.03, 0.97); }
  75% { transform: scale(0.99, 1.01); }
}

/* â•â•â• PER-ELEMENT ANIMATIONS â•â•â• */

/* Fade pulse */
.el-anim-fade-pulse { animation: elFadePulse 2s ease-in-out infinite; }
@keyframes elFadePulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Color cycle */
.el-anim-color-cycle { animation: elColorCycle 4s linear infinite; }
@keyframes elColorCycle {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

/* Spin (slow) */
.el-anim-spin { animation: elSpin 4s linear infinite; }
@keyframes elSpin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Wiggle */
.el-anim-wiggle { animation: elWiggle 1.5s ease-in-out infinite; }
@keyframes elWiggle {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-4deg); }
  75% { transform: rotate(4deg); }
}

/* Scale breathe */
.el-anim-scale-breathe { animation: elScaleBreathe 2.5s ease-in-out infinite; }
@keyframes elScaleBreathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* Slide X */
.el-anim-slide-x { animation: elSlideX 3s ease-in-out infinite; }
@keyframes elSlideX {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(3px); }
}

/* Glow pulse */
.el-anim-glow-pulse { animation: elGlowPulse 2s ease-in-out infinite; }
@keyframes elGlowPulse {
  0%, 100% { filter: drop-shadow(0 0 2px var(--glow-color, rgba(122,92,255,0.4))); }
  50% { filter: drop-shadow(0 0 12px var(--glow-color, rgba(122,92,255,0.8))); }
}

/* Typewriter (for text) */
.el-anim-typewriter { animation: elTypewriter 3s steps(20) infinite; overflow: hidden; white-space: nowrap; }
@keyframes elTypewriter {
  0% { max-width: 0; }
  50%, 100% { max-width: 200px; }
}

/* â•â•â• EFFECTS â•â•â• */

/* Rainbow text */
.hud-fx-rainbow {
  background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #0077ff, #8b00ff, #ff0000);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: fxRainbow 3s linear infinite;
}
@keyframes fxRainbow {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* Rainbow for images (border glow) */
img.hud-fx-rainbow, .hud-img-wrap.hud-fx-rainbow {
  -webkit-text-fill-color: unset;
  background: none;
  animation: fxRainbowGlow 3s linear infinite;
}
@keyframes fxRainbowGlow {
  0% { filter: drop-shadow(0 0 6px #ff0000); }
  16% { filter: drop-shadow(0 0 6px #ff7700); }
  33% { filter: drop-shadow(0 0 6px #ffff00); }
  50% { filter: drop-shadow(0 0 6px #00ff00); }
  66% { filter: drop-shadow(0 0 6px #0077ff); }
  83% { filter: drop-shadow(0 0 6px #8b00ff); }
  100% { filter: drop-shadow(0 0 6px #ff0000); }
}

/* Glow */
.hud-fx-glow {
  filter: drop-shadow(0 0 var(--glow-intensity, 10px) var(--glow-color, rgba(122,92,255,0.6)));
}

/* Neon (multi-layer glow) */
.hud-fx-neon {
  text-shadow: 0 0 7px var(--glow-color, rgba(122,92,255,0.8)),
               0 0 20px var(--glow-color, rgba(122,92,255,0.5)),
               0 0 40px var(--glow-color, rgba(122,92,255,0.3));
}
img.hud-fx-neon, .hud-img-wrap.hud-fx-neon {
  text-shadow: none;
  filter: drop-shadow(0 0 6px var(--glow-color, rgba(122,92,255,0.8)))
          drop-shadow(0 0 16px var(--glow-color, rgba(122,92,255,0.4)));
}

/* Gradient shift (cell bg) */
.hud-fx-gradient-shift {
  background: linear-gradient(135deg, var(--glow-color, rgba(122,92,255,0.3)), rgba(255,62,165,0.3), var(--glow-color, rgba(122,92,255,0.3)));
  background-size: 200% 200%;
  animation: fxGradientShift 4s ease infinite;
}
@keyframes fxGradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* â•â•â• TRIGGER OFFSET (applied additively with existing position) â•â•â• */

/* â•â•â• VISIBILITY HELPERS â•â•â• */
.hidden { display: none !important; }
</style>

<script>
// Shim: crear window.TikControl compatible desde TikControlWidget + TikControlRelay (modo local)
(function() {
  if (window.TikControl) return; // ya existe (modo AWS)
  const W = window.TikControlWidget;
  const R = window.TikControlRelay;
  if (!W) { console.warn('[GamingHUD] No widget API found'); return; }

  const _configCbs = [];
  const _dataCbs = [];
  const _stateCbs = [];
  const _params = new URLSearchParams(location.search);
  const _localPreviewOnly = _params.get('inTikControl') === 'true' && !_params.get('uid') && !_params.get('t') && !_params.get('wsPort');

  // Escuchar config via socket
  (async () => {
    if (_localPreviewOnly) return;
    try {
      const s = await W.getSocket();
      if (s && s.on) {
        s.on('widget:config', (cfg) => {
          const c = cfg?.config || cfg;
          _configCbs.forEach(cb => cb(c));
        });
        s.on('widget:configUpdated', (msg) => {
          const c = msg?.config || msg;
          _configCbs.forEach(cb => cb(c));
        });
        s.on('widget:data', (d) => _dataCbs.forEach(cb => cb(d)));
        s.on('widget:state', (st) => _stateCbs.forEach(cb => cb(st)));
      }
    } catch(e) { console.error('[Shim] Error:', e); }
  })();

  window.TikControl = {
    init: (name, opts) => {
      if (_localPreviewOnly) return;
      W.init();
    },
    on: (event, cb) => {
      if (_localPreviewOnly) {
        return;
      }
      if (R) R.on(event, cb);
      else W.getSocket().then(s => s && s.on(event, cb)).catch(() => {});
    },
    off: () => {},
    onConfig: (cb) => _configCbs.push(cb),
    onData: (cb) => _dataCbs.push(cb),
    onState: (cb) => _stateCbs.push(cb),
    getConfig: () => ({}),
    saveConfig: () => {},
    saveState: () => {},
    saveData: () => {},
    reset: () => {},
    getUserId: () => _params.get('uid') || '',
    isConnected: () => true
  };
})();
</script>
