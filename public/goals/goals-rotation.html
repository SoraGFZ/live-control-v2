<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals Rotation - TikControl</title>
    <link rel="stylesheet" href="/widgets/core/tikcontrol-widget.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: transparent; }

        .gr-container {
            width: 100%;
            height: 100%;
            min-height: 100px;
            position: relative;
            padding: 5%;
            box-sizing: border-box;
        }

        .gr-bar-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 80px;
            aspect-ratio: 8 / 1;
            overflow: hidden;
            transition: opacity 0.35s ease;
        }
        .gr-bar-wrapper.fade-out { opacity: 0; }
        .gr-bar-wrapper.fade-in { opacity: 1; }

        .gr-bar-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: fill; z-index: 2; pointer-events: none; display: none;
        }

        .gr-progress-wrapper {
            position: absolute; top: 28%; left: 7%;
            right: 7%; bottom: 28%;
            z-index: 1; overflow: hidden; border-radius: 4px;
        }


        .gr-bar-wrapper.style-metas {
            width: min(100%, 1040px);
            height: auto;
            margin: 0 auto;
            aspect-ratio: 1472 / 150;
            min-height: 0;
            max-height: none;
        }

        .gr-bar-wrapper.style-metas .gr-progress-wrapper {
            top: 11%;
            left: 2.55%;
            right: 2.65%;
            bottom: 46%;
            border-radius: 999px;
        }

        .gr-bar-wrapper.style-metas .gr-bar-overlay {
            height: 64%;
            z-index: 4;
        }

        .gr-bar-wrapper.style-metas .gr-bar-text {
            top: 31.5%;
            z-index: 5;
        }

.gr-bar-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #2cb2d4;
        }

        .gr-bar-fill {
            position: absolute; top: 0; left: 0; height: 100%;
            background: #ff0099; width: 0%; transition: width 0.3s ease;
        }

        .gr-bar-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: clamp(12px, 3vh, 48px); font-weight: 700;
            z-index: 3; white-space: nowrap; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .gr-indicator {
            display: flex; justify-content: center; gap: 6px;
            margin-top: 8px; z-index: 5; position: relative;
        }
        .gr-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,0.3); transition: all 0.3s ease;
        }
        .gr-dot.active { transform: scale(1.3); }

        .gr-time-bar {
            width: 100%; height: 3px; margin-top: 4px;
            background: rgba(255,255,255,0.1); border-radius: 2px;
            overflow: hidden; position: relative; z-index: 5;
        }
        .gr-time-fill {
            height: 100%; width: 0%; background: rgba(255,255,255,0.5);
            transition: width 0.1s linear;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .rainbow {
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
            background-size: 200% 100%; animation: rainbow 3s linear infinite;
        }

        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        .shake { animation: shake 0.5s ease-in-out 3; }
        .bounce { animation: bounce 0.6s ease-in-out 3; }
        .pulse { animation: pulse 0.5s ease-in-out 3; }

        /* Modo radial — alterna con .gr-bar-wrapper según body[data-mode="compact"]. */
        body[data-mode="compact"] .gr-bar-wrapper { display: none; }
        body:not([data-mode="compact"]) .gr-compact-wrapper { display: none; }
        .gr-compact-wrapper { width:100%; height:100%; padding:4%; box-sizing:border-box; display:flex; align-items:center; justify-content:center; transition: opacity .35s ease; }
        .gr-compact-wrapper.fade-out { opacity: 0; }
        .gr-compact-wrapper.fade-in  { opacity: 1; }
        .gr-compact-card { display:flex; align-items:center; gap:14px; background:rgba(15,18,25,0.85); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.06); border-radius:16px; padding:12px 18px 12px 12px; box-shadow:0 8px 24px rgba(0,0,0,0.3); max-width:100%; }
        .gr-compact-card.transparent { background:transparent !important; border:none !important; box-shadow:none !important; backdrop-filter:none !important; -webkit-backdrop-filter:none !important; }
        .gr-compact-ring { --size:84px; --thickness:9px; width:var(--size); height:var(--size); position:relative; flex-shrink:0; }
        .gr-compact-ring > svg { width:100%; height:100%; transform:rotate(-90deg); }
        .gr-compact-ring circle { fill:none; stroke-width:var(--thickness); stroke-linecap:round; }
        .gr-ring-track { stroke:rgba(255,255,255,0.08); }
        .gr-ring-fill  { stroke:#ff0099; stroke-dasharray:263.89; stroke-dashoffset:263.89; transition: stroke-dashoffset .5s cubic-bezier(.4,0,.2,1); filter: drop-shadow(0 0 6px currentColor); }
        .gr-ring-icon { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; user-select:none; pointer-events:none; }
        .gr-ring-icon-flipper { position:relative; width:60%; height:60%; }
        .gr-ring-face { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; transition: transform .35s cubic-bezier(.4,0,.2,1), opacity .35s ease; }
        .gr-ring-face-front { opacity:1; transform: scaleX(1); }
        .gr-ring-face-back  { opacity:0; transform: scaleX(0); }
        .gr-ring-icon-flipper.flipped .gr-ring-face-front { opacity:0; transform: scaleX(0); }
        .gr-ring-icon-flipper.flipped .gr-ring-face-back  { opacity:1; transform: scaleX(1); }
        .gr-ring-icon svg { width:100%; height:100%; stroke:#ff0099; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .gr-ring-avatar { width:100%; height:100%; border-radius:50%; object-fit:cover; border:2px solid currentColor; box-shadow:0 0 8px currentColor; background:rgba(0,0,0,0.4); }
        .gr-compact-info { display:flex; flex-direction:column; gap:2px; min-width:110px; overflow:hidden; }
        .gr-compact-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; color:rgba(255,255,255,0.6); }
        .gr-compact-value { font-size:24px; font-weight:800; color:#fff; line-height:1.1; }
        .gr-compact-target { font-size:11px; color:rgba(255,255,255,0.45); }
    </style>
</head>
<body>
    <div class="gr-container">
        <div class="gr-bar-wrapper" id="bar-wrapper">
            <img class="gr-bar-overlay" alt="" id="style-overlay">
            <div class="gr-progress-wrapper">
                <div class="gr-bar-bg" id="bar-bg"></div>
                <div class="gr-bar-fill" id="bar-fill"></div>
            </div>
            <div class="gr-bar-text" id="bar-text">LIKES - 0 / 5000</div>
        </div>
        <div class="gr-compact-wrapper" id="compact-wrapper">
            <div class="gr-compact-card" id="compact-card">
                <div class="gr-compact-ring">
                    <svg viewBox="0 0 100 100">
                        <circle class="gr-ring-track" cx="50" cy="50" r="42"></circle>
                        <circle class="gr-ring-fill"  cx="50" cy="50" r="42" id="ring-fill"></circle>
                    </svg>
                    <div class="gr-ring-icon" id="ring-icon">
                        <div class="gr-ring-icon-flipper" id="ring-icon-flipper">
                            <div class="gr-ring-face gr-ring-face-front" id="ring-icon-front"></div>
                            <div class="gr-ring-face gr-ring-face-back"><img class="gr-ring-avatar" id="ring-avatar" alt=""></div>
                        </div>
                    </div>
                </div>
                <div class="gr-compact-info">
                    <div class="gr-compact-label" id="compact-label">LIKES</div>
                    <div class="gr-compact-value" id="compact-value">0</div>
                    <div class="gr-compact-target">de <span id="compact-target">5000</span> · <span id="compact-pct">0%</span></div>
                </div>
            </div>
        </div>
        <div class="gr-indicator" id="indicator"></div>
        <div class="gr-time-bar" id="time-bar"><div class="gr-time-fill" id="time-fill"></div></div>
    </div>

    <script src="/widgets/core/env.js"></script>
    <script src="/widgets/core/tikcontrol-widget.js"></script>
    <script src="/widgets/core/font-loader.js"></script>
    <script>
    (function() {
        'use strict';

        const GOALS = {
            likes:       { title: 'LIKES',       color: '#ff0099', event: 'like',      prefix: 'goallikes_' },
            coins:       { title: 'MONEDAS',     color: '#ffd700', event: 'gift-solo', prefix: 'goalcoins_' },
            follows:     { title: 'SEGUIDORES',  color: '#00d9ff', event: 'follow',    prefix: 'goalfollows_' },
            subscribers: { title: 'SUPERFANS',   color: '#9b59b6', event: 'subscribe', prefix: 'goalsubscribers_' },
            gifts:       { title: 'REGALOS',     color: '#ff6b35', event: 'gift-solo', prefix: 'goalgifts_' },
            shares:      { title: 'COMPARTIDOS', color: '#2ecc71', event: 'share',     prefix: 'goalshares_' }
        };

        // SVG icons por métrica (mismos que los widgets per-goal — coherencia visual).
        const ICONS = {
            likes: '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
            coins: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></svg>',
            follows: '<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
            subscribers: '<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
            gifts: '<svg viewBox="0 0 24 24"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>',
            shares: '<svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>'
        };
        const COMPACT_CIRC = 263.89; // 2π × 42

        const state = {
            enabledGoals: ['likes', 'coins', 'follows'],
            rotationInterval: 10,
            currentIndex: 0,
            useIndividualStyles: true,
            showIndicator: true,
            showProgress: true,
            widgetType: 'bar',           // 'bar' | 'compact'
            compactTransparentBg: false, // Solo aplica si widgetType==='compact'
            unifiedStyle: {
                progress1Color: '#ff0099',
                progress2Color: '#2cb2d4',
                textColor: '#ffffff',
                textSize: 20,
                textBorderColor: '#000000',
                textBorderWidth: 0,
                rainbowEnabled: false,
                styleImage: '',
                fontFamily: 'System Default',
                fontUrl: ''
            },
            rotationTimer: null,
            progressTimer: null,
            progressValue: 0
        };

        const goalState = {};
        // Defaults del flip por métrica (coherentes con los widgets per-goal)
        const FLIP_DEFAULTS = { likes: 100, coins: 1, follows: 1, subscribers: 1, gifts: 1, shares: 10 };
        Object.keys(GOALS).forEach(k => {
            goalState[k] = {
                title: GOALS[k].title, target: 1000, originalTarget: 1000, current: 0,
                progress1Color: GOALS[k].color, progress2Color: '#2cb2d4',
                textColor: '#ffffff', textSize: 20, textBorderColor: '#000000', textBorderWidth: 0,
                rainbowEnabled: false, whenReached: 'keep', reachAnimation: 'shake',
                styleImage: '', fontFamily: 'System Default', fontUrl: '',
                avatarFlipEnabled: true,
                avatarFlipEvery: FLIP_DEFAULTS[k] || 1,
                compactLabelColor: '',
                compactTargetColor: ''
            };
        });

        // Estado del flip — compartido entre métricas (solo se muestra una a la vez)
        let __avatarFlipCount = {};
        let __avatarFlipPerUser = {};  // { metric: { uniqueId: count } }
        Object.keys(GOALS).forEach(k => { __avatarFlipCount[k] = 0; __avatarFlipPerUser[k] = {}; });
        let __avatarFlipTimer = null;
        let __avatarBusy = false;

        function extractAvatar(data) {
            if (!data) return '';
            const user = data.user || data;
            if (typeof user.profilePictureUrl === 'string' && user.profilePictureUrl) return user.profilePictureUrl;
            if (typeof data.profilePictureUrl === 'string' && data.profilePictureUrl) return data.profilePictureUrl;
            if (user.profilePicture && typeof user.profilePicture === 'object') {
                const pp = user.profilePicture;
                if (Array.isArray(pp.url) && pp.url.length) return pp.url[0];
                if (typeof pp.url === 'string') return pp.url;
                if (Array.isArray(pp.urls) && pp.urls.length) return pp.urls[0];
            }
            const av = user.avatarThumb || user.avatarMedium;
            if (av) {
                if (typeof av === 'string') return av;
                if (typeof av === 'object') {
                    if (Array.isArray(av.url) && av.url.length) return av.url[0];
                    if (typeof av.url === 'string') return av.url;
                    if (Array.isArray(av.urls) && av.urls.length) return av.urls[0];
                    if (Array.isArray(av.urlList) && av.urlList.length) return av.urlList[0];
                }
            }
            if (typeof user.avatarUrl === 'string' && user.avatarUrl) return user.avatarUrl;
            if (typeof data.avatar === 'string' && data.avatar) return data.avatar;
            return '';
        }
        function triggerAvatarFlip(avatarUrl) {
            if (!avatarUrl) return;
            if (state.widgetType !== 'compact') return;
            const flipper = document.getElementById('ring-icon-flipper');
            const img = document.getElementById('ring-avatar');
            if (!flipper || !img) return;
            img.src = avatarUrl;
            if (__avatarBusy) {
                if (__avatarFlipTimer) clearTimeout(__avatarFlipTimer);
                __avatarFlipTimer = setTimeout(() => {
                    flipper.classList.remove('flipped');
                    __avatarBusy = false;
                }, 3500);
                return;
            }
            __avatarBusy = true;
            flipper.classList.add('flipped');
            if (__avatarFlipTimer) clearTimeout(__avatarFlipTimer);
            __avatarFlipTimer = setTimeout(() => {
                flipper.classList.remove('flipped');
                __avatarBusy = false;
            }, 3500);
        }
        function maybeFlipAvatar(metric, data, opts) {
            try {
                if (state.widgetType !== 'compact') return;
                const gs = goalState[metric];
                if (!gs || gs.avatarFlipEnabled === false) return;
                if (getCurrentKey() !== metric) return; // solo flip si la métrica actual está visible
                const every = parseInt(gs.avatarFlipEvery, 10);
                if (!every || every < 1) return;
                const url = extractAvatar(data);
                if (!url) return;
                if (opts && opts.perUser) {
                    const uid = (data.user?.uniqueId) || data.uniqueId || '';
                    if (!uid) return;
                    __avatarFlipPerUser[metric][uid] = (__avatarFlipPerUser[metric][uid] || 0) + 1;
                    if (__avatarFlipPerUser[metric][uid] >= every) {
                        __avatarFlipPerUser[metric][uid] = 0;
                        triggerAvatarFlip(url);
                    }
                    return;
                }
                __avatarFlipCount[metric] += (opts && typeof opts.increment === 'number') ? opts.increment : 1;
                if (__avatarFlipCount[metric] >= every) {
                    __avatarFlipCount[metric] = 0;
                    triggerAvatarFlip(url);
                }
            } catch (_) { }
        }

        const barWrapper = document.getElementById('bar-wrapper');
        const barFill = document.getElementById('bar-fill');
        const barBg = document.getElementById('bar-bg');
        const textEl = document.getElementById('bar-text');
        const overlay = document.getElementById('style-overlay');
        const indicatorEl = document.getElementById('indicator');
        const timeBar = document.getElementById('time-bar');
        const timeFill = document.getElementById('time-fill');
        // Modo radial
        const compactWrapper = document.getElementById('compact-wrapper');
        const compactCard    = document.getElementById('compact-card');
        const ringFill       = document.getElementById('ring-fill');
        const ringIcon       = document.getElementById('ring-icon');
        const compactLabel   = document.getElementById('compact-label');
        const compactValue   = document.getElementById('compact-value');
        const compactTarget  = document.getElementById('compact-target');
        const compactPct     = document.getElementById('compact-pct');

        TikControl.init('goals-rotation', { persistent: true, sessionBased: true });

        TikControl.onConfig((config) => {
            if (config.enabledGoals) state.enabledGoals = config.enabledGoals;
            if (config.rotationInterval !== undefined) state.rotationInterval = Math.max(3, parseInt(config.rotationInterval));
            if (config.useIndividualStyles !== undefined) state.useIndividualStyles = config.useIndividualStyles;
            if (config.showIndicator !== undefined) state.showIndicator = config.showIndicator;
            if (config.showProgress !== undefined) state.showProgress = config.showProgress;
            // Modo barra/radial
            if (config.widgetType === 'compact' || config.widgetType === 'bar') state.widgetType = config.widgetType;
            state.compactTransparentBg = !!config.compactTransparentBg;
            state.disableAbbreviation = !!config.disableAbbreviation;
            document.body.dataset.mode = state.widgetType === 'compact' ? 'compact' : 'bar';
            if (compactCard) compactCard.classList.toggle('transparent', state.widgetType === 'compact' && state.compactTransparentBg);

            if (config.unifiedStyle) {
                Object.keys(config.unifiedStyle).forEach(k => { state.unifiedStyle[k] = config.unifiedStyle[k]; });
            }

            Object.keys(GOALS).forEach(key => {
                const prefix = GOALS[key].prefix;
                const gs = goalState[key];
                Object.keys(config).forEach(ck => {
                    if (!ck.startsWith(prefix)) return;
                    const prop = ck.replace(prefix, '');
                    if (prop === 'title') gs.title = config[ck];
                    else if (prop === 'value') { gs.target = parseInt(config[ck]); gs.originalTarget = config[prefix + 'originalValue'] || gs.target; }
                    else if (prop === 'progress1Color') gs.progress1Color = config[ck];
                    else if (prop === 'progress2Color') gs.progress2Color = config[ck];
                    else if (prop === 'textColor') gs.textColor = config[ck];
                    else if (prop === 'textSize') gs.textSize = parseInt(config[ck]);
                    else if (prop === 'textBorderColor') gs.textBorderColor = config[ck];
                    else if (prop === 'textBorderWidth') gs.textBorderWidth = parseInt(config[ck]);
                    else if (prop === 'rainbowEnabled') gs.rainbowEnabled = config[ck];
                    else if (prop === 'whenReached') gs.whenReached = config[ck];
                    else if (prop === 'reachAnimation') gs.reachAnimation = config[ck];
                    else if (prop === 'styleImage') gs.styleImage = config[ck];
                    else if (prop === 'fontFamily') gs.fontFamily = config[ck];
                    else if (prop === 'fontUrl') gs.fontUrl = config[ck];
                    // Modo radial: avatar flip + colores granulares
                    else if (prop === 'avatarFlipEnabled') gs.avatarFlipEnabled = config[ck] !== false;
                    else if (prop === 'avatarFlipEvery') gs.avatarFlipEvery = parseInt(config[ck], 10) || gs.avatarFlipEvery;
                    else if (prop === 'compactLabelColor') gs.compactLabelColor = config[ck];
                    else if (prop === 'compactTargetColor') gs.compactTargetColor = config[ck];
                });
            });

            updateIndicator();
            restartRotation();
            applyStyles();
            updateDisplay();
        });

        TikControl.on('like', (data) => {
            const gs = goalState.likes;
            let inc;
            if (data.totalLikeCount != null) {
                inc = Math.max(0, data.totalLikeCount - gs.current);
                gs.current = data.totalLikeCount;
            } else {
                inc = (data.likeCount || data.increment || 1);
                gs.current += inc;
            }
            if (gs.current >= gs.target) handleGoalReached('likes');
            if (getCurrentKey() === 'likes') updateDisplay();
            maybeFlipAvatar('likes', data, { increment: inc });
        });

        TikControl.on('gift-solo', (data) => {
            const gift = data.gift || data.giftDetails || data.giftInfo || {};
            const diamonds = parseInt(data._giftDiamonds) || parseInt(data.diamondCount) || parseInt(data.diamond_count) || parseInt(gift.diamond_count) || parseInt(gift.diamondCount) || parseInt(gift.diamonds) || parseInt(data.diamonds) || 0;
            goalState.coins.current += diamonds;
            if (goalState.coins.current >= goalState.coins.target) handleGoalReached('coins');

            goalState.gifts.current += 1;
            if (goalState.gifts.current >= goalState.gifts.target) handleGoalReached('gifts');

            const k = getCurrentKey();
            if (k === 'coins' || k === 'gifts') updateDisplay();
            maybeFlipAvatar(k === 'coins' ? 'coins' : 'gifts', data);
        });

        TikControl.on('follow', (data) => {
            goalState.follows.current += 1;
            if (goalState.follows.current >= goalState.follows.target) handleGoalReached('follows');
            if (getCurrentKey() === 'follows') updateDisplay();
            maybeFlipAvatar('follows', data);
        });

        TikControl.on('subscribe', (data) => {
            goalState.subscribers.current += 1;
            if (goalState.subscribers.current >= goalState.subscribers.target) handleGoalReached('subscribers');
            if (getCurrentKey() === 'subscribers') updateDisplay();
            maybeFlipAvatar('subscribers', data);
        });

        TikControl.on('superFan', (data) => {
            goalState.subscribers.current += 1;
            if (goalState.subscribers.current >= goalState.subscribers.target) handleGoalReached('subscribers');
            if (getCurrentKey() === 'subscribers') updateDisplay();
            maybeFlipAvatar('subscribers', data);
        });

        TikControl.on('share', (data) => {
            goalState.shares.current += 1;
            if (goalState.shares.current >= goalState.shares.target) handleGoalReached('shares');
            if (getCurrentKey() === 'shares') updateDisplay();
            maybeFlipAvatar('shares', data, { perUser: true });
        });

        TikControl.on('reset', () => {
            Object.keys(goalState).forEach(k => { goalState[k].current = 0; });
            updateDisplay();
        });

        function getCurrentKey() {
            if (!state.enabledGoals.length) return 'likes';
            return state.enabledGoals[state.currentIndex % state.enabledGoals.length];
        }

        function getVisualConfig(key) {
            if (state.useIndividualStyles) return goalState[key];
            return { ...goalState[key], ...state.unifiedStyle };
        }

        function applyStyles() {
            const key = getCurrentKey();
            const vs = getVisualConfig(key);

            if (vs.fontFamily && vs.fontFamily !== 'System Default' && vs.fontUrl) {
                const fontId = 'gr-font-' + encodeURIComponent(vs.fontFamily);
                if (!document.getElementById(fontId)) {
                    if (typeof window.__tcLoadFont === 'function') {
                        window.__tcLoadFont(vs.fontFamily, vs.fontUrl);
                    } else {
                        const s = document.createElement('style');
                        s.id = fontId;
                        const signedUrl = (typeof window.__tcSignedUrl === 'function') ? window.__tcSignedUrl(vs.fontUrl) : vs.fontUrl;
                        s.textContent = "@font-face{font-family:'" + vs.fontFamily.replace(/'/g, "\\'") + "';src:url('" + signedUrl + "');font-display:swap;}";
                        document.head.appendChild(s);
                    }
                }
                const fv = vs.fontFamily + ', Arial, sans-serif';
                document.body.style.setProperty('font-family', fv, 'important');
                textEl.style.setProperty('font-family', fv, 'important');
            }

            barFill.classList.remove('rainbow');
            if (vs.rainbowEnabled) barFill.classList.add('rainbow');
            else barFill.style.backgroundColor = vs.progress1Color || '#ff0099';

            barBg.style.background = vs.progress2Color || '#2cb2d4';
            textEl.style.color = vs.textColor || '#fff';
            if (vs.textSize) textEl.style.fontSize = vs.textSize + 'px';

            if (vs.textBorderWidth > 0) {
                const w = Math.min(8, Math.floor(vs.textBorderWidth));
                const parts = [];
                for (let dx = -w; dx <= w; dx++) {
                    for (let dy = -w; dy <= w; dy++) {
                        const d = Math.hypot(dx, dy);
                        if (d > 0 && d <= w) parts.push(dx + 'px ' + dy + 'px 0 ' + vs.textBorderColor);
                    }
                }
                textEl.style.textShadow = parts.join(', ');
            } else {
                textEl.style.textShadow = '0 2px 4px rgba(0,0,0,0.5)';
            }

            if (overlay) {
                const noImg = !vs.styleImage || vs.styleImage.trim() === '' || vs.styleImage.includes('transparent.png');
                if (barWrapper) barWrapper.classList.toggle('style-metas', /(?:^|\/)metas\.png(?:\?|$)/i.test(vs.styleImage || ''));
                if (!noImg) {
                    let imgSrc = vs.styleImage;
                    if (imgSrc.includes('/ImagenBar/')) imgSrc = 'https://tikcontrol.live/goals/styles/' + imgSrc.split('/ImagenBar/')[1];
                    else if (imgSrc.startsWith('/goals/')) imgSrc = 'https://tikcontrol.live' + imgSrc;
                    overlay.src = imgSrc;
                    overlay.style.display = 'block';
                } else {
                    overlay.removeAttribute('src');
                    overlay.style.display = 'none';
                }
            }
        }

        function fmtCompact(n) {
            if (state.disableAbbreviation) {
                try { return Number(n).toLocaleString('es-ES'); }
                catch (_) { return String(n); }
            }
            if (n < 1000) return String(n);
            if (n < 10000) return (n / 1000).toFixed(1) + 'K';
            if (n < 1000000) return Math.floor(n / 1000) + 'K';
            return (n / 1000000).toFixed(1) + 'M';
        }

        function applyCompactStyles(key) {
            const vs = getVisualConfig(key);
            const ringColor = vs.progress1Color || GOALS[key].color || '#ff0099';
            if (ringFill) {
                ringFill.style.stroke = ringColor;
                ringFill.style.color = ringColor; // para drop-shadow
            }
            // El SVG vive ahora dentro del flipper (cara frontal). El avatar
            // toma el color del borde de currentColor → ringIcon.color.
            const front = document.getElementById('ring-icon-front');
            if (front) {
                front.innerHTML = ICONS[key] || '';
                const svg = front.querySelector('svg');
                if (svg) svg.style.stroke = ringColor;
            }
            if (ringIcon) ringIcon.style.color = ringColor;

            if (compactLabel) {
                compactLabel.textContent = (goalState[key].title || GOALS[key].title || key).toUpperCase();
            }
            const txtColor = vs.textColor || '#ffffff';
            const labelColor = vs.compactLabelColor || txtColor;
            const targetColor = vs.compactTargetColor || txtColor;
            const borderColor = vs.textBorderColor || '#000000';
            const borderWidth = parseInt(vs.textBorderWidth || 0, 10);
            const textShadow = borderWidth > 0
                ? Array.from({ length: 8 }, (_, i) => {
                    const a = (i / 8) * 2 * Math.PI;
                    return (Math.cos(a) * borderWidth) + 'px ' + (Math.sin(a) * borderWidth) + 'px 0 ' + borderColor;
                }).join(', ')
                : '0 2px 4px rgba(0,0,0,0.5)';
            const colorsByEl = new Map([
                [compactLabel, labelColor],
                [compactValue, txtColor],
                [compactTarget, targetColor]
            ]);
            colorsByEl.forEach((color, el) => {
                if (!el) return;
                el.style.color = color;
                el.style.textShadow = textShadow;
            });
        }

        function updateDisplay() {
            const key = getCurrentKey();
            const gs = goalState[key];
            const pct = gs.target > 0 ? Math.min(100, (gs.current / gs.target) * 100) : 0;
            // Modo barra
            textEl.textContent = gs.title.toUpperCase() + ' - ' + gs.current + ' / ' + gs.target;
            barFill.style.width = pct + '%';
            // Modo radial
            if (state.widgetType === 'compact') {
                applyCompactStyles(key);
                if (ringFill) ringFill.style.strokeDashoffset = String(COMPACT_CIRC - COMPACT_CIRC * pct / 100);
                if (compactValue) compactValue.textContent = fmtCompact(gs.current);
                if (compactTarget) compactTarget.textContent = fmtCompact(gs.target);
                if (compactPct) compactPct.textContent = Math.round(pct) + '%';
            }
        }

        function handleGoalReached(key) {
            const gs = goalState[key];
            if (getCurrentKey() === key && barWrapper && gs.reachAnimation && gs.reachAnimation !== 'none') {
                barWrapper.classList.add(gs.reachAnimation);
                setTimeout(() => barWrapper.classList.remove(gs.reachAnimation), 1500);
            }
            switch (gs.whenReached) {
                case 'increase': gs.target += gs.originalTarget; break;
                case 'double': gs.target *= 2; break;
                case 'hide': break;
                case 'keep': default: break;
            }
            if (getCurrentKey() === key) updateDisplay();
        }

        function rotateToNext() {
            if (state.enabledGoals.length <= 1) return;
            const wrap = state.widgetType === 'compact' ? compactWrapper : barWrapper;
            if (wrap) wrap.classList.add('fade-out');
            setTimeout(() => {
                state.currentIndex = (state.currentIndex + 1) % state.enabledGoals.length;
                updateIndicator();
                applyStyles();
                updateDisplay();
                if (wrap) {
                    wrap.classList.remove('fade-out');
                    wrap.classList.add('fade-in');
                    setTimeout(() => wrap.classList.remove('fade-in'), 400);
                }
            }, 350);
        }

        function restartRotation() {
            if (state.rotationTimer) clearInterval(state.rotationTimer);
            if (state.progressTimer) clearInterval(state.progressTimer);
            if (state.enabledGoals.length > 1) {
                state.rotationTimer = setInterval(rotateToNext, state.rotationInterval * 1000);
                state.progressValue = 0;
                state.progressTimer = setInterval(() => {
                    state.progressValue += (100 / (state.rotationInterval * 10));
                    if (state.progressValue >= 100) state.progressValue = 0;
                    timeFill.style.width = state.progressValue + '%';
                }, 100);
            }
        }

        function updateIndicator() {
            if (!state.showIndicator || state.enabledGoals.length <= 1) {
                indicatorEl.style.display = 'none';
                timeBar.style.display = 'none';
                return;
            }
            indicatorEl.style.display = 'flex';
            indicatorEl.innerHTML = state.enabledGoals.map((key, idx) => {
                const g = GOALS[key];
                const active = idx === (state.currentIndex % state.enabledGoals.length);
                return '<div class="gr-dot' + (active ? ' active' : '') + '" style="background:' + (active ? g.color + ';box-shadow:0 0 8px ' + g.color : 'rgba(255,255,255,0.3)') + ';"></div>';
            }).join('');
            timeBar.style.display = state.showProgress && state.enabledGoals.length > 1 ? 'block' : 'none';
        }

        updateIndicator();
        restartRotation();
        applyStyles();
        updateDisplay();
    })();
    </script>
</body>
</html>
